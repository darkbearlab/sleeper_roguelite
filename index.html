<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLEEPER — 垂直切片 (Vertical Slice)</title>
<style>
  html,body{margin:0;height:100%;background:#06080d;overflow:hidden;
    font-family:Consolas,"Courier New",monospace;color:#cdd6e0;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{background:#06080d;image-rendering:auto;cursor:crosshair;
    box-shadow:0 0 40px #000a;max-width:100%;max-height:100%;}
  /* === 數值平衡面板（DOM 覆蓋層） === */
  #tunerBtn{position:fixed;top:8px;right:10px;z-index:50;width:30px;height:30px;
    border:1px solid #2a3442;background:rgba(16,21,29,0.8);color:#7fe3ff;border-radius:6px;
    cursor:pointer;font-size:15px;line-height:26px;text-align:center;padding:0;}
  #tunerBtn:hover{background:#1a2330;}
  #tuner{position:fixed;top:0;right:0;width:380px;height:100%;z-index:49;box-sizing:border-box;
    background:rgba(11,15,21,0.96);border-left:1px solid #2a3442;color:#cdd6e0;
    display:none;flex-direction:column;font:12px Consolas,monospace;box-shadow:-6px 0 24px #0008;}
  #tuner.open{display:flex;}
  #tuner header{padding:8px 10px;border-bottom:1px solid #1f2733;display:flex;align-items:center;gap:8px;}
  #tuner header b{color:#7fe3ff;font-size:14px;flex:1;}
  #tuner header button{background:#15202c;border:1px solid #2a3442;color:#9fb3c8;border-radius:4px;cursor:pointer;width:24px;height:22px;}
  #tuner .tabs{display:flex;flex-wrap:wrap;gap:4px;padding:6px 8px;border-bottom:1px solid #1f2733;}
  #tuner .tab{padding:3px 8px;border:1px solid #2a3442;border-radius:4px;background:#121823;color:#9fb3c8;cursor:pointer;}
  #tuner .tab.on{background:#1d3247;color:#bfe6ff;border-color:#3a6b8f;}
  #tuner .search{margin:6px 8px;padding:4px 6px;background:#0f141c;border:1px solid #2a3442;color:#cdd6e0;border-radius:4px;}
  #tuner .body{flex:1;overflow-y:auto;padding:4px 8px 12px;}
  #tuner details{margin:3px 0;border:1px solid #182030;border-radius:4px;}
  #tuner details>div{padding-left:8px;}
  #tuner summary{cursor:pointer;padding:3px 6px;color:#a8c0d8;background:#10161f;user-select:none;}
  #tuner .row{display:flex;align-items:center;gap:6px;padding:2px 6px;}
  #tuner .row label{flex:1;color:#9fb3c8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #tuner .row input[type=range]{width:96px;}
  #tuner .row input[type=number]{width:64px;background:#0f141c;border:1px solid #2a3442;color:#e0e8f0;border-radius:3px;padding:1px 3px;}
  #tuner .row.changed label{color:#ffd27a;}
  #tuner footer{padding:8px;border-top:1px solid #1f2733;display:flex;gap:6px;align-items:center;}
  #tuner footer button{padding:4px 8px;background:#15202c;border:1px solid #2a3442;color:#bfe6ff;border-radius:4px;cursor:pointer;}
  #tuner .note{font-size:10px;color:#5a6470;padding:0 8px 6px;line-height:1.4;}
  #tuner textarea{margin:0 8px 8px;width:auto;height:120px;background:#0f141c;border:1px solid #2a3442;color:#cdd6e0;font:11px Consolas;display:none;}
  /* === 自訂戰鬥 SANDBOX === */
  #sandboxBtn{position:fixed;top:8px;left:10px;z-index:50;height:30px;padding:0 10px;border:1px solid #2a3442;background:rgba(16,21,29,0.8);color:#ffd27a;border-radius:6px;cursor:pointer;font:13px Consolas,monospace;}
  #sandboxBtn:hover{background:#1a2330;}
  #sandbox{position:fixed;inset:0;z-index:48;display:none;align-items:center;justify-content:center;background:rgba(4,6,10,0.84);}
  #sandbox.open{display:flex;}
  #sandbox .card{width:780px;max-width:94%;max-height:92%;overflow:auto;background:#0c1118;border:1px solid #2a3442;border-radius:10px;padding:14px 16px;color:#cdd6e0;font:12px Consolas,monospace;}
  #sandbox h2{margin:0 0 2px;color:#ffd27a;font-size:17px;}
  #sandbox h3{margin:12px 0 6px;color:#7fe3ff;font-size:13px;}
  #sandbox .muted{color:#5a6470;font-size:11px;}
  #sandbox .cols{color:#7e8a99;font-size:11px;display:flex;gap:6px;margin:2px 0;}
  #sandbox .cols span{flex:1;}
  #sandbox .mem{display:flex;gap:6px;align-items:center;margin:4px 0;}
  #sandbox .mem .idx{flex:0 0 24px;color:#7e8a99;}
  #sandbox select,#sandbox input,#sandbox textarea{background:#0f141c;border:1px solid #2a3442;color:#e0e8f0;border-radius:4px;padding:3px 5px;font:inherit;}
  #sandbox .mem select{flex:1;min-width:80px;}
  #sandbox textarea{width:100%;height:140px;box-sizing:border-box;}
  #sandbox button{background:#15202c;border:1px solid #2a3442;color:#bfe6ff;border-radius:5px;cursor:pointer;padding:4px 10px;font:inherit;}
  #sandbox button:hover{background:#1d2a38;}
  #sandbox .go{background:#243a2a;color:#bfe6cf;border-color:#3a8f5a;font-size:14px;padding:7px 18px;}
  #sandbox .x{color:#ff9b6b;border-color:#5a3030;padding:3px 8px;}
  #sandbox .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:8px 0;}
  #sandbox #sbMsg{color:#ff9b6b;}
  #sandbox #sbResult{color:#9fd0b0;}
</style>
</head>
<body>
<div id="wrap"><canvas id="cv" width="1280" height="720"></canvas></div>
<script>
"use strict";
/* =====================================================================
   CODENAME: SLEEPER — Phase 1 垂直切片（戰術化 + 旋轉視角 + 戰爭迷霧）
   原生 JS + Canvas 2D，零外部相依。
   分區： CONFIG / Math / Map / LoS+Vision / Camera / State /
          Possession / Combat(換彈/發散) / IdleAI / EnemyAI /
          Extraction / Movement / Input / Update / Render(迷霧)
   ===================================================================== */

/* =====================================================================
   CONFIG — 所有可調數值集中於此（全部為佔位值，待調平衡）
   ===================================================================== */
const CONFIG = {
  // --- 規格指定值 ---
  devLootRack: true,        // 開發測試：第0關地上陳列所有武器/道具（一般掉落＝撿進背包，休息關配裝）。發佈前設 false
  switchHandoverMs: 0,      // 切換附身交接延遲（0 = 無 CD）
  idleAccuracyMult: 0.5,    // 待機精度倍率（待機基礎發散 = spreadBase / 此值，越低越散）
  idleReactionDelay: 0.4,   // 待機：看到敵人到開火的延遲 (s)
  idleFireRateMult: 0.7,    // 待機射速倍率（越低越慢）
  idleTap: { size: 3, gap: 0.55 },  // 點放(TAP)：每 burst 發數 / burst 後停頓秒數（讓 bloom 回復）
  unitHp: 100,
  moveSpeed: 110,           // px/s（戰術化：放慢）
  turnSpeed: 480,           // deg/s（預設砲塔轉速；實際以各武器 turnSpeed 為準）
  mouseSensitivity: 0.0035, // FPS 式滑鼠鎖定靈敏度（rad/px）。轉速不夠快時砲塔會追不上＝轉向延遲
  // Shift 奔跑：奔跑倍率 = base − (武器weight−1)×weightPenalty，夾在 [minMult, base]（越重跑越慢）
  sprint: { base: 1.9, weightPenalty: 0.5, minMult: 1.1 },
  // 武器數值移至下方 WEAPONS 目錄（可指派、未來可換）

  timeBudget: 90,
  reinforce: { startInterval: 2.0, rampEvery: 10, rampDelta: -0.3, minInterval: 0.4 },
  hysteresisBonus: 25,
  squadSize: 3,
  // 跨關回復：每場戰鬥開始時，存活成員「缺血」回復的比例。
  // 1.0＝自動全補（目前行為）；0＝殘血照舊帶入；0.5＝回復一半缺口。當前血量已跨關攜帶，調此鈕即生效。
  interMissionHealFrac: 1.0,

  // 共用倉庫 / 裝備 / 搜刮（meta 庫存層；佔位旋鈕）
  loadout: {
    slotsPerMember: 2,             // 倉庫容量 = 生還人數 × 此值（喚醒/陣亡即時改變）
    abilitiesCountTowardCap: true, // 技能是否佔倉庫格（實測太擠可關）
    scavengeChoices: 3,            // 搜刮抽選數（三選一，用 agency 蓋過純 RNG）
  },
  // 彈藥：每武器類別一個共用儲備（reserve）。本階段「不咬人」＝寬裕值，正常一場打不完。
  // pistol＝底線武器，彈藥視為無限、不納入分配。
  ammo: { stockStart: 600, defaultAlloc: 240, salvageAlly: 120, salvageEnemy: 60, subsonicStart: 18 },   // subsonicStart＝消音武器(silent)的稀少亞音速彈儲備（限制無聲擊殺頻率）
  pickupRadius: 26,                // 被附身單位走到掉落物多近會撿進臨時背包

  // 地形 / 互動（門、按鈕、低矮牆）
  interactRadius: 40,             // 互動(開關門/按鈕)距離；門以「到門線段最近點」量距，整扇門寬都好按
  enemyHearRadius: 320,           // 玩家開火驚動半徑（半徑內 IDLE 敵人 → ENGAGED；不論命中）
  // 低矮牆＝掩體：玩家穿越減速、敵人視為實體繞行、不擋視線、子彈「遠距機率擋／貼牆可越射」
  lowWall: { slow: 0.3, touchR: 12, closeRange: 90, blockChance: 0.55 },
  // 牆體厚度（px，全域固定）：渲染描邊寬＝此值；子彈/視線阻擋以「離中心線 ≤ 半厚」判定（撞渲染牆面而非中心線）。
  // 40px=1公尺，故 8px≈20cm（室內牆）。承重牆在編輯器平行畫兩條即可，不在資料上分型。移動退避仍走單位半徑（已比牆厚）。
  wallThick: 8,
  // 重裝敵人裝甲：高機率「整發擋下」非穿甲攻擊；穿甲(pierce)越高越能無視。
  // 有效擋格率 = blockChance × (1 − weapon.pierce)。血量與一般敵人相同，靠這條形成質差。
  armor: { blockChance: 0.85 },
  // 側翼/突襲（敵我皆適用）：依攻擊來向 vs 目標視野錐。flank＝錐外(側後)＝×flankMult 且無視所有裝甲；
  // surprise＝閒置敵人正面＝×surpriseMult（僅對敵）；兩者皆中取較高、不相乘。
  flank: { flankMult: 2.0, surpriseMult: 1.5 },
  // 潛行/警覺層（Stage 1）：IDLE 敵人視野較短；發現玩家後需「識別」累滿才交戰（快速閃過＝沒事）。
  //   idleConeMul＝IDLE 錐角倍率(×coneHalfDeg)；idleViewRange＝IDLE 視錐有限視距(超出只剩近身感知)。
  //   identifyTime＝識別滿值(秒@基準)；distNearMul＝貼臉(senseRadius)識別加速倍率(近乎瞬識)；
  //   concealMul＝在遮蔽區(草叢)時識別速率倍率(Stage 2 用)；decay＝失去視線後識別衰退速率。
  stealth: { idleConeMul: 0.6, idleViewRange: 360, identifyTime: 0.8, distNearMul: 6, concealMul: 0.25, decay: 1.5, fireReveal: 0.6 },   // fireReveal＝敵人非消音開火後對玩家現形的秒數（槍口火光暴露位置，含草叢內）
  // IDLE 巡邏（只有 type.patrols 的單位＝grunt 巡，重裝/狗守原地）。巡邏池：地圖有 patrol 標籤點(≥2)用之，否則自動取「距入口/撤離口都 ≥autoBandFromEnds」的點。
  // 認領制：每個沒目標的巡邏兵隨機認領一個未被認領的點→沿圖走→到點停 dwell 秒(緩慢掃視)→放掉再認領。點>兵＝輪換不可預測。speedMul＝巡邏走速倍率。
  patrol: { dwell: 2.0, speedMul: 0.7, autoBandFromEnds: 200 },
  // 交戰後追蹤：KNOWN(任一敵看得到→全體共享實位、追擊) → 全員失去視線→SEARCH(最後已知位置 searchHops 步內清查，走到或視線掃過即清) → 清完沒找到→全場巡邏(全員)。
  //   knownGrace＝失去視線後仍視為「已知」的緩衝秒（避免一閃就重置）。修「交戰後視野穿牆、永遠找得到你」。
  hunt: { searchHops: 3, knownGrace: 0.5, threatGrace: 4, threatShareRadius: 240, threatDist: 320 },   // 被擊中來向脅威：記憶秒數 / 近隣傳播半徑 / 沿來向放置脅威點的距離
  // 打擊感（juice）：子彈近 hitscan(速度×mul)＋曳光、開火後座/相機踢、命中/擊殺螢幕震動、擊殺頓幀。皆可即時調。
  juice: { bulletSpeedMul: 4, tracer: 1.0, recoil: 4, recoilDecay: 60, camKick: 0, shakeFire: 0, shakeHit: 0, shakeKill: 0, shakeMax: 12, shakeDecay: 16, hitstopKill: 0.04,   // 震動先全關(camKick/shakeFire/Hit/Kill=0)、頓幀減半
    hitFlash: 0.12, flinch: 5,                                              // 受擊：閃白時長 / 後仰位移(px)
    deathHitstop: 0.06 },   // 我方陣亡：只保留短頓幀「頓一下」（已取消死亡鏡頭＝相機不轉去死亡點，激戰中不干擾操作）
  // 視覺化聲音：控制角色「視線外」方向有聲音時，畫面邊框朝該方向發光（無音效的替代提示；arcade 亦沿用）。
  soundEdge: { alpha: 0.6, frame: 0.07 },   // alpha＝發光最大不透明度；frame＝常駐外框淡度

  // --- 額外佔位 ---
  unitRadius: 12,
  nodeReach: 22,
  extractRadius: 34,
  sweepAmpDeg: 70,
  sweepSpeed: 35,
  wanderAmpDeg: 28,         // WANDER：相對「進入閒置時正前方」的最大偏擺（度，視野不離正前方）
  wanderSpeed: 45,          // WANDER：擺頭轉速（度/秒，較慢＝沉穩不慌張）
  ghostAlertTime: 4.0,
  ghostCloseRange: 150,
  lowHpFrac: 0.35,

  // 戰爭迷霧 / 視野（敵我共用）：前方 90° 視錐(距離無限、被牆遮斷) + 360° 近身感知
  vision: {
    coneHalfDeg: 45,        // 視錐半角（總 90°）
    senseRadius: 90,        // 近身感知半徑（基礎；× 單位 strength，越強越長）
    fanRays: 28,            // 視錐渲染射線數
    coneMax: 2200,          // 視錐射線最大長度（≈無限，實際被牆截斷）
  },
  fog: { color: '#05070b', skeletonAlpha: 0.16 },

  // 旋轉鏡頭（跟隨被附身單位、使其朝上）；anchorY＝單位在畫面的縱向位置(0.5置中, 越大越靠下→前方視野越長)
  camera: { scale: 1.0, followLerp: 9, rotateLerp: 8, anchorY: 0.66 },
  // 望遠/偵察（右鍵按住）：鏡頭往前帶(anchorY↓ 看更前)+微縮(scale)、降發散穩定、禁奔跑。
  // toggle＝改成切換模式(留給未來 option)；sensMul＝望遠時滑鼠靈敏度倍率(留給未來 option)。
  scope: { anchorY: 0.82, scale: 0.86, spreadMul: 0.5, toggle: false, sensMul: 1.0 },

  enemy: {
    moveSpeed: 85,
    hp: 70,
    reactionDelay: 0.35,
    strength: 1.0,
    meleeApproach: 60,   // 近戰收尾：weapon.range ≤ 此值的單位，交戰且看得到目標時直接朝「目標本人」衝完最後一段（補節點導航到不了的距離）；長射程武器永不觸發
    // 敵人武器＝WEAPONS.carbine（已入目錄、可掉落/撿取/裝備）；數值在 WEAPONS 調整
  },

  // 敵人選點權重
  chargeMul: 1.7,   // 未能交火時加碼推進
  holdProxMul: 0.2, // 已能交火時壓低推進（拉開距離對射）
  ai: {
    rusher:  { tags: { rush: 20, choke: 10, patrol: 5 },               wRush: 700, wFlank: 0,   wExpose: 5,  wSight: 25 },
    flanker: { tags: { flank: 30, vantage: 15, cover: 25, patrol: 5 }, wRush: 500, wFlank: 120, wExpose: 70, wSight: 25 },
    holder:  { tags: { vantage: 25, cover: 30, choke: 12, patrol: 5 }, wRush: 200, wFlank: 0,   wExpose: 55, wSight: 35 },  // 重機槍：守點壓制、不愛推進/暴露
  },
};

const SPECIAL_TAGS = ['flank', 'vantage', 'choke'];

/* =====================================================================
   WEAPONS / ABILITIES — 資料驅動（未來可掉落/更換）
   每把武器：威力 / 射速 / 射程 / 彈速 / 發散(基礎,連射,上限,回復) / 彈夾 / 換彈 / 總彈藥 /
            迴轉速度(turnSpeed) / 稀有度(rarity)
   ===================================================================== */
// weight：重量（影響 Shift 奔跑倍率，越重跑越慢）
// pierce：穿甲值 0~1（對裝甲敵人的有效擋格率 = armor.blockChance × (1−pierce)）。
//   分級：pistol/smg/pdw/carbine=0（反人員，對甲無力）／rifle=0.5（過半穿）／dmr=0.9（裝甲可靠解）。
// pellets：單次擊發的彈丸數（霰彈）；burst：點放節奏 { size 連發數, gap 連發後停頓秒 }（重機槍）。
const WEAPONS = {
  // pistol＝底線武器（§7）：弱、永遠有、彈藥無限（不納入分配/儲備）
  pistol:{ name: 'Pistol',rarity: 'common',   weight: 0.5, damage: 10, fireRate: 6,  range: 280, projSpeed: 680, spreadBase: 2.5, spreadPerShot: 2.0, spreadMax: 12, spreadRecover: 10, magazine: 12, reloadTime: 1.1, turnSpeed: 600, pierce: 0 },
  smg:   { name: 'SMG',   rarity: 'common',   weight: 0.9, damage: 13, fireRate: 12, range: 1500, projSpeed: 740, spreadBase: 3.2, spreadPerShot: 2.6, spreadMax: 16, spreadRecover: 11, magazine: 35, reloadTime: 1.3, turnSpeed: 560, pierce: 0 },
  pdw:   { name: 'PDW',   rarity: 'uncommon', weight: 1.2, damage: 16, fireRate: 9,  range: 1500, projSpeed: 780, spreadBase: 2.2, spreadPerShot: 2.2, spreadMax: 13, spreadRecover: 9,  magazine: 40, reloadTime: 1.5, turnSpeed: 520, pierce: 0 },
  rifle: { name: 'Rifle', rarity: 'common',   weight: 1.8, damage: 22, fireRate: 7,  range: 1500, projSpeed: 840, spreadBase: 1.4, spreadPerShot: 1.8, spreadMax: 10, spreadRecover: 8,  magazine: 30, reloadTime: 1.8, turnSpeed: 440, pierce: 0.5 },
  // carbine＝敵人武器（現入目錄，可掉落/撿取/裝備）；dmr＝稀有戰利品（搜刮天花板）
  carbine:{ name:'Carbine',rarity:'common',   weight: 1.3, damage: 9,  fireRate: 3,  range: 1500, projSpeed: 640, spreadBase: 3,   spreadPerShot: 1.8, spreadMax: 14, spreadRecover: 8,  magazine: 30, reloadTime: 2.0, turnSpeed: 360, pierce: 0 },
  dmr:   { name: 'DMR',   rarity: 'rare',     weight: 2.0, damage: 34, fireRate: 3.5,range: 1600, projSpeed: 980, spreadBase: 1.0, spreadPerShot: 1.4, spreadMax: 8,  spreadRecover: 7,  magazine: 15, reloadTime: 2.0, turnSpeed: 400, pierce: 0.9 },
  // silpistol＝消音手槍（潛行）：silent＝不發槍聲(不驚動)；高單發(繞背×2 可一槍斃 70hp)、短程、彈藥＝有限亞音速彈
  silpistol:{ name:'Silenced Pistol',rarity:'uncommon', weight: 0.6, damage: 40, fireRate: 2, range: 220, projSpeed: 700, spreadBase: 1.2, spreadPerShot: 1.0, spreadMax: 6, spreadRecover: 9, magazine: 6, reloadTime: 1.4, turnSpeed: 560, pierce: 0, silent: true },

/* =====================================================================
   局外進度（meta，跨 run 持久；橫向解鎖為主，不破壞局內平衡）。
   一開始基礎內容全可用；未來新內容掛進 UNLOCKS：里程碑解 archetype/技能、情報點解 武器/裝備。
   解鎖只是「進池」，遊戲中仍 RNG 取得。鉤子先做、內容之後慢慢加。localStorage 持久。
   ===================================================================== */
CONFIG.meta = { intelPerMission: 10, intelWin: 50 };   // 結算給的情報點（面板可調）
const META_KEY = 'sleeper_meta_v1';
let meta = { intel: 0, unlocked: { weapon: {}, equip: {}, archetype: {}, ability: {} }, stats: { runs: 0, wins: 0, missions: 0, winArch: {} } };
function normalizeMeta() { if (!meta || typeof meta !== 'object') meta = {}; meta.intel = meta.intel || 0; meta.unlocked = meta.unlocked || {}; for (const k of ['weapon', 'equip', 'archetype', 'ability']) meta.unlocked[k] = meta.unlocked[k] || {}; meta.stats = meta.stats || {}; meta.stats.winArch = meta.stats.winArch || {}; }
function loadMeta() { try { const s = JSON.parse(localStorage.getItem(META_KEY)); if (s) meta = s; } catch (e) {} normalizeMeta(); }
function saveMeta() { try { localStorage.setItem(META_KEY, JSON.stringify(meta)); } catch (e) {} }
// 解鎖登錄：未來新內容掛這（base 內容不列＝永遠可用）。via:'milestone'(cond) / 'intel'(cost)；name 給 HQ 顯示。
const UNLOCKS = [   // 初始種子（之後慢慢加）。base 內容不列＝永遠可用。
  { kind: 'weapon',  id: 'ar',       via: 'intel', cost: 90, name: '突擊步槍', desc: '穩定中距、過半穿甲；進招募/loot 池' },
  { kind: 'weapon',  id: 'revolver', via: 'intel', cost: 60, name: '左輪',     desc: '副武器級、單發高穿甲' },
  { kind: 'ability', id: 'surge',    via: 'milestone', cond: s => (s.wins || 0) >= 1, req: '通關 1 次', name: '戰地手術', desc: '大量瞬補、長 CD' },
];
const unlockDef = (kind, id) => UNLOCKS.find(u => u.kind === kind && u.id === id);
const isAvailable = (kind, id) => { const u = unlockDef(kind, id); return !u || !!(meta.unlocked[kind] && meta.unlocked[kind][id]); };   // 非解鎖品(base)永遠可用
const availPool = (kind, ids) => { const p = ids.filter(id => isAvailable(kind, id)); return p.length ? p : ids; };   // 過濾未解鎖；空了保底回全集(不崩)
function checkMilestoneUnlocks() { let any = false; for (const u of UNLOCKS) if (u.via === 'milestone' && u.cond && u.cond(meta.stats) && !meta.unlocked[u.kind][u.id]) { meta.unlocked[u.kind][u.id] = true; any = true; } return any; }
function unlockWithIntel(kind, id) { const u = unlockDef(kind, id); if (!u || u.via !== 'intel' || meta.unlocked[kind][id] || meta.intel < u.cost) return false; meta.intel -= u.cost; meta.unlocked[kind][id] = true; saveMeta(); return true; }
function metaOnRunEnd(won) {   // run 結束結算：情報點 + stats + 里程碑自動解鎖 + 存檔
  meta.stats.runs = (meta.stats.runs || 0) + 1;
  meta.stats.missions = (meta.stats.missions || 0) + (typeof missionIndex === 'number' ? missionIndex : 0);
  meta.intel += CONFIG.meta.intelPerMission * (typeof missionIndex === 'number' ? missionIndex : 0) + (won ? CONFIG.meta.intelWin : 0);
  if (won) { meta.stats.wins = (meta.stats.wins || 0) + 1; for (const r of (roster || [])) if (r && r.archetypeId) meta.stats.winArch[r.archetypeId] = (meta.stats.winArch[r.archetypeId] || 0) + 1; }
  checkMilestoneUnlocks(); saveMeta();
}

const pLowHp = (u, frac) => u.hp <= u.maxHp * frac;
const onCover = (u) => onLowWall(u.pos, u.radius + CONFIG.lowWall.touchR);   // 貼掩體（低矮牆/矮掩體/可破壞矮形態）
const pStill = (u, t) => (u.stillT || 0) >= t;
// 本發發散倍率（越小越準）：据守/沉著/死守
function passiveSpreadMul(u) {
  const P = CONFIG.passive; let m = 1;
  if (hasPassive(u, 'dugin') && onCover(u)) m *= P.duginSpread;
  if (hasPassive(u, 'steady') && (pStill(u, P.steadyMinStill) || (u.id === controlledId && isScoping()))) m *= P.steadySpread;
  if (hasPassive(u, 'laststand') && pLowHp(u, P.laststandHp)) m *= P.laststandSpread;
  return m;
}
// 射速倍率（>1 更快）：斬首(passBuff)/背水(低血)
function passiveFireMul(u) {
  const P = CONFIG.passive; let m = (u.passBuffT > 0 ? (u.passBuffFire || 1) : 1);
  if (hasPassive(u, 'adrenaline') && pLowHp(u, P.adrenalineHp)) m *= P.adrenalineFire;
  return m;
}
// 移動倍率：斬首(passBuff)/背水/金蟬脫殼（皆低血）
function passiveMoveMul(u) {
  const P = CONFIG.passive; let m = (u.passBuffT > 0 ? (u.passBuffMove || 1) : 1);
  if (hasPassive(u, 'adrenaline') && pLowHp(u, P.adrenalineHp)) m *= P.adrenalineMove;
  if (hasPassive(u, 'slipaway') && pLowHp(u, P.slipawayHp)) m *= P.slipawayMove;
  return m;
}
// 受傷倍率（<1 減傷）：据守(掩體)/不動如山(靜止)/死守(低血)
function passiveDmgTakenMul(u) {
  const P = CONFIG.passive; let m = 1;
  if (hasPassive(u, 'dugin') && onCover(u)) m *= (1 - P.duginResist);
  if (hasPassive(u, 'bulwark') && pStill(u, P.bulwarkMinStill)) m *= (1 - P.bulwarkResist);
  if (hasPassive(u, 'laststand') && pLowHp(u, P.laststandHp)) m *= (1 - P.laststandResist);
  return m;
}
// 開火當下決定的傷害倍率：衝鋒(奔跑窗)/伏擊(未被偵測)
function passiveFireDmgMul(u) {
  const P = CONFIG.passive; let m = 1;
  if (hasPassive(u, 'momentum') && (u.momentumT || 0) > 0) m *= P.momentumDmg;
  if (hasPassive(u, 'ambush') && u.faction === 'player' && !u._seenNow) m *= P.ambushDmg;
  return m;
}
const breacherMul = (d) => (d <= CONFIG.passive.breacherNear ? CONFIG.passive.breacherClose : CONFIG.passive.breacherFar);
// 玩家免暴擊加成（眼觀四面 或 不動如山+靜止）
const passiveNegateCrit = (u) => u.faction === 'player' && (hasPassive(u, 'awareness') || (hasPassive(u, 'bulwark') && pStill(u, CONFIG.passive.bulwarkMinStill)));
// 擊殺者 on-kill：斬首(buff)/戰場急救(回血)
function onKillPassive(killer) {
  if (!killer || killer.faction !== 'player') return; const P = CONFIG.passive;
  if (hasPassive(killer, 'execute')) { killer.passBuffT = P.executeDur; killer.passBuffMove = P.executeMove; killer.passBuffFire = P.executeFire; }

/* =====================================================================

   ===================================================================== */
const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const angTo = (a, b) => Math.atan2(b.y - a.y, b.x - a.x);
function angDiff(a, b) { let d = a - b; while (d > Math.PI) d -= 2 * Math.PI; while (d < -Math.PI) d += 2 * Math.PI; return d; }

function segIntersect(a, b, c, d) {
  const rx = b.x - a.x, ry = b.y - a.y, sx = d.x - c.x, sy = d.y - c.y;
  const rxs = rx * sy - ry * sx;
  if (Math.abs(rxs) < 1e-9) return false;
  const qpx = c.x - a.x, qpy = c.y - a.y;
  const t = (qpx * sy - qpy * sx) / rxs;

  return t >= 0 && t <= 1 && u >= 0 && u <= 1;
}

  const abx = b.x - a.x, aby = b.y - a.y;
  const len2 = abx * abx + aby * aby || 1;
  const t = clamp(((p.x - a.x) * abx + (p.y - a.y) * aby) / len2, 0, 1);

// 兩線段最近距離（相交回 0）——給「厚牆」判定：路徑離牆中心線 ≤ 半厚 即視為撞到渲染牆面
function segSegDist(p1, p2, p3, p4) {
  if (segIntersect(p1, p2, p3, p4)) return 0;
  const c1 = closestOnSeg(p1, p3, p4), c2 = closestOnSeg(p2, p3, p4);
  const c3 = closestOnSeg(p3, p1, p2), c4 = closestOnSeg(p4, p1, p2);
  return Math.min(dist(p1, c1), dist(p2, c2), dist(p3, c3), dist(p4, c4));
}
const HALFWALL = () => CONFIG.wallThick * 0.5;
// 線段 a-b 是否打到軸對齊矩形（端點在內 或 與任一邊相交）——給區域地形(車輛/柱/掩體/煙)的子彈/視線判定
function segHitsRect(a, b, r) {
  const x2 = r.x + r.w, y2 = r.y + r.h;
  if ((a.x >= r.x && a.x <= x2 && a.y >= r.y && a.y <= y2) || (b.x >= r.x && b.x <= x2 && b.y >= r.y && b.y <= y2)) return true;
  const c0 = { x: r.x, y: r.y }, c1 = { x: x2, y: r.y }, c2 = { x: x2, y: y2 }, c3 = { x: r.x, y: y2 };
  return segIntersect(a, b, c0, c1) || segIntersect(a, b, c1, c2) || segIntersect(a, b, c2, c3) || segIntersect(a, b, c3, c0);

// 射線 origin+dir·t 打到矩形最近邊的正向 t（origin 在內回 0、無交回 null）——給迷霧視錐被區域截斷
function rayRectT(o, d, r) {

  if (o.x >= r.x && o.x <= x2 && o.y >= r.y && o.y <= y2) return 0;
  const c0 = { x: r.x, y: r.y }, c1 = { x: x2, y: r.y }, c2 = { x: x2, y: y2 }, c3 = { x: r.x, y: y2 };
  let best = null;
  for (const [p, q] of [[c0, c1], [c1, c2], [c2, c3], [c3, c0]]) { const t = raySegT(o, d, p, q); if (t != null && (best == null || t < best)) best = t; }

// 射線 origin + dir·t 與線段 a-b 的最近正向 t（無交回傳 null）
function raySegT(o, d, a, b) {
  const rx = d.x, ry = d.y, sx = b.x - a.x, sy = b.y - a.y;

  const qpx = a.x - o.x, qpy = a.y - o.y;
  const t = (qpx * sy - qpy * sx) / rxs;

  for (const w of MAP.walls) {
    const t = raySegT(o, d, { x: w.x1, y: w.y1 }, { x: w.x2, y: w.y2 });
    if (t != null && t < best) best = t;
  }
  for (const dr of MAP.doors) {           // 關閉的門也截斷視錐（低矮牆不擋視線）
    if (dr.open) continue;
    const t = raySegT(o, d, { x: dr.x1, y: dr.y1 }, { x: dr.x2, y: dr.y2 });
    if (t != null && t < best) best = t;
  }
  for (const z of (MAP.areas || [])) {    // 擋視線的區域(實體/掩體/煙幕)也截斷視錐
    if (!aMat(z).los) continue;
    const t = rayRectT(o, d, z);
    if (t != null && t < best) best = t;
  }
  return { x: o.x + d.x * best, y: o.y + d.y * best };

/* =====================================================================
   LoS / Vision — 牆面射線 + 節點可見度表 + 感知 canSee()
   （視線/子彈會被「永久牆 + 關閉的門」截斷；低矮牆矮、不擋視線）

// 可破壞地形：每塊有 HP + intact/broken 兩形態（被「擋下」的子彈扣 HP，歸零換形態；敵我子彈都算）。
// 形態阻擋輪廓：move(true 全擋 / 'slow' 減速可越 / false 通)、los(擋視線)、bullet('block'必擋 / 'glass'非穿甲擋 / 'prob'機率擋 / 'pass'穿不壞)
const DESTRUCT = {
  wall:    { move: true,   los: true,  bullet: 'block' },
  glass:   { move: true,   los: false, bullet: 'glass' },
  lowwall: { move: 'slow', los: false, bullet: 'prob'  },
  fence:   { move: true,   los: false, bullet: 'pass'  },
  flat:    { move: false,  los: false, bullet: 'pass'  },
};
const dProfile = (d) => DESTRUCT[d.cur] || DESTRUCT.flat;
const destructibles = () => MAP.destructibles || [];
// 區域地形(MAP.areas=[{x,y,w,h,mat}])材質表：同樣以 {move,los,bullet} 三軸描述（與 DESTRUCT 同語彙）。
//   move: true=全擋 / 'slow'=玩家減速+敵實體 / false=可穿過    los: true=擋視線 / false=可看穿
//   bullet: 'block'=全擋 / 'prob'=掩體機率擋 / 'pass'=穿過
const MATERIALS = {
  solid:    { move: true,   los: true,  bullet: 'block', name: '實體',   col: '74,85,102' },   // 柱子/建築/實心車體＝牆的區域版
  cover:    { move: true,   los: true,  bullet: 'prob',  name: '大型掩體', col: '96,84,68' },   // 車輛：躲後面、偶被穿
  barrier:  { move: true,   los: false, bullet: 'pass',  name: '壕溝/欄杆', col: '120,128,140' },// 走不過、看穿打穿（鐵網的區域版）
  lowcover: { move: 'slow', los: false, bullet: 'prob',  name: '矮掩體叢', col: '120,104,72' },  // 大片矮掩體：可越看越射、減速
  smoke:    { move: false,  los: true,  bullet: 'pass',  name: '煙幕',     col: '150,150,158' }, // 走得過打得過、看不穿（靜態）
};
const aMat = (a) => MATERIALS[a.mat] || MATERIALS.solid;
const areas = () => MAP.areas || [];
function segBlocked(a, b) {
  const T = HALFWALL();   // 牆/門以「離中心線 ≤ 半厚」擋視線＝撞渲染牆面
  for (const w of MAP.walls) if (segSegDist(a, b, { x: w.x1, y: w.y1 }, { x: w.x2, y: w.y2 }) <= T) return true;
  for (const d of MAP.doors) if (!d.open && segSegDist(a, b, { x: d.x1, y: d.y1 }, { x: d.x2, y: d.y2 }) <= T) return true;
  for (const d of destructibles()) if (dProfile(d).los && segIntersect(a, b, { x: d.x1, y: d.y1 }, { x: d.x2, y: d.y2 })) return true;   // 擋視線的破壞物(wall 形態)
  for (const z of areas()) if (aMat(z).los && segHitsRect(a, b, z)) return true;   // 擋視線區域(實體/掩體/煙幕)
  return false;
}
const clearLine = (a, b) => !segBlocked(a, b);
// 只看永久牆（門/低矮牆不算）——給節點可見度表，與門開關狀態無關、保持穩定
function clearLineWalls(a, b) {
  for (const w of MAP.walls) if (segIntersect(a, b, { x: w.x1, y: w.y1 }, { x: w.x2, y: w.y2 })) return false;
  return true;
}

function nearestNode(pos, requireLoS = false) {
  let best = -1, bd = Infinity;
  for (let i = 0; i < N; i++) {
    if (requireLoS && !clearLine(pos, wp(i).pos)) continue;
    const d = dist(pos, wp(i).pos);
    if (d < bd) { bd = d; best = i; }
  }
  if (best < 0) return nearestNode(pos, false);
  return best;
}
function buildNextHop() {
  const arr = new Array(N).fill(null);
  const d = new Array(N).fill(Infinity);
  const q = [extractNodeId]; d[extractNodeId] = 0;
  while (q.length) { const c = q.shift(); for (const nb of adj[c]) if (d[nb] === Infinity) { d[nb] = d[c] + 1; q.push(nb); } }
  for (let n = 0; n < N; n++) {
    if (n === extractNodeId) { arr[n] = n; continue; }
    let best = null, bd = d[n];
    for (const nb of adj[n]) if (d[nb] < bd) { bd = d[nb]; best = nb; }
    arr[n] = best != null ? best : n;
  }
  return arr;
}
// 切換作用中地圖並重建衍生表（N/adj/nodeVis/nextHop/EXTRACT/ENTRY/extractNodeId）
function buildMapDerived(key) {
  MAP = MAPS[key] || MAPS.alpha;
  EXTRACT = MAP.extractionPoints[0]; ENTRY = MAP.entryPoints[0];
  N = MAP.waypoints.length;
  adj = Array.from({ length: N }, () => []);
  for (const [a, b] of MAP.edges) { adj[a].push(b); adj[b].push(a); }
  nodeVis = Array.from({ length: N }, () => new Array(N).fill(false));
  for (let i = 0; i < N; i++) { nodeVis[i][i] = true; for (let j = i + 1; j < N; j++) { const v = clearLineWalls(wp(i).pos, wp(j).pos); nodeVis[i][j] = v; nodeVis[j][i] = v; } }
  extractNodeId = nearestNode(EXTRACT, false);
  nextHop = buildNextHop();
}
buildMapDerived('alpha');   // 載入時先建好預設圖，讓全域衍生值存在

// 感知模型（敵我共用）：有視線，且（近身內 360° 或 前方 90° 視錐內）。視錐距離無限，靠牆截斷。
// 遮蔽區（草叢）：目標所在的 bush（無則 null）。inConceal 給識別速率/可見度用。
function inBush(pos) { for (const b of (MAP.bushes || [])) if (pos.x >= b.x && pos.x <= b.x + b.w && pos.y >= b.y && pos.y <= b.y + b.h) return b; return null; }
function inConceal(pos) { return !!inBush(pos); }
function canSee(observer, targetPos) {
  if (!clearLine(observer.pos, targetPos)) return false;
  const d = dist(observer.pos, targetPos);
  if (d <= observer.senseRadius) return true;                                          // 近身感知（360°，潛行的貼太近保底）
  const tb = inBush(targetPos); if (tb && inBush(observer.pos) !== tb) return false;   // 草叢：目標在叢、觀察者不在同叢 → 隱蔽（MOBA 草叢）
  const idleEnemy = observer.faction === 'enemy' && observer.state === 'IDLE';         // 守點未警覺＝短錐、有限視距
  if (idleEnemy && d > CONFIG.stealth.idleViewRange) return false;
  const baseHalf = (observer.coneHalfDeg || CONFIG.vision.coneHalfDeg) * (idleEnemy ? CONFIG.stealth.idleConeMul : 1);
  return Math.abs(angDiff(angTo(observer.pos, targetPos), observer.facing)) <= baseHalf * Math.PI / 180;
}
function isRevealed(enemy) { return enemy.revealT > 0 || activePlayers().some(p => canSee(p, enemy.pos)); }   // 開火現形 或 被任一我方看到

// 打擊感：螢幕震動/相機踢/頓幀（皆螢幕空間，套用在 applyCam+w2s 的錨點上）
let shakeAmt = 0, shakeX = 0, shakeY = 0, kickY = 0, hitstopT = 0;
function addShakeAt(pos, amt) { if (!cam) return; const f = clamp(1 - dist(pos, cam) / 700, 0, 1); shakeAmt = Math.min(CONFIG.juice.shakeMax, shakeAmt + amt * f); }   // 依離相機遠近衰減＝遠處交火不晃爆
function hitstop(t) { if (t > hitstopT) hitstopT = t; }
let scopeHeld = false, scopeToggled = false;   // 望遠：按住 / 切換(留 toggle 鉤子)
const isScoping = () => (CONFIG.scope.toggle ? scopeToggled : scopeHeld) && scene === 'COMBAT' && controlledId != null && players[controlledId] && players[controlledId].state === 'CONTROLLED';

}
function updateCamera(dt) {

    { kind: 'reveal', to: { x: 1010, y: 240, r: 185 } },                 // 聚光移到守衛區
    { kind: 'do', fn: () => {   // 兩名守衛現身
        introGuards = [ { pos: { x: 1000, y: 215 }, facing: Math.PI, hue: 0, name: '守衛' },

  ];
}
// 守衛入隊：比照解放俘虜，但帶 RECRUIT 初始武器（用 introCast[1]/[2] 以對齊最終 roster）
function guardsJoin() {
  introGuards.forEach((g, k) => {
    const u = makePlayer(players.length, introCast[k + 1], { x: g.pos.x, y: g.pos.y });
    u.facing = g.facing; u.state = 'IDLE'; u.idleAnchor = u.facing;

}
function gateSatisfied(g) {

}

    const instant = (b.kind === 'sub' || b.kind === 'cam' || b.kind === 'do' || b.kind === 'face' || b.kind === 'reveal');
    if (!instant) b._t += dt;

}
function beatEnter(cs, b) {

  else if (b.kind === 'sub') cs.subtitle = b.text;
  else if (b.kind === 'reveal') cs.reveal = b.to;   // 聚光區（null＝回一般迷霧）
  else if (b.kind === 'cam') cs.cam = (b.to === 'follow') ? null : b.to;
  else if (b.kind === 'do') { if (b.fn) b.fn(); }
  else if (b.kind === 'face') { const a = b.actor(); a.facing = b.angle != null ? b.angle : angTo(a.pos, b.to); }
  else if (b.kind === 'move') { cs.lock = true; }
  else if (b.kind === 'wait') { cs.lock = true; }
  else if (b.kind === 'shoot') { cs.lock = true; cs.line = null; cs.subtitle = b.text || '按下左鍵攻擊'; }
  else if (b.kind === 'gate') { cs.lock = false; cs.gate = b.on; cs.line = null; if (b.text != null) cs.subtitle = b.text; }
  else if (b.kind === 'choice') { cs.lock = true; cs.advance = false; cs.choice = b.options || []; cs.choicePick = null; cs.line = b.text ? { text: b.text, pos: b.pos } : null; }   // 對話分歧：列選項、按數字鍵選
}

    case 'move': {
      const a = b.actor(); const sp = (b.speed || CONFIG.moveSpeed) * dt;

      return dist(a.pos, b.to) < 4;
    }
    case 'shoot': {
      if (mouse.down && !b._fired) {   // 左鍵 → 處決同僚（貼背＝繞背爆擊；999 確保斃）

        if (opt.set) for (const k in opt.set) setFlag(k, opt.set[k]);
        if (opt.queue) for (const id of opt.queue) pendingEvents.push(id);
        if (opt.then && opt.then.length) cs.beats.splice(cs.i + 1, 0, ...opt.then);

// 處決用的視覺子彈（一發、貼臉，僅做演出火花；傷害已由 damageUnit 直接結算）
function spawnMuzzleBullet(p, v) { spawnHit(v.pos); for (let i = 0; i < 3; i++) particles.push(mkPart(p.pos, 60, 0.15, '#ffe08a')); }
// 結束序章 → 序章休息（含教學）。陣容＝撤出者（與 introCast 一致），失敗保底用 introCast。
function finishIntro() {
  const survivors = players.filter(p => p.state === 'EXTRACTED');
  roster = survivors.length ? survivors.map(rosterFromPlayer) : introCast.slice();
  introActive = false; cutscene = null; introGuards = []; introConsole = null;
  missionIndex = 0;

}

/* =====================================================================
   休息關 meta 流程：共用倉庫(有上限) + 臨時背包整理 + 二選一(搜刮/喚醒) + 配裝/彈藥分配
   restPhase: CHOICE(可整理) → OFFERS(搜刮三選一) / TARGET(指定升級對象) → DONE(可整理→繼續)
   ===================================================================== */
const RARITY_WEIGHT = { common: 60, uncommon: 25, rare: 12, epic: 4, legendary: 1 };
const weaponValue = (W) => W.damage * W.fireRate * (W.range / 400);   // 粗略估值（自動配裝用）
function weightedPick(ids, weightOf) { const w = ids.map(weightOf); const tot = w.reduce((a, b) => a + b, 0); let r = srand() * tot; for (let i = 0; i < ids.length; i++) { r -= w[i]; if (r <= 0) return ids[i]; } return ids[ids.length - 1]; }   // 非戰鬥(loot)＝吃種子
const rollLootWeapon = () => weightedPick(availPool('weapon', LOOT_WEAPON_IDS), id => RARITY_WEIGHT[WEAPONS[id].rarity] || 10);

// --- 倉庫容量 ---
const warehouseCap = () => roster.length * CONFIG.loadout.slotsPerMember;
const warehouseUsed = () => CONFIG.loadout.abilitiesCountTowardCap ? warehouse.length : warehouse.filter(it => it.kind === 'weapon').length;
const overCap = () => warehouseUsed() > warehouseCap();

// --- 軍械庫節點：三選一拿 武器/裝備/技能/道具 → 倉庫 → 回路線圖（不進戰鬥、不耗時）---
function enterArmory() { scene = 'ARMORY'; releasePointer(); armoryOffers = rollArmory(CONFIG.loadout.scavengeChoices); }
function rollArmory(n) {
  const weapon = () => { const id = rollLootWeapon(), W = WEAPONS[id]; return { type: 'weapon', id, label: `武器 · ${W.name}（${W.rarity}）`, color: rarityColor(W.rarity) }; };
  const equipO = () => { const id = rngPick(availPool('equip', LOOT_EQUIP_IDS)), E = EQUIPMENT[id]; return { type: 'equip', id, label: `裝備 · ${E.name}（${E.rarity}）`, color: '#9fd0e0' }; };
  const ability = () => { const id = rngPick(availPool('ability', LOOT_ABILITY_IDS)), A = ABILITIES[id]; return { type: 'ability', id, label: `技能 · ${A.name}`, color: '#c0a0ff' }; };
  const itemO = () => { const id = rngPick(LOOT_ITEM_IDS), I = ITEMS[id]; return { type: 'item', id, label: `道具 · ${I.name}`, color: '#ffd27d' }; };
  const gens = [weapon, equipO, ability, itemO];
  const offers = []; while (offers.length < n) offers.push(rngPick(gens)());
  return offers;
}
function armoryPick(i) {
  if (scene !== 'ARMORY' || !armoryOffers || i < 0 || i >= armoryOffers.length) return;
  const o = armoryOffers[i]; warehouse.push({ kind: o.type, id: o.id }); armoryOffers = null; advanceNode();
}

// --- 進入休息關：整理臨時背包（彈藥折算進儲備、item 進倉庫 haul）---
function enterRest(tutorial = false) {
  scene = 'REST'; releasePointer();
  restTutorial = tutorial;   // 序章休息＝顯示教學說明面板
  restPhase = 'CHOICE'; restOffers = null; restPick = null; restPendingUpgrade = null; restSel = null; restMsg = '';
  for (const it of backpack) {
    if (it.kind === 'weapon') { if (!isInfiniteAmmo(it.id)) ammoStock[it.id] = (ammoStock[it.id] || 0) + (it.ammo || 0); warehouse.push({ kind: 'weapon', id: it.id }); }
    else if (it.kind === 'ability') warehouse.push({ kind: 'ability', id: it.id });
    else if (it.kind === 'item') warehouse.push({ kind: 'item', id: it.id });    // 撿到的道具進倉庫（休息關配到道具槽）
    else if (it.kind === 'equip') warehouse.push({ kind: 'equip', id: it.id });   // 撿到的裝備進倉庫
  }
  backpack = [];
  ensureFileCarrier();   // 機密檔案：序章後首次進休息＝主角(第一人)背上；之後維持單一攜帶者（可在配裝卡重新指派）
}

// --- 搜刮＝純整補（零風險、無抉擇；風險集中在事件格）---
// 機制：保底抽 1 類型 + 機率追加類型；每類型抽內容(rarity 加權)，彈藥類型可給複數。純 RNG(之後可改吃種子)。
const RESUPPLY_CATS = ['ammo', 'ammo', 'ammo', 'weapon', 'weapon', 'equip', 'equip', 'item', 'item', 'ability'];   // 加權袋（彈藥較常見）
function rollResupply() {
  const got = [], cats = [rngPick(RESUPPLY_CATS)];
  if (srand() < 0.5) cats.push(rngPick(RESUPPLY_CATS));    // 機率追加第二類
  if (srand() < 0.22) cats.push(rngPick(RESUPPLY_CATS));   // 小機率第三類
  const seen = {};
  for (const c of cats) {
    if (c === 'ammo') {   // 彈藥：1~2 個武器類別各一份備彈（可複數）
      const ids = WEAPON_IDS.filter(id => !isInfiniteAmmo(id) && !WEAPONS[id].silent);
      const k = 1 + (srand() < 0.5 ? 1 : 0);
      for (let j = 0; j < k; j++) { const id = rngPick(ids), amt = WEAPONS[id].magazine * (2 + Math.floor(srand() * 3)); ammoStock[id] = (ammoStock[id] || 0) + amt; got.push(`${WEAPONS[id].name}彈+${amt}`); }
    } else if (seen[c]) { const ids = WEAPON_IDS.filter(id => !isInfiniteAmmo(id) && !WEAPONS[id].silent), id = rngPick(ids), amt = WEAPONS[id].magazine * 2; ammoStock[id] = (ammoStock[id] || 0) + amt; got.push(`${WEAPONS[id].name}彈+${amt}`); }   // 同類型重抽→改給彈藥(不重複物品)
    else if (c === 'weapon') { const id = rollLootWeapon(); warehouse.push({ kind: 'weapon', id }); got.push(WEAPONS[id].name); }
    else if (c === 'equip') { const id = rngPick(availPool('equip', LOOT_EQUIP_IDS)); warehouse.push({ kind: 'equip', id }); got.push(EQUIPMENT[id].name); }
    else if (c === 'item') { const id = rngPick(LOOT_ITEM_IDS); warehouse.push({ kind: 'item', id }); got.push(ITEMS[id].name); }
    else if (c === 'ability') { const id = rngPick(availPool('ability', LOOT_ABILITY_IDS)); warehouse.push({ kind: 'ability', id }); got.push(ABILITIES[id].name); }
    seen[c] = true;
  }
  return got;
}
function restDoScavenge() { if (restPhase !== 'CHOICE') return; const got = rollResupply(); restMsg = '整補：' + (got.join('、') || '無'); restPhase = 'DONE'; }
function pickOffer(i) {
  if (restPhase !== 'OFFERS' || !restOffers || i < 0 || i >= restOffers.length) return;
  const o = restOffers[i]; restPick = o;
  if (o.needTarget) { restPendingUpgrade = o; restPhase = 'TARGET'; restMsg = ''; return; }
  applyOffer(o, -1); restPhase = 'DONE';
}
function applyTarget(mi) {
  if (restPhase !== 'TARGET' || !restPendingUpgrade || mi < 0 || mi >= roster.length) return;
  applyOffer(restPendingUpgrade, mi); restPendingUpgrade = null; restPhase = 'DONE';
}
function applyOffer(o, mi) {
  if (o.type === 'supply') { for (const id of WEAPON_IDS) if (!isInfiniteAmmo(id) && !WEAPONS[id].silent) ammoStock[id] += o.amt; restMsg = `搜刮：全武器類彈藥 +${o.amt}`; }   // 消音亞音速彈不由補給補（維持稀少）
  else if (o.type === 'maxhp') { for (const r of roster) r.bonusMaxHp = (r.bonusMaxHp || 0) + o.amt; restMsg = `搜刮：全隊 +${o.amt} maxHP`; }
  else if (o.type === 'weapon') { warehouse.push({ kind: 'weapon', id: o.id }); restMsg = `搜刮：${WEAPONS[o.id].name} 入倉庫`; }
  else if (o.type === 'ability') { warehouse.push({ kind: 'ability', id: o.id }); restMsg = `搜刮：${ABILITIES[o.id].name} 入倉庫`; }
  else if (o.type === 'equip') { warehouse.push({ kind: 'equip', id: o.id }); restMsg = `搜刮：${EQUIPMENT[o.id].name} 入倉庫`; }
  else if (o.type === 'item') { warehouse.push({ kind: 'item', id: o.id }); restMsg = `搜刮：${ITEMS[o.id].name} 入倉庫`; }
}
// 休息轉職（pivot）：把某員 archetype 換成下一型，換樹但保留已學被動；後續升階抽新樹的對應階
function cycleArchetype(mi) {
  const r = roster[mi]; if (!r) return;
  const i = ARCHETYPE_IDS.indexOf(r.archetypeId);
  r.archetypeId = ARCHETYPE_IDS[(i + 1) % ARCHETYPE_IDS.length];
  r.disciplineOverride = null;
  restMsg = `${r.name} 轉職為 ${ARCHETYPES[r.archetypeId].name}（保留已學被動；後續升階抽新樹）`;
}

// --- 喚醒：必須先把倉庫整理到 ≤ 當前上限（§5），再 +1 隊員（容量 +slotsPerMember）---
function restDoAwaken() {
  if (restPhase !== 'CHOICE' || overCap()) return;
  const rec = makeRecruit(new Set(roster.map(r => r.name)));
  autoEquipFromWarehouse(rec);                     // 從已整理倉庫配裝；無更好者保留手邊武器（§4/§7）
  roster.push(rec);
  restMsg = `喚醒 ${rec.name}（${ARCHETYPES[rec.archetypeId].name}）入隊`;
  restPhase = 'DONE';
}
function autoEquipFromWarehouse(rec) {
  let bestIdx = -1, bestVal = weaponValue(WEAPONS[rec.weaponId]);
  warehouse.forEach((it, idx) => { if (it.kind === 'weapon') { const v = weaponValue(WEAPONS[it.id]); if (v > bestVal) { bestVal = v; bestIdx = idx; } } });
  if (bestIdx >= 0) { rec.weaponId = warehouse[bestIdx].id; warehouse.splice(bestIdx, 1); rec.allocatedAmmo = 0; }
}

function restDoContinue() {
  if (restPhase !== 'DONE' || overCap()) return;
  restSel = null; restTutorial = false;
  if (roadCurrent == null) { scene = 'MAP'; releasePointer(); }   // 序章休息（未選過節點）→ 進路線圖
  else advanceNode();                                             // 正式 REST 節點 → 開放後繼
}

// --- 配裝/彈藥管理（CHOICE 與 DONE 階段皆可操作）。slot：1=主武器 / 2=副武器 ---
const WF = (slot) => (slot === 2 ? 'weaponId2' : 'weaponId');     // 武器欄位
const AF = (slot) => (slot === 2 ? 'allocatedAmmo2' : 'allocatedAmmo');  // 備彈欄位
function setMemberWeapon(mi, newId, slot = 1) {
  const r = roster[mi], wf = WF(slot), af = AF(slot), oldId = r[wf];
  if (oldId !== newId) { if (oldId && !isInfiniteAmmo(oldId)) ammoStock[oldId] = (ammoStock[oldId] || 0) + (r[af] || 0); r[af] = 0; }
  r[wf] = newId;
}
function equipWeaponFromWarehouse(whIdx, mi, slot = 1) {
  const it = warehouse[whIdx]; if (!it || it.kind !== 'weapon') return;
  const oldId = roster[mi][WF(slot)]; warehouse.splice(whIdx, 1); setMemberWeapon(mi, it.id, slot);
  if (oldId && !isInfiniteAmmo(oldId)) warehouse.push({ kind: 'weapon', id: oldId });   // 底線武器換下即消失
  restSel = null;
}
function unequipWeapon(mi, slot = 1) { const oldId = roster[mi][WF(slot)]; setMemberWeapon(mi, FLOOR_WEAPON, slot); if (oldId && !isInfiniteAmmo(oldId)) warehouse.push({ kind: 'weapon', id: oldId }); }   // 卸下→回倉、該槽回底線 pistol
function equipAbilityFromWarehouse(whIdx, mi) {
  const it = warehouse[whIdx]; if (!it || it.kind !== 'ability') return;
  const oldId = roster[mi].abilityId; warehouse.splice(whIdx, 1); roster[mi].abilityId = it.id;
  if (oldId) warehouse.push({ kind: 'ability', id: oldId }); restSel = null;
}
function unequipAbility(mi) { const oldId = roster[mi].abilityId; if (!oldId) return; roster[mi].abilityId = null; warehouse.push({ kind: 'ability', id: oldId }); }
// 通用裝備/道具槽（kind 'equip'→field 'equipId'；kind 'item'→field 'itemId'）
function equipGearFromWarehouse(whIdx, mi, kind, field) {
  const it = warehouse[whIdx]; if (!it || it.kind !== kind) return;
  const oldId = roster[mi][field]; warehouse.splice(whIdx, 1); roster[mi][field] = it.id;
  if (oldId) warehouse.push({ kind, id: oldId }); restSel = null;
}
function unequipGear(mi, kind, field) { const oldId = roster[mi][field]; if (!oldId) return; roster[mi][field] = null; warehouse.push({ kind, id: oldId }); }
function discardWarehouse(whIdx) { if (whIdx >= 0 && whIdx < warehouse.length) warehouse.splice(whIdx, 1); restSel = null; }
function allocAmmo(mi, dir, slot = 1) {
  const r = roster[mi], wf = WF(slot), af = AF(slot), type = r[wf]; if (!type || isInfiniteAmmo(type)) return;
  const step = WEAPONS[type].magazine;
  if (dir > 0) { const take = Math.min(step, ammoStock[type] || 0); r[af] = (r[af] || 0) + take; ammoStock[type] -= take; }
  else { const give = Math.min(step, r[af] || 0); r[af] -= give; ammoStock[type] = (ammoStock[type] || 0) + give; }
}

/* =====================================================================
   Possession
   ===================================================================== */
const activePlayers = () => players.filter(p => p.state === 'CONTROLLED' || p.state === 'IDLE' || p.state === 'EXTRACTING');

function possess(i) {
  const u = players[i];
  if (!u || u.state === 'DEAD' || u.state === 'EXTRACTED') return;
  if (controlledId != null && controlledId !== i) {
    const c = players[controlledId];
    if (c.state === 'CONTROLLED') { c.idleAnchor = c.facing; c.state = 'IDLE'; }  // 記住交回待機時的正前方
  }
  controlledId = i;
  if (u.state === 'EXTRACTING') {
    Input.aim = u.facing;     // 護送：保持撤離自走、滑鼠可轉視野，任一指令才奪回（不中斷撤離）
  } else {
    u.state = 'CONTROLLED'; u.extractNode = null;
    u.facing = u.idleAnchor;  // 接手時正面恢復到該單位「進入閒置時的正前方」
    Input.aim = u.idleAnchor;
  }
}
// 護送中（controlledId 指向 EXTRACTING 單位）收到任一指令 → 奪回手動、撤離中斷
function seizeIfEscorting() {
  if (controlledId == null) return false;
  const u = players[controlledId];
  if (!u || u.state !== 'EXTRACTING') return false;
  u.state = 'CONTROLLED'; u.extractNode = null;
  return true;
}
function toggleExtract() {   // H：當前單位撤離↔取消（撤離後留在 controlledId＝進入護送）
  if (controlledId == null) return;
  const u = players[controlledId];
  if (u.state === 'CONTROLLED') {
    u.idleAnchor = u.facing;  // 撤離途中的 overwatch 也以當前正前方為錨
    u.state = 'EXTRACTING'; u.extractNode = null;
    Input.aim = u.facing;

function extractAll() {   // Shift+H：全體撤離（CONTROLLED/IDLE 全轉 EXTRACTING），挑一名護送
  let escortId = controlledId;

  }

    for (const p of players) { if (p.state !== 'EXTRACTING') continue; const d = dist(p.pos, EXTRACT); if (d < bd) { bd = d; best = p.id; } }

function autoPossess(fromPos) {

  const pick = (state) => {
    let best = -1, bd = Infinity;
    for (const p of players) { if (p.state !== state) continue; const d = fromPos ? dist(p.pos, fromPos) : p.id; if (d < bd) { bd = d; best = p.id; } }
    return best;

   Combat — 開火(發散) / 換彈 / 彈藥 / 子彈 / 傷害 / 死亡

// 雙武器換槍：active 與 weapon2 對調；抽出時間隨抽出武器 weight（換槍期間不能開火）。重算 active 的 turnSpeed。
function swapWeapon(u) {
  if (!u || !u.weapon2 || u.swapT > 0) return false;
  const cur = { weaponId: u.weaponId, weapon: u.weapon, magazine: u.magazine, ammoInMag: u.ammoInMag, ammoReserve: u.ammoReserve, reloadT: u.reloadT, reloadDur: u.reloadDur, bloom: u.bloom };
  const n = u.weapon2;
  u.weaponId = n.weaponId; u.weapon = n.weapon; u.magazine = n.magazine; u.ammoInMag = n.ammoInMag; u.ammoReserve = n.ammoReserve; u.reloadT = n.reloadT; u.reloadDur = n.reloadDur; u.bloom = n.bloom;
  u.weapon2 = cur;
  u.swapT = CONFIG.weaponSwap.base + (u.weapon.weight || 0) * CONFIG.weaponSwap.perWeight;
  u.turnSpeed = u.weapon.turnSpeed * (u.turnMul || 1);   // 抽出武器的轉向手感
  Sfx.play('reload', u.pos);
  return true;
}
// spreadDeg：本發實際發散；bloomAdd>0 才累積連射發散。回傳是否真的開了一槍。
function fireUnit(u, angle, spreadDeg, fireRateMult, bloomAdd) {
  const W = u.weapon;
  if (u.reloadT > 0 || u.fireCooldown > 0 || u.swapT > 0) return false;   // 換槍期間不能開火
  if (u.ammoInMag <= 0) { startReload(u); return false; }
  const pellets = W.pellets || 1;   // 霰彈：單次擊發多顆彈丸，各自抽散布
  const spreadF = (u.spreadMul || 1) * passiveSpreadMul(u);   // 裝備(穩定器) + 被動(据守/沉著/死守)
  const dmgF = passiveFireDmgMul(u);                          // 被動(衝鋒/伏擊)：開火當下決定
  const isPlayer = u.faction === 'player';
  if (isPlayer) u.regenT = 0;                                 // 開火＝在戰鬥（清戰場急救脫戰計時）
  for (let p = 0; p < pellets; p++) {
    const a = angle + (Math.random() * 2 - 1) * spreadDeg * spreadF * Math.PI / 180;
    bullets.push({
      x: u.pos.x + Math.cos(angle) * (u.radius + 2), y: u.pos.y + Math.sin(angle) * (u.radius + 2),
      vx: Math.cos(a) * W.projSpeed * CONFIG.juice.bulletSpeedMul, vy: Math.sin(a) * W.projSpeed * CONFIG.juice.bulletSpeedMul,   // 近 hitscan（碰撞已是掃描式、不穿透）
      dmg: W.damage * dmgF, faction: u.faction, range: W.range, traveled: 0,
      ox: u.pos.x, oy: u.pos.y,   // 發射原點（低矮牆「貼牆可越射」判定用）
      pierce: W.pierce || 0,      // 穿甲：對裝甲敵人的擋格率衰減
      breacher: hasPassive(u, 'breacher'), suppress: hasPassive(u, 'suppress'), shooterId: isPlayer ? u.id : -1,   // 被動：命中時依距離/壓制套用、擊殺歸屬
    });
  }
  u.ammoInMag--;
  u.fireCooldown = (1 / W.fireRate) / (fireRateMult * (u.buffFire || 1) * passiveFireMul(u));   // 道具(腎上腺素) + 被動(斬首/背水)可加射速
  if (bloomAdd) u.bloom = Math.min(W.spreadMax * (hasPassive(u, 'spray') ? CONFIG.passive.sprayMaxMul : 1), u.bloom + bloomAdd);   // 掃射：連射 bloom 上限更低
  u.muzzle = W.silent ? 0.02 : 0.05;
  if (u.faction === 'enemy' && !W.silent) u.revealT = CONFIG.stealth.fireReveal;   // 敵人開火＝槍口火光暴露位置（對玩家現形，含草叢/霧中）
  u.recoil = CONFIG.juice.recoil;   // 開火後座（繪製時往後彈、快速回正）
  if (u.faction === 'player' && u.id === controlledId) { kickY += CONFIG.juice.camKick; addShakeAt(u.pos, CONFIG.juice.shakeFire); }   // 你的槍＝相機踢+微震
  Sfx.play(W.silent ? 'silshot' : (W.pellets ? 'shotgun' : 'shot'), u.pos);   // 開火音效接縫（pos→邊框聲音提示）
  if (u.ammoInMag <= 0) startReload(u);
  if (u.faction === 'player' && !W.silent) alertEnemiesNear(u.pos, hasPassive(u, 'lightstep') ? CONFIG.enemyHearRadius * CONFIG.passive.lightstepHear : CONFIG.enemyHearRadius);   // 槍聲驚動半徑；輕步＝半徑更小
  return true;
}
// 玩家開火的「槍聲」：半徑內 IDLE 敵人轉入 ENGAGED（latch）
function alertEnemiesNear(pos, radius) {
  const r = radius || CONFIG.enemyHearRadius;
  for (const e of enemies) if (!e.dead && e.state === 'IDLE' && dist(e.pos, pos) <= r) e.state = 'ENGAGED';
}
const unitMag = (u) => u.magazine || u.weapon.magazine;   // 有效彈夾（裝備可改）
function startReload(u) {
  if (u.reloadT > 0 || u.ammoReserve <= 0 || u.ammoInMag >= unitMag(u)) return;
  u.reloadDur = u.weapon.reloadTime * (u.reloadMul || 1);   // 裝備(快卸彈匣)可加速
  u.reloadT = u.reloadDur;
  Sfx.play('reload');   // 換彈音效接縫
}
function tickAmmo(u, dt) {
  if (u.reloadT > 0) {
    u.reloadT -= dt;
    if (u.reloadT <= 0) {
      u.reloadT = 0;
      const take = Math.min(unitMag(u) - u.ammoInMag, u.ammoReserve);
      u.ammoInMag += take; u.ammoReserve -= take;
    }
  }
  if (u.swapT > 0) u.swapT -= dt;   // 換槍冷卻
  if (u.bloom > 0) u.bloom = Math.max(0, u.bloom - u.weapon.spreadRecover * dt);
  if (u.buffT > 0) { u.buffT -= dt; if (u.buffT <= 0) { u.buffT = 0; u.buffMove = 1; u.buffFire = 1; } }  // 道具短時 buff 倒數
}
// 手動：基礎+連射 bloom（玩家的扳機紀律＝技巧）。待機：固定平庸發散、不累積 bloom、射速慢。敵人：同手動會 bloom。
// 技能（僅手動可用，待機不放）：目前佔位＝恢復少量生命，有 CD
function useAbility(u) {
  if (!u || u.state !== 'CONTROLLED' || !u.ability || u.abilityCd > 0) return;
  const a = u.ability;
  if (a.heal) { u.hp = Math.min(u.maxHp, u.hp + a.heal); spawnHeal(u.pos); }
  u.abilityCd = a.cooldown;
}
// 道具（一次性，C 鍵；用完消失）：瞬補 / 補彈 / 短時 buff / 手榴彈
function useItem(u) {
  if (!u || u.state !== 'CONTROLLED' || !u.itemId || u.itemUsed) return;
  const it = ITEMS[u.itemId];
  if (it.heal) { u.hp = Math.min(u.maxHp, u.hp + it.heal); spawnHeal(u.pos); }
  if (it.refill) { u.ammoInMag = unitMag(u); if (!isInfiniteAmmo(u.weaponId)) u.ammoReserve += unitMag(u) * 2; spawnPickup(u.pos); }
  if (it.buff) { u.buffT = it.buff.dur; u.buffMove = it.buff.moveMul || 1; u.buffFire = it.buff.fireRateMul || 1; spawnHeal(u.pos); }
  if (it.grenade) throwGrenade(u, it.grenade);

}
// 手榴彈：朝瞄準方向「丟出去」一顆會飛的手榴彈→落點才 360° 炸開散射一批彈丸（不算爆破半徑，威力＝被幾顆打中＝中心密/遠處稀，自然衰減）。
function throwGrenade(u, G) {
  const ang = u.facing;
  const land = rayHit(u.pos, ang, G.throwRange || 230);          // 投擲方向的落點（被牆截斷＝不穿牆）
  const max = Math.max(0, dist(u.pos, land) - 6);                // 略收回避免炸在牆裡
  const spd = G.throwSpeed || 520;                               // 飛行速度（看得到拋出，不套近 hitscan 倍率）
  grenades.push({ x: u.pos.x, y: u.pos.y, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd, dist: 0, max, faction: u.faction, G, spin: 0 });
  Sfx.play('throw', u.pos);
}
// 落點炸開：360° 均勻散射一批彈丸（沿用子彈管線）。中心被多顆打中、遠處稀疏＝威力自然衰減。
function detonateGrenade(x, y, faction, G) {
  const mul = CONFIG.juice.bulletSpeedMul;
  for (let i = 0; i < G.pellets; i++) {
    const a = (i / G.pellets) * Math.PI * 2 + (Math.random() * 2 - 1) * 0.13;   // 360° 均勻 + 抖動
    bullets.push({ x, y, vx: Math.cos(a) * G.projSpeed * mul, vy: Math.sin(a) * G.projSpeed * mul, dmg: G.dmg, faction, range: G.range, traveled: 0, ox: x, oy: y, pierce: G.pierce || 0 });
  }
  for (let i = 0; i < 18; i++) particles.push(mkPart({ x, y }, 240, 0.4, i % 2 ? '#ffd27a' : '#ff8a3a'));   // 爆閃粒子
  pushDecal(x, y, 14, 'rgba(40,28,18,0.45)');   // 焦痕
  addShakeAt({ x, y }, CONFIG.juice.shakeKill);   // 震動(目前 config 為 0，可面板開)
  Sfx.play('grenade', { x, y });                  // 音效接縫 + 邊框聲音提示
}
// 飛行更新：沿投擲方向前進，飛到落點(或撞牆/超距)即炸開
function updateGrenades(dt) {
  for (let i = grenades.length - 1; i >= 0; i--) {
    const g = grenades[i];
    g.x += g.vx * dt; g.y += g.vy * dt; g.dist += Math.hypot(g.vx, g.vy) * dt; g.spin += dt * 14;

  }
}
function drawGrenades() {
  for (const g of grenades) {

    ctx.fillStyle = '#3a4a3a'; ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#9fd07a'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(-4, 0); ctx.lineTo(4, 0); ctx.stroke();   // 旋轉的小手榴彈

// 交戰姿態（E=engage 主動 / Q=defend 防守）：設在指定單位，影響其非附身時的 overwatch 開火條件（idleTick）
function setStance(u, s) { if (u && (s === 'engage' || s === 'defend')) { u.stance = s; Sfx.play('stance'); } }

// 手動：基礎+連射 bloom（玩家扳機紀律＝技巧）。敵人：同手動會 bloom。
const manualFire = (u, ang) => fireUnit(u, ang, (u.weapon.spreadBase + u.bloom) * (isScoping() ? CONFIG.scope.spreadMul : 1), 1, u.weapon.spreadPerShot);   // 望遠＝降發散穩定
const enemyFire  = (u, ang) => fireUnit(u, ang, (u.weapon.spreadBase + u.bloom) * (u.suppressedT > 0 ? CONFIG.passive.suppressSpread : 1), 1, u.weapon.spreadPerShot);   // 被壓制＝發散變大
// 敵人攻擊分派：ranged＝持續射擊（霰彈靠武器 pellets 自動多發）；burst＝點放掃射（打 size 發→停 gap 秒）
function enemyAttack(e, ang, dt) {
  if (e.attack !== 'burst') { enemyFire(e, ang); return; }
  if (e.burstCd > 0) { e.burstCd -= dt; return; }   // 連發後停頓（讓 bloom 回復＝掃射節奏）
  if (enemyFire(e, ang)) { e.burstLeft--; if (e.burstLeft <= 0) { e.burstLeft = e.weapon.burst.size; e.burstCd = e.weapon.burst.gap; } }
}
// 待機開火：基礎較差(spreadBase/精度倍率)＋連射 bloom；射速 ×idleFireRateMult。TAP 靠停頓讓 bloom 回復、AUTO 把 bloom 拉滿。
const idleEngageFire = (u, ang) => fireUnit(u, ang, (u.weapon.spreadBase / CONFIG.idleAccuracyMult) * (hasPassive(u, 'overwatch') ? CONFIG.passive.overwatchSpread : 1) + u.bloom, CONFIG.idleFireRateMult, u.weapon.spreadPerShot);   // 警戒待命：待機 overwatch 更準

// fromAng＝攻擊來向（目標→發射原點的角度）。落在目標視野錐外＝flank（側後）。
function damageUnit(u, dmg, pierce = 0, fromAng = null) {
  const coneHalf = (u.coneHalfDeg || CONFIG.vision.coneHalfDeg) * Math.PI / 180;
  let flanked = (fromAng != null) && Math.abs(angDiff(fromAng, u.facing)) > coneHalf;   // 錐外＝繞背
  if (flanked && passiveNegateCrit(u)) flanked = false;                                    // 眼觀四面/不動如山(靜止)：玩家不吃暴擊加成（仍有正面減傷）
  const surprise = (u.faction === 'enemy' && u.state === 'IDLE');                          // 閒置敵人被突襲（僅對敵）
  const mult = flanked ? CONFIG.flank.flankMult : (surprise ? CONFIG.flank.surpriseMult : 1);  // 取較高、不相乘
  if (u.faction === 'enemy') {

    if (!flanked && u.armor > 0 && Math.random() < u.armor * (1 - pierce)) { spawnBlock(u.pos); return; }   // 裝甲：整發擋下非穿甲（繞背無視）
  }
  const resist = flanked ? 0 : (u.dmgResist || 0);   // 繞背無視所有裝甲（含玩家固定減傷＝甲只罩正面）
  u.hp -= dmg * mult * (1 - resist) * (u.faction === 'player' ? passiveDmgTakenMul(u) : 1);   // 被動減傷：据守/不動如山/死守
  if (u.faction === 'player') { u.alertTimer = CONFIG.ghostAlertTime; u.regenT = 0; }   // 受傷＝在戰鬥（清戰場急救脫戰計時）
  if (flanked || surprise) spawnCrit(u.pos); else spawnHit(u.pos);   // 繞背/突襲命中＝不同火花
  addShakeAt(u.pos, (flanked || surprise) ? CONFIG.juice.shakeHit * 1.6 : CONFIG.juice.shakeHit);   // 命中震動（依離相機衰減）
  u.hitFlash = CONFIG.juice.hitFlash;                                 // 受擊閃白

  spawnBlood(u.pos, pa); pushDecal(u.pos.x, u.pos.y, 3 + Math.random() * 3, 'rgba(122,20,28,0.5)');  // 血霧 + 地上血漬
  if (u.hp <= 0) killUnit(u);
}
function killUnit(u) {

  pushDecal(u.pos.x, u.pos.y, 8 + Math.random() * 3, 'rgba(92,15,22,0.5)');       // 死亡血池

    const wasControlled = (u.state === 'CONTROLLED') || controlledId === u.id;

    if (wasControlled) { controlledId = null; autoPossess(u.pos); }

}
// 掉落：陣亡單位的武器落在原地（底線武器不掉、無回收價值）。彈藥折算量於休息關進儲備。
function spawnDrop(u, ammo) {
  if (isInfiniteAmmo(u.weaponId)) return;

  drops.push({ pos: { x: u.pos.x, y: u.pos.y }, kind: 'weapon', id: u.weaponId, ammo });

// 開發測試：第0關地上陳列各式武器(上排)與道具(下排)＝一般掉落（走過撿進背包，到休息關再配裝/使用）
function spawnDevRack() {

function updateDrops() {

  for (let i = drops.length - 1; i >= 0; i--) {

function updateFile() {

  for (const p of activePlayers()) {
    if (dist(p.pos, fileDrop) <= CONFIG.pickupRadius) { p.hasFile = true; spawnPickup(fileDrop); fileDrop = null; return; }

/* =====================================================================

const doorMid = (d) => ({ x: (d.x1 + d.x2) / 2, y: (d.y1 + d.y2) / 2 });
// 到門「線段最近點」的距離（門很寬，量到中點會在門邊按不到）
const distToDoor = (pos, d) => dist(pos, closestOnSeg(pos, { x: d.x1, y: d.y1 }, { x: d.x2, y: d.y2 }));

  let best = null, bd = CONFIG.interactRadius;
  for (const d of MAP.doors) { const dd = distToDoor(u.pos, d); if (dd < bd) { bd = dd; best = { type: 'door', door: d }; } }
  for (const b of MAP.buttons) { const dd = dist(u.pos, { x: b.x, y: b.y }); if (dd < bd) { bd = dd; best = { type: 'button', button: b }; } }
  for (const pr of (prisoners || [])) { if (pr.freed) continue; const dd = dist(u.pos, pr.pos); if (dd < bd) { bd = dd; best = { type: 'prisoner', prisoner: pr }; } }
  if (introConsole && !introConsole.used) { const dd = dist(u.pos, introConsole); if (dd < bd) { bd = dd; best = { type: 'console' }; } }   // 序章控制台
  return best;
}
function tryInteract() {
  if (controlledId == null) return;
  const u = players[controlledId]; if (!u || u.state !== 'CONTROLLED') return;
  const it = nearestInteractable(u); if (!it) return;
  if (it.type === 'door') { it.door.open = !it.door.open; Sfx.play('door'); }
  else if (it.type === 'button') { const d = MAP.doors.find(x => x.id === it.button.doorId); if (d) d.open = !d.open; Sfx.play('door'); }

// 釋放俘虜 → 變成一名我方單位（隨機個性 + 底線 pistol；需自行撤離才永久入隊）
function freePrisoner(pr) {

  cfg.weaponId = FLOOR_WEAPON;   // 底線武器（跟喚醒 sleeper 同規則）

function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    const old = { x: b.x, y: b.y };
    b.x += b.vx * dt; b.y += b.vy * dt;
    b.traveled += Math.hypot(b.vx, b.vy) * dt;
    let gone = b.traveled > b.range;
    const TW = HALFWALL();   // 子彈撞渲染牆面（離中心線 ≤ 半厚）
    if (!gone) for (const w of MAP.walls) if (segSegDist(old, b, { x: w.x1, y: w.y1 }, { x: w.x2, y: w.y2 }) <= TW) { gone = true; break; }           // 永久牆全擋
    if (!gone) for (const dr of MAP.doors) if (!dr.open && segSegDist(old, b, { x: dr.x1, y: dr.y1 }, { x: dr.x2, y: dr.y2 }) <= TW) { gone = true; break; } // 關門全擋
    // 低矮牆＝掩體：射手貼近(<closeRange)可越射；否則 blockChance 機率擋下
    if (!gone) for (const lw of MAP.lowWalls) {
      if (!segIntersect(old, b, { x: lw.x1, y: lw.y1 }, { x: lw.x2, y: lw.y2 })) continue;
      const cp = closestOnSeg({ x: b.ox, y: b.oy }, { x: lw.x1, y: lw.y1 }, { x: lw.x2, y: lw.y2 });
      if (dist({ x: b.ox, y: b.oy }, cp) >= CONFIG.lowWall.closeRange && Math.random() < CONFIG.lowWall.blockChance) { gone = true; break; }
    }
    // 可破壞地形：依形態判擋；命中扣 HP（玻璃穿/擋都扣、矮牆被擋才扣、wall 必擋必扣），歸零換 broken 形態
    if (!gone) for (const d of destructibles()) {
      const prof = dProfile(d); if (prof.bullet === 'pass') continue;
      if (!segIntersect(old, b, { x: d.x1, y: d.y1 }, { x: d.x2, y: d.y2 })) continue;
      let blocked = false, hit = false;
      if (prof.bullet === 'block') { blocked = true; hit = true; }
      else if (prof.bullet === 'glass') { hit = true; blocked = Math.random() < (1 - (b.pierce || 0)); }   // 非穿甲擋第一槍、穿甲穿過
      else if (prof.bullet === 'prob') { const cp = closestOnSeg({ x: b.ox, y: b.oy }, { x: d.x1, y: d.y1 }, { x: d.x2, y: d.y2 }); blocked = dist({ x: b.ox, y: b.oy }, cp) >= CONFIG.lowWall.closeRange && Math.random() < CONFIG.lowWall.blockChance; hit = blocked; }

    }

    if (!gone) for (const z of areas()) {
      const bt = aMat(z).bullet; if (bt === 'pass') continue;
      if (!segHitsRect(old, b, z)) continue;
      if (bt === 'block') { gone = true; break; }
      if (bt === 'prob') {
        const cx = clamp(b.ox, z.x, z.x + z.w), cy = clamp(b.oy, z.y, z.y + z.h);
        if (dist({ x: b.ox, y: b.oy }, { x: cx, y: cy }) >= CONFIG.lowWall.closeRange && Math.random() < CONFIG.lowWall.blockChance) { gone = true; break; }
      }
    }
    if (!gone) {
      const targets = b.faction === 'player' ? enemies.filter(e => !e.dead) : activePlayers();
      for (const t of targets) if (segCircle(old, b, t.pos, t.radius)) {
        let dmg = b.dmg;
        if (b.breacher) dmg *= breacherMul(b.traveled);                                  // 破門手：命中時依距離
        const wasAlive = !t.dead && t.hp > 0;
        damageUnit(t, dmg, b.pierce || 0, angTo(t.pos, { x: b.ox, y: b.oy }));
        if (b.suppress && t.faction === 'enemy' && !t.dead) t.suppressedT = CONFIG.passive.suppressDur;   // 壓制：被射的敵發散變大
        if (wasAlive && (t.dead || t.hp <= 0) && b.faction === 'player' && b.shooterId >= 0) onKillPassive(players[b.shooterId]);   // 斬首/戰場急救
        gone = true; break;
      }

}

/* =====================================================================
   IdleAI — 待機策略（套懲罰、僅對「感知到」的敵人反應）
   ===================================================================== */
function idleTick(u, dt, lockFacing) {
  const W = u.weapon, st = u.idleStrategy;
  const turn = (u.turnSpeed || W.turnSpeed) * Math.PI / 180 * dt;

  // 感知到的最近威脅（近身或視錐內）
  let nearest = null, nd = Infinity;
  for (const e of enemies) { if (e.dead) continue; if (!canSee(u, e.pos)) continue; const d = dist(u.pos, e.pos); if (d < nd) { nd = d; nearest = e; } }

  // 視線（個性軸）。lockFacing＝true 時沿用外部設定的朝向（撤離：面向移動方向）
  if (lockFacing) {
    // 不改朝向
  } else if (st.facing === 'SWEEP') {
    u.sweepPhase += CONFIG.sweepSpeed * Math.PI / 180 * dt * u.sweepDir;
    const amp = CONFIG.sweepAmpDeg * Math.PI / 180;
    if (u.sweepPhase > amp) { u.sweepPhase = amp; u.sweepDir = -1; }
    if (u.sweepPhase < -amp) { u.sweepPhase = -amp; u.sweepDir = 1; }
    u.facing = u.idleAnchor + u.sweepPhase;                 // 以閒置正前方為中心掃視
  } else if (st.facing === 'TRACK') {
    if (nearest) u.facing = rotToward(u.facing, angTo(u.pos, nearest.pos), turn);
  } else if (st.facing === 'WANDER') {
    // 只在閒置正前方附近小幅擺動（視野不離正前方）、緩慢轉動
    u.wanderTimer -= dt;
    if (u.wanderTimer <= 0) { u.wanderTarget = u.idleAnchor + (Math.random() * 2 - 1) * CONFIG.wanderAmpDeg * Math.PI / 180; u.wanderTimer = 1.2 + Math.random() * 1.8; }
    u.facing = rotToward(u.facing, u.wanderTarget, CONFIG.wanderSpeed * Math.PI / 180 * dt);
  } // HOLD：維持閒置正前方
  if (u.alertTimer > 0) u.alertTimer -= dt;

  // 交戰目標：感知到 + 在射程內。Defend(預設)＝只打已交戰敵(不破壞潛行)；Engage＝視野內任何敵都打(會主動開戰)。被附身單位手動開火不受此限
  let target = null, td = Infinity;
  for (const e of enemies) {
    if (e.dead || st.targeting === 'NONE') continue;
    if (u.stance !== 'engage' && e.state !== 'ENGAGED') continue;
    if (!canSee(u, e.pos)) continue;
    const d = dist(u.pos, e.pos);
    if (d <= W.range && d < td) { td = d; target = e; }
  }
  let mayFire = false;
  if (st.fireMode === 'AGGRESSIVE' || st.fireMode === 'SUPPRESSIVE') mayFire = !!target;
  else if (st.fireMode === 'DEFENSIVE') mayFire = !!target && (u.alertTimer > 0 || (nearest && nd < CONFIG.ghostCloseRange));

  u.engageTimer = mayFire ? u.engageTimer + dt : 0;
  const reactDelay = CONFIG.idleReactionDelay * (hasPassive(u, 'overwatch') ? CONFIG.passive.overwatchReact : 1);   // 警戒待命：待機反應更快
  if (mayFire && u.engageTimer >= reactDelay) {
    const ang = angTo(u.pos, target.pos);
    if (st.discipline === 'AUTO') {
      idleEngageFire(u, ang);                              // 扣到底：持續噴、bloom 拉滿、耗彈快
    } else {                                               // TAP 點放：短 burst + 停頓讓 bloom 回復

      else {

}

const isSpecial = (n) => wp(n).tags.some(t => SPECIAL_TAGS.includes(t));

function scoreNode(e, n, f, engaging) {
  const node = wp(n), P = e.personality;
  let s = 0;
  for (const t of node.tags) s += (P.tags[t] || 0);
  if (!f) return s;
  const dn = dist(node.pos, f.pos);
  s += (1 - Math.min(1, dn / MAXD)) * P.wRush * (engaging ? CONFIG.holdProxMul : CONFIG.chargeMul);
  if (P.wFlank) { const a = Math.abs(angDiff(angTo(f.pos, node.pos), f.facing)); s += (a / Math.PI) * P.wFlank; }
  // 暴露：被我方「視野」覆蓋的節點扣分（用感知模型）
  let exposed = 0;
  for (const p of activePlayers()) if (canSee(p, node.pos)) exposed++;
  s -= exposed * P.wExpose * (engaging ? 1 : 0.25);
  const fn = nearestNode(f.pos, false);
  if (nodeVis[n][fn]) s += P.wSight;
  return s;
}

// 堅守/推進時的視錐朝向目標：最近、且位於朝我方那側的 waypoint
function watchPoint(e, f) {
  if (!f) return wp(e.targetNode).pos;
  const tox = f.pos.x - e.pos.x, toy = f.pos.y - e.pos.y;
  let best = null, bd = Infinity;
  for (const n of MAP.waypoints) {
    if (n.id === e.currentNode) continue;
    const dx = n.pos.x - e.pos.x, dy = n.pos.y - e.pos.y;
    if (dx * tox + dy * toy <= 0) continue;          // 只取朝我方那一側
    const d = dx * dx + dy * dy;
    if (d < bd) { bd = d; best = n; }
  }
  return best ? best.pos : f.pos;
}

// 開門：走到路徑上的關門就開（狗不會操作門）。track＝記住「自己從關開到開」的門，供巡邏走遠後關回去。

  if (!e.opensDoors) return;   // 狗：不會開門
  for (const d of MAP.doors) { if (d.open) continue; if (distToDoor(e.pos, d) <= CONFIG.interactRadius) { d.open = true; Sfx.play('door', { x: (d.x1 + d.x2) / 2, y: (d.y1 + d.y2) / 2 }); if (track) (e.openedDoors || (e.openedDoors = [])).push(d.id); } }
}
const unitNearDoor = (d, except) => enemies.some(u => !u.dead && u !== except && distToDoor(u.pos, d) <= CONFIG.interactRadius) || activePlayers().some(p => distToDoor(p.pos, d) <= CONFIG.interactRadius);

    const d = MAP.doors.find(x => x.id === id); if (!d || !d.open) return false;            // 已被關/不存在 → 移出清單
    if (distToDoor(e.pos, d) <= CONFIG.interactRadius * 1.6) return true;                    // 還沒走遠 → 留著待關
    if (unitNearDoor(d, e)) return true;                                                     // 門口有人 → 先不關（防夾人/閃爍）
    d.open = false; Sfx.play('door'); return false;                                         // 關回去
  });
}

/* ---- IDLE 巡邏（只有 type.patrols 的單位＝grunt）---- */
// 巡邏點池：地圖有 patrol 標籤點(≥2)→用之；否則自動取「距入口/撤離口都夠遠」的點；再不行＝全部點。

  if (tagged.length >= 2) return tagged;
  const R = CONFIG.patrol.autoBandFromEnds;

  const free = patrolPool.filter(n => n !== e.currentNode && !patrolClaims.has(n));

    if (e.patrolSweepPh > amp) { e.patrolSweepPh = amp; e.patrolSweepDir = -1; }
    if (e.patrolSweepPh < -amp) { e.patrolSweepPh = -amp; e.patrolSweepDir = 1; }
    e.facing = e.patrolAnchor + e.patrolSweepPh;

    e.patrolTarget = t; e.patrolPath = bfsPath(e.currentNode, t);

  const np = wp(e.patrolPath[0]).pos;

// IDLE：grunt 巡邏；其餘守原地（視錐維持 watchFacing）。不推進、不開門、不開火（看到/聽到/被打才轉 ENGAGED）

/* ---- 交戰後共享情報 + 搜索（KNOWN→SEARCH→PATROL）---- */

const resetSearch = () => { searchFocusNode = null; searchSet = null; searchCleared = null; };
