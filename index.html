}
const resetSearch = () => { searchFocusNode = null; searchSet = null; searchCleared = null; };
// 每幀算我方「被誰看到」＝共享情報；全員失去視線→以最新最後已知位置建搜索焦點、視線/走訪覆蓋清格、清光轉巡邏
function updateThreatKnowledge() {
  const act = activePlayers(); let anySeen = false;
  for (const p of act) {
    const seen = enemies.some(en => !en.dead && canSee(en, p.pos));
    p._seenNow = seen;
    if (seen) { p.lastSeenPos = { x: p.pos.x, y: p.pos.y }; p.lastSeenT = simTime; anySeen = true; }
  }
  if (anySeen) { resetSearch(); searchConsumedT = -Infinity; return; }                 // 有人看得到＝KNOWN，不搜索
  if (!enemies.some(en => !en.dead && en.state === 'ENGAGED')) { resetSearch(); return; }  // 未交戰＝交給 IDLE 巡邏
  let lead = null;   // 取最新、且尚未消費過的「最後已知位置」線索
  for (const p of act) if (p.lastSeenPos && p.lastSeenT > searchConsumedT && (!lead || p.lastSeenT > lead.lastSeenT)) lead = p;
  if (lead && searchFocusNode == null) { searchFocusNode = nearestNode(lead.lastSeenPos, false); searchSet = bfsWithin(searchFocusNode, CONFIG.hunt.searchHops); searchCleared = new Set(); searchFocusLeadT = lead.lastSeenT; }
  if (searchSet) for (const nid of searchSet) if (!searchCleared.has(nid)) { const np = wp(nid).pos; if (enemies.some(en => !en.dead && (dist(en.pos, np) < CONFIG.nodeReach || canSee(en, np)))) searchCleared.add(nid); }   // 走到 或 視線掃過＝清格
  if (searchFocusNode != null && searchSet && searchCleared.size >= searchSet.length) { searchConsumedT = searchFocusLeadT; resetSearch(); }   // 清光仍沒找到 → 轉全場巡邏（待新目擊才再建焦點）
}
function nearestKnownPlayer(pos) {   // knownGrace 內被任一敵看過的最近我方（追其「已知位置」）
  let best = null, bd = Infinity;
  for (const p of activePlayers()) { if (simTime - p.lastSeenT > CONFIG.hunt.knownGrace) continue; const d = dist(pos, p.lastSeenPos || p.pos); if (d < bd) { bd = d; best = p; } }
  return best;
}
function searchMoveTo(e, dt) {   // 走向焦點區最近的未清查節點（沿圖）
  if (e.searchTarget == null || searchCleared.has(e.searchTarget) || searchSet.indexOf(e.searchTarget) < 0) {
    let best = null, bd = Infinity;
    for (const n of searchSet) if (!searchCleared.has(n)) { const d = dist(e.pos, wp(n).pos); if (d < bd) { bd = d; best = n; } }
    e.searchTarget = best; e.searchPath = best != null ? bfsPath(e.currentNode, best) : null;
  }
  if (e.searchTarget == null) { patrolStep(e, dt); return; }
  const turn = e.weapon.turnSpeed * Math.PI / 180 * dt;
  const np = (e.searchPath && e.searchPath.length) ? wp(e.searchPath[0]).pos : wp(e.searchTarget).pos;
  moveToward(e, np, e.moveSpeed * CONFIG.patrol.speedMul * dt);
  e.facing = rotToward(e.facing, angTo(e.pos, np), turn);
  if (dist(e.pos, np) < CONFIG.nodeReach) { if (e.searchPath && e.searchPath.length) e.currentNode = e.searchPath.shift(); else e.currentNode = e.searchTarget; }
}
function huntStep(e, dt) {   // 沒有已知目標：有焦點區→清查；否則全場巡邏（ENGAGED＝完整視野錐、看到瞬間再追）
  if (searchFocusNode != null && searchSet && searchCleared && searchCleared.size < searchSet.length) searchMoveTo(e, dt);
  else patrolStep(e, dt);
}

function enemyTick(e, dt) {
  const f = nearestFriendly(e.pos);
  // 識別空窗（潛行）：IDLE 時看到玩家不立刻交戰，先累積 detect；滿才 ENGAGED。快速閃過＝累不滿。
  // （槍聲 alertEnemiesNear / 被擊中 damageUnit 仍是瞬間 ENGAGED，繞過此空窗。）
  if (e.state !== 'ENGAGED') {
    if (f && canSee(e, f.pos)) {
      const d = dist(e.pos, f.pos);
      let rate = 1 / CONFIG.stealth.identifyTime;
      if (d <= e.senseRadius) rate *= CONFIG.stealth.distNearMul;                          // 貼臉近乎瞬識
      else rate *= clamp(1.4 - d / CONFIG.stealth.idleViewRange, 0.3, 1.4);                // 近快遠慢
      if (typeof inConceal === 'function' && inConceal(f.pos)) rate *= CONFIG.stealth.concealMul;  // (Stage 2) 遮蔽放慢
      e.detect += rate * dt;
      if (e.detect >= 1) { e.detect = 1; e.state = 'ENGAGED'; }
    } else {
      e.detect = Math.max(0, e.detect - CONFIG.stealth.decay * dt);   // 失去視線 → 識別衰退
    }
    if (e.state !== 'ENGAGED') { enemyIdleTick(e, dt); return; }   // 仍守點被動
  }

  // --- ENGAGED：共享情報 → KNOWN(追已知位置/親眼才開火) 或 HUNT(搜索焦點 / 全場巡邏) ---
  if (e.openedDoors) e.openedDoors = null;   // 交戰後永不關門（清掉巡邏期的待關清單）
  const tgt = nearestKnownPlayer(e.pos);   // 任一敵人在 knownGrace 內看過的最近我方（位置全體共享）
  if (!tgt) { e.engageTimer = 0; huntStep(e, dt); openDoorsNear(e, false); return; }   // 無已知目標＝沒人看得到 → 搜索/巡邏（只開不關）
  if (e.patrolTarget != null) releasePatrol(e); e.searchTarget = null; e.searchPath = null;   // 有真目標：放掉搜索/巡邏殘留

  const aimPos = tgt.pos;                                   // 實際位置：視線/開火/收尾衝刺
  const knownPos = tgt.lastSeenPos || tgt.pos;             // 已知位置：移動/選點（不穿牆作弊）
  const fKnown = { pos: knownPos, facing: tgt.facing };
  const seen = canSee(e, aimPos);                          // 這隻親眼看到才開火
  const inRange = dist(e.pos, aimPos) <= e.weapon.range;
  const engaging = seen && inRange;

  let cands = [e.currentNode, ...adj[e.currentNode]];
  cands = [...new Set(cands)].filter(n => !(isSpecial(n) && reservations.has(n) && reservations.get(n) !== e.id));
  if (cands.length === 0) cands = [e.currentNode];

  let best = e.currentNode, bestScore = -Infinity;
  for (const n of cands) {
    let s = scoreNode(e, n, fKnown, engaging);
    if (n === e.targetNode && hysteresisOn) s += CONFIG.hysteresisBonus;
    if (s > bestScore) { bestScore = s; best = n; }
  }
  if (best !== e.targetNode) { releaseReservation(e); e.targetNode = best; commitReservation(e, best); }

  const tn = wp(e.targetNode);
  // 收尾衝刺：超短射程(近戰)看得到目標時直奔本人；長射程永不觸發
  const goalPos = (seen && e.weapon.range <= CONFIG.enemy.meleeApproach) ? aimPos : tn.pos;
  moveToward(e, goalPos, e.moveSpeed * dt);
  if (dist(e.pos, tn.pos) < CONFIG.nodeReach) e.currentNode = e.targetNode;

  const turn = e.weapon.turnSpeed * Math.PI / 180 * dt;
  if (seen) {
    const ang = angTo(e.pos, aimPos);
    e.facing = rotToward(e.facing, ang, turn * 2);
    if (inRange) { e.engageTimer += dt; if (e.engageTimer >= CONFIG.enemy.reactionDelay) enemyAttack(e, ang, dt); }
    else e.engageTimer = 0;
  } else {
    e.engageTimer = 0;
    e.facing = rotToward(e.facing, angTo(e.pos, watchPoint(e, fKnown)), turn);  // 朝已知位置那側推進
  }
  openDoorsNear(e, false);   // 交戰中只開不關（追擊破門）
}

/* =====================================================================
   Extraction — EXTRACTING 自走（沿圖直線、保留 overwatch）
   ===================================================================== */
function extractTick(u, dt) {
  if (u.extractNode == null) u.extractNode = nearestNode(u.pos, true);
  if (u.extractNode !== extractNodeId && dist(u.pos, wp(u.extractNode).pos) < CONFIG.nodeReach) {
    const nx = nextHop[u.extractNode]; if (nx != null) u.extractNode = nx;
  }
  const goal = (u.extractNode === extractNodeId) ? EXTRACT : wp(u.extractNode).pos;
  const turn = (u.turnSpeed || u.weapon.turnSpeed) * Math.PI / 180 * dt;
  if (u.id === controlledId) u.facing = rotToward(u.facing, Input.aim, turn);         // 護送：滑鼠自由轉視野（不中斷撤離）
  else u.facing = rotToward(u.facing, angTo(u.pos, goal), turn);                      // 自走：面向移動方向
  moveToward(u, goal, CONFIG.moveSpeed * lowWallSpeedMult(u.pos) * (u.moveMul || 1) * dt);   // 低矮牆減速 + 裝備
  for (const d of MAP.doors) if (!d.open && distToDoor(u.pos, d) <= CONFIG.interactRadius) { d.open = true; Sfx.play('door'); }   // 自走撤離也會開路上的門（不被關門卡死＝softlock）
  idleTick(u, dt, true);   // 保留待機開火，但不改朝向（朝向已由上方決定）
}

/* =====================================================================
   Movement helpers
   ===================================================================== */
// Shift 奔跑倍率：隨武器重量遞減（夾在 minMult..base）
const sprintMult = (u) => clamp(CONFIG.sprint.base - (u.weapon.weight - 1) * CONFIG.sprint.weightPenalty, CONFIG.sprint.minMult, CONFIG.sprint.base);

function moveToward(u, goal, step) {
  const d = dist(u.pos, goal); if (d < 1e-3) return;
  const k = Math.min(step, d) / d;
  u.pos.x += (goal.x - u.pos.x) * k; u.pos.y += (goal.y - u.pos.y) * k;
}
function pushOutSeg(u, x1, y1, x2, y2) {
  const cp = closestOnSeg(u.pos, { x: x1, y: y1 }, { x: x2, y: y2 });
  const dx = u.pos.x - cp.x, dy = u.pos.y - cp.y, d = Math.hypot(dx, dy);
  if (d < u.radius) { const push = u.radius - d, nx = d > 1e-6 ? dx / d : 1, ny = d > 1e-6 ? dy / d : 0; u.pos.x += nx * push; u.pos.y += ny * push; }
}
function collideWalls(u) {
  for (const w of MAP.walls) pushOutSeg(u, w.x1, w.y1, w.x2, w.y2);
  for (const dr of MAP.doors) if (!dr.open) pushOutSeg(u, dr.x1, dr.y1, dr.x2, dr.y2);   // 關門擋全部單位
  if (u.faction === 'enemy') for (const lw of MAP.lowWalls) pushOutSeg(u, lw.x1, lw.y1, lw.x2, lw.y2); // 低矮牆＝對敵實體（繞行）
  for (const d of destructibles()) {   // 破壞物：move===true 全擋；'slow'(矮牆形態) 沿用低矮牆＝僅對敵實體
    const mv = dProfile(d).move;
    if (mv === true || (mv === 'slow' && u.faction === 'enemy')) pushOutSeg(u, d.x1, d.y1, d.x2, d.y2);
  }
}
// 玩家是否貼著低矮牆（→ 移動減速）。低矮牆不擋玩家、只拖慢。破壞物的矮牆形態同樣減速。
function onLowWall(pos, r) {
  for (const lw of MAP.lowWalls) { const cp = closestOnSeg(pos, { x: lw.x1, y: lw.y1 }, { x: lw.x2, y: lw.y2 }); if (dist(pos, cp) < r) return true; }
  for (const d of destructibles()) { if (dProfile(d).move !== 'slow') continue; const cp = closestOnSeg(pos, { x: d.x1, y: d.y1 }, { x: d.x2, y: d.y2 }); if (dist(pos, cp) < r) return true; }
  return false;
}
const lowWallSpeedMult = (pos) => onLowWall(pos, CONFIG.unitRadius + CONFIG.lowWall.touchR) ? CONFIG.lowWall.slow : 1;
function separate(units) {
  for (let i = 0; i < units.length; i++) for (let j = i + 1; j < units.length; j++) {
    const a = units[i], b = units[j];
    const dx = b.pos.x - a.pos.x, dy = b.pos.y - a.pos.y, d = Math.hypot(dx, dy), min = a.radius + b.radius;
    if (d > 0 && d < min) { const push = (min - d) / 2, nx = dx / d, ny = dy / d; a.pos.x -= nx * push; a.pos.y -= ny * push; b.pos.x += nx * push; b.pos.y += ny * push; }
  }
}

/* =====================================================================
   Particles
   ===================================================================== */
function spawnHit(p) { Sfx.play('hit'); for (let i = 0; i < 4; i++) particles.push(mkPart(p, 90, 0.25, '#ffd27d')); }
function spawnBlock(p) { Sfx.play('block'); for (let i = 0; i < 6; i++) particles.push(mkPart(p, 130, 0.28, '#bcd2ff')); }   // 裝甲彈開「鏘」的火花
function spawnCrit(p) { Sfx.play('crit'); for (let i = 0; i < 9; i++) particles.push(mkPart(p, 170, 0.4, '#ff5a6e')); }     // 繞背/突襲＝紅色重擊火花
function spawnDeath(p) { Sfx.play('death'); for (let i = 0; i < 14; i++) particles.push(mkPart(p, 180, 0.5, '#ff6b6b')); }
function spawnHeal(p) { Sfx.play('heal'); for (let i = 0; i < 12; i++) particles.push(mkPart(p, 70, 0.55, '#7fffa8')); }
function spawnPickup(p) { Sfx.play('pickup'); for (let i = 0; i < 10; i++) particles.push(mkPart(p, 90, 0.5, '#ffe08a')); }
function mkPart(p, spd, life, col) { const a = Math.random() * Math.PI * 2, s = spd * (0.4 + Math.random() * 0.6); return { x: p.x, y: p.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life, max: life, col }; }
function updateParticles(dt) { for (let i = particles.length - 1; i >= 0; i--) { const q = particles[i]; q.x += q.vx * dt; q.y += q.vy * dt; q.life -= dt; if (q.life <= 0) particles.splice(i, 1); } }

/* =====================================================================
   Input
   ===================================================================== */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const fogCanvas = document.createElement('canvas');   // 離屏迷霧遮罩（避免在主畫布上 destination-out 擦掉世界）
fogCanvas.width = cv.width; fogCanvas.height = cv.height;
const fctx = fogCanvas.getContext('2d');
const keys = new Set();
const mouse = { down: false, mx: cv.width / 2, my: cv.height / 2 };
function canvasPos(ev) { const r = cv.getBoundingClientRect(); return { x: (ev.clientX - r.left) * (cv.width / r.width), y: (ev.clientY - r.top) * (cv.height / r.height) }; }

/* =====================================================================
   ── I/O 接縫（PORT MAP，為將來可能搬遷到 Phaser 預留）──
   架構分三層：① 純模擬（update(dt) 及其呼叫鏈：AI/彈道/附身/庫存/roadmap/cutscene…，
   不碰 ctx/DOM，與引擎無關，搬遷時原樣保留）② 接縫（本區 Input/Sfx）③ 轉接器（DOM/canvas
   事件處理＝目前實作；Phaser 版改寫這層即可）。**模擬層只透過 Input/Sfx 取用輸入/音效**。
   - Input：模擬讀輸入的唯一介面（鍵盤/開火/鎖定/砲塔朝向）。背後狀態(keys/mouse/pointerLocked/
     aimDir)由事件處理寫入＝轉接器；Phaser 版改成由 Phaser 輸入寫同一份背後狀態即可。
   - Sfx：音效 hook（目前 no-op；標出「何時該出聲」的接縫，將來接 WebAudio/Phaser 音訊）。
   昂貴接縫（render 門面 ctx×853、迷霧遮罩、旋轉相機、編輯器接線）刻意延後，等真的決定搬遷再做。
   ===================================================================== */
const Input = {
  held: (k) => keys.has(k),                  // 鍵盤按住（WASD/Shift）
  get fire() { return mouse.down; },         // 左鍵開火
  get locked() { return pointerLocked; },    // 滑鼠鎖定＝戰鬥推進中
  get aim() { return aimDir; }, set aim(v) { aimDir = v; },   // 砲塔目標朝向（世界角）
  get mx() { return mouse.mx; }, get my() { return mouse.my; },
};
const Sfx = { play(_id) { /* no-op 佔位：未來接 WebAudio / Phaser 音訊。呼叫點＝音效接縫 */ } };

// 點擊：戰鬥→鎖定滑鼠開始；路線圖→選節點；結算畫面→重開
cv.addEventListener('click', () => {
  if (scene === 'COMBAT') { if (!pointerLocked && cv.requestPointerLock) cv.requestPointerLock(); }
  else if (scene === 'MAP') {
    const b = editorBtnRect;
    if (b && mouse.mx >= b.x && mouse.mx <= b.x + b.w && mouse.my >= b.y && mouse.my <= b.y + b.h) { editorOpen(); return; }
    const id = roadNodeAt(mouse.mx, mouse.my); if (id != null) selectNode(id);
  }
  else if (scene === 'REST' || scene === 'ARMORY') restClick(mouse.mx, mouse.my);
  else if (scene === 'RUNEND' || scene === 'RUNWIN') initRun();
  // EDITOR：互動在 mousedown/up 處理（支援拖拉），click 不處理
});
// 休息關：命中最後繪製（最上層）的可點區域
function restClick(x, y) {
  for (let i = restRects.length - 1; i >= 0; i--) {
    const r = restRects[i];
    if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) { r.fn(); return; }
  }
}
document.addEventListener('pointerlockchange', () => {
  pointerLocked = (document.pointerLockElement === cv);
  cv.style.cursor = pointerLocked ? 'none' : 'crosshair';
  if (!pointerLocked) mouse.down = false;
});
cv.addEventListener('mousemove', e => {
  if (pointerLocked) aimDir += (e.movementX || 0) * CONFIG.mouseSensitivity * (isScoping() ? CONFIG.scope.sensMul : 1);  // 戰鬥：滑鼠位移轉向（望遠靈敏度倍率＝鉤子）
  else { const p = canvasPos(e); mouse.mx = p.x; mouse.my = p.y; }            // 選單：追蹤游標位置
});
cv.addEventListener('mousedown', e => {
  if (scene === 'EDITOR') { if (e.button === 2) editorEraseAt(snapPt({ x: mouse.mx, y: mouse.my })); else editorMouseDown(); return; }
  if (scene !== 'COMBAT' || !pointerLocked) return;
  if (cutscene && cutscene.lock) {   // 演出：有對白→左鍵續播；無對白(處決拍)→放行 mouse.down 給 shoot 拍讀取
    if (cutscene.line) { if (e.button === 0) cutscene.advance = true; return; }
    if (e.button === 0) mouse.down = true;
    return;
  }
  if (e.button === 0) { seizeIfEscorting(); mouse.down = true; }          // 左鍵開火（護送中→立刻奪回、同幀開火）
  else if (e.button === 2) { if (CONFIG.scope.toggle) scopeToggled = !scopeToggled; else scopeHeld = true; }   // 右鍵＝望遠/偵察（按住；技能改空白鍵）
});
window.addEventListener('mouseup', e => { if (scene === 'EDITOR' && e.button === 0) { editorMouseUp(); return; } if (e.button === 0) mouse.down = false; else if (e.button === 2 && !CONFIG.scope.toggle) scopeHeld = false; });

// 編輯器滑鼠：UI 區優先(原始游標)，否則畫布放置(對齊游標)；拖拉工具於 mouseup 落筆
function editorMouseDown() {
  for (let i = editRects.length - 1; i >= 0; i--) { const r = editRects[i]; if (mouse.mx >= r.x && mouse.mx <= r.x + r.w && mouse.my >= r.y && mouse.my <= r.y + r.h) { r.fn(); return; } }
  const m = snapPt({ x: mouse.mx, y: mouse.my });
  if (isDragTool(editTool)) editDrag = m; else editorClickAt(m);
}
function editorMouseUp() {
  if (editDrag && isDragTool(editTool)) { const a = editDrag, b = snapPt({ x: mouse.mx, y: mouse.my }); if (dist(a, b) >= 8) editorCommitSeg(a, b); editDrag = null; }
}
cv.addEventListener('contextmenu', e => e.preventDefault());

// 路線圖：游標下的可選節點 id（無則 null）
function roadNodeAt(x, y) {
  for (const id of roadAvailable) {
    if (roadCompleted.has(id)) continue;
    const p = roadNodePos(roadNode(id));
    if (Math.hypot(x - p.x, y - p.y) <= 26) return id;
  }
  return null;
}

window.addEventListener('keydown', e => {
  const tgt = e.target;
  if (tgt && (tgt.tagName === 'INPUT' || tgt.tagName === 'TEXTAREA' || tgt.tagName === 'SELECT')) return;   // 面板輸入框聚焦中：不傳給遊戲
  const k = e.key.toLowerCase();
  if (k === '`' || k === '~') { toggleTuner(); e.preventDefault(); return; }   // 數值面板開關（任何場景）
  keys.add(k);
  if (e.repeat) return;

  if (scene === 'MAP') {                         // 路線圖：數字鍵選可前往節點（亦可滑鼠點選）
    if (k >= '1' && k <= '9') { const i = parseInt(k, 10) - 1; const avail = roadAvailable.filter(id => !roadCompleted.has(id)); if (i < avail.length) selectNode(avail[i]); }
    return;
  }
  if (scene === 'REST') {                        // 休息關：依流程階段（鍵盤＝便捷，主要互動為滑鼠點選）
    if (restPhase === 'CHOICE') { if (k === '1') restDoScavenge(); else if (k === '2') restDoAwaken(); }
    else if (restPhase === 'OFFERS') { if (k >= '1' && k <= '9') pickOffer(parseInt(k, 10) - 1); }
    else if (restPhase === 'TARGET') { if (k >= '1' && k <= '9') applyTarget(parseInt(k, 10) - 1); }
    else if (restPhase === 'DONE') { if (k === ' ' || k === 'enter') restDoContinue(); }
    if ((k >= '1' && k <= '9') || k === ' ' || k === 'enter') e.preventDefault();
    return;
  }
  if (scene === 'EDITOR') {                       // 編輯器：數字鍵切工具、G 格線、Esc 離開
    const tools = ['wall', 'door', 'low', 'wp', 'edge', 'spawn', 'button', 'entry', 'extract', 'erase'];
    if (k >= '1' && k <= '9') { editTool = tools[parseInt(k, 10) - 1] || editTool; editSelWp = null; }
    else if (k === '0') editTool = 'erase';
    else if (k === 'p') { editTool = 'prisoner'; editSelWp = null; }
    else if (k === 'b') { editTool = 'bush'; editSelWp = null; }   // 草叢（拖拉矩形）
    else if (k === 'c') { editTool = 'destruct'; editSelWp = null; }   // 可破壞地形（拖線段）
    else if (k === 'v') editDestructPreset = (editDestructPreset + 1) % DESTRUCT_PRESETS.length;   // 循環破壞物預設
    else if (k === 'g') editSnap = editSnap ? 0 : 20;
    else if (k === 'escape') editorExit();
    return;
  }
  if (scene === 'ARMORY') { if (k >= '1' && k <= '9') armoryPick(parseInt(k, 10) - 1); return; }
  if (scene === 'RUNEND' || scene === 'RUNWIN') { if (k === 'r') initRun(); return; }
  if (scene === 'SANDBOX') return;   // 設定畫面以 DOM 表單操作，不接遊戲鍵

  // --- COMBAT ---
  if (introActive && k === 'escape') { skipIntro(); e.preventDefault(); return; }   // 第0關：Esc 跳過演出（休息關仍進）
  if (cutscene && cutscene.lock) {   // 演出鎖控制：只接受對白續播，其餘戰鬥鍵封鎖
    if ((k === ' ' || k === 'enter') && cutscene.line) { cutscene.advance = true; e.preventDefault(); }
    return;
  }
  if (fromSandbox && k === 'backspace') { fromSandbox = false; forcedMap = null; sandboxLast = { aborted: true }; enterSandbox(); e.preventDefault(); return; }
  if (fromEditor && k === 'backspace') { fromEditor = false; forcedMap = null; scene = 'EDITOR'; releasePointer(); editMsg = '已中止試玩，回到編輯器'; e.preventDefault(); return; }
  if (k >= '1' && k <= '9') {
    const i = parseInt(k, 10) - 1;
    const handover = CONFIG.switchHandoverMs / 1000;
    if (i < players.length && i !== controlledId && (simTime - lastSwitchT) >= handover) { possess(i); lastSwitchT = simTime; }  // 切到撤離中單位＝護送(不中斷)
  }
  if (k === 'h') { if (e.shiftKey) extractAll(); else toggleExtract(); }                  // H 撤離(進入護送) / Shift+H 全體撤離
  if (k === ' ') { seizeIfEscorting(); if (controlledId != null) useAbility(players[controlledId]); }  // 空白鍵=技能（右鍵亦可）；護送中→奪回
  if (k === 'r') { seizeIfEscorting(); if (controlledId != null) startReload(players[controlledId]); } // 換彈；護送中→奪回
  if (k === 'c') { seizeIfEscorting(); if (controlledId != null) useItem(players[controlledId]); }     // 道具(原 Q)；護送中→奪回
  if (k === 'f') { seizeIfEscorting(); tryInteract(); }                                                // 互動：開關門/按鈕(原 E)；護送中→奪回
  if (k === 'e' && controlledId != null) setStance(players[controlledId], 'engage');                   // 姿態：主動清場（不奪回護送）
  if (k === 'q' && controlledId != null) setStance(players[controlledId], 'defend');                   // 姿態：防守(現行閒置)（不奪回護送）
  if (k === 'g') debugView = !debugView;
  if (k === 'j') hysteresisOn = !hysteresisOn;   // (debug) 原 H，因 H 改作撤離而移位
  if ([' ', 'w', 'a', 's', 'd'].includes(k)) e.preventDefault();
});
window.addEventListener('keyup', e => { const t = e.target; if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.tagName === 'SELECT')) return; keys.delete(e.key.toLowerCase()); });

/* =====================================================================
   Update — 固定時間步
   ===================================================================== */
function update(dt) {
  if (scene !== 'COMBAT') return;   // MAP/REST/結算：不模擬、不需鏡頭（此時 cam/players 可能尚未建立）
  if (!Input.locked) return;        // 戰鬥：滑鼠鎖定後才開始/繼續推進（未鎖定＝暫停）
  if (cutscene) cutsceneTick(dt);   // 第0關演出導演（推進節拍）
  updateCamera(dt);
  shakeAmt = Math.max(0, shakeAmt - CONFIG.juice.shakeDecay * dt); kickY *= Math.exp(-CONFIG.juice.shakeDecay * dt);   // 震動/相機踢衰減
  if (cutscene && cutscene.lock) return;   // 演出鎖控制：只跑鏡頭/演出，不跑常規 sim

  for (const p of players) { if (p.fireCooldown > 0) p.fireCooldown -= dt; if (p.muzzle > 0) p.muzzle -= dt; if (p.recoil > 0) p.recoil = Math.max(0, p.recoil - CONFIG.juice.recoilDecay * dt); if (p.abilityCd > 0) p.abilityCd -= dt; tickAmmo(p, dt); }
  for (const e of enemies) { if (e.dead) continue; if (e.fireCooldown > 0) e.fireCooldown -= dt; if (e.muzzle > 0) e.muzzle -= dt; if (e.recoil > 0) e.recoil = Math.max(0, e.recoil - CONFIG.juice.recoilDecay * dt); tickAmmo(e, dt); }

  // 0) 護送 seize：護送(controlledId 指向 EXTRACTING)時，移動或開火 → 奪回手動、撤離中斷（滑鼠轉視野不算）
  if (controlledId != null && players[controlledId].state === 'EXTRACTING') {
    const moveCmd = Input.held('w') || Input.held('a') || Input.held('s') || Input.held('d');
    if (moveCmd || Input.fire) seizeIfEscorting();
  }

  // 1) 被附身單位：滑鼠轉向(turnSpeed) + 相對角色移動 + 左鍵開火
  if (controlledId != null) {
    const u = players[controlledId];
    if (u.state === 'CONTROLLED') {
      // 砲塔以「武器迴轉速度」追滑鼠輸入累積的目標朝向（追不上＝轉向延遲；裝備可改迴轉）
      u.facing = rotToward(u.facing, Input.aim, (u.turnSpeed || u.weapon.turnSpeed) * Math.PI / 180 * dt);
      let fwd = 0, strafe = 0;
      if (Input.held('w')) fwd += 1; if (Input.held('s')) fwd -= 1;
      if (Input.held('d')) strafe += 1; if (Input.held('a')) strafe -= 1;
      const moving = !!(fwd || strafe);
      u.sprinting = moving && Input.held('shift') && !isScoping();   // Shift 奔跑（望遠時禁奔跑）
      if (moving) {
        const fx = Math.cos(u.facing), fy = Math.sin(u.facing);
        const rx = Math.cos(u.facing + Math.PI / 2), ry = Math.sin(u.facing + Math.PI / 2);
        let mx = fx * fwd + rx * strafe, my = fy * fwd + ry * strafe;
        const l = Math.hypot(mx, my) || 1;
        const spd = CONFIG.moveSpeed * (u.sprinting ? sprintMult(u) : 1) * lowWallSpeedMult(u.pos) * (u.moveMul || 1) * (u.buffMove || 1);  // 低矮牆減速 + 裝備/道具
        u.pos.x += mx / l * spd * dt; u.pos.y += my / l * spd * dt;
      }
      if (Input.fire) manualFire(u, u.facing);
    }
  }

  // 2) 待機 / 撤離
  for (const p of players) { if (p.state === 'IDLE') idleTick(p, dt); else if (p.state === 'EXTRACTING') extractTick(p, dt); }

  // 3) 敵人 AI（先更新共享情報/搜索焦點，再逐一行動）
  updateThreatKnowledge();
  for (const e of enemies) if (!e.dead) enemyTick(e, dt);

  // 4) 軟計時 → 追兵
  if (simTime > curTimeBudget) {
    reinforceTimer -= dt;
    if (reinforceTimer <= 0) {
      const e = makeEnemy(nearestNode(ENTRY, false), 'rusher', true);
      e.pos = { x: ENTRY.x, y: ENTRY.y };
      e.state = 'ENGAGED';                 // 追兵是來獵殺的：直接交戰
      enemies.push(e);
      const ramps = Math.floor((simTime - curTimeBudget) / CONFIG.reinforce.rampEvery);
      reinforceTimer = Math.max(CONFIG.reinforce.minInterval, CONFIG.reinforce.startInterval + CONFIG.reinforce.rampDelta * ramps);
    }
  }

  // 5) 子彈 / 特效
  updateBullets(dt); updateParticles(dt);

  // 6) 分離 + 牆面碰撞 + 掉落物拾取
  const movers = [...activePlayers(), ...enemies.filter(e => !e.dead)];
  separate(movers);
  for (const u of movers) collideWalls(u);
  updateDrops();

  // 7) 撤離判定
  for (const p of players) {
    if ((p.state === 'CONTROLLED' || p.state === 'IDLE' || p.state === 'EXTRACTING') && dist(p.pos, EXTRACT) < CONFIG.extractRadius) {
      p.state = 'EXTRACTED'; extractedCount++;
      if (controlledId === p.id) { controlledId = null; autoPossess(p.pos); }
    }
  }

  // 7.5) 戰鬥中若沒被附身、又非刻意跟隨撤離中 → 自動接手場上其他單位（非撤離優先），不留空轉
  if (controlledId == null && activePlayers().length > 0) autoPossess(null);

  // 8) 計時 + 結算（場上無我方 → 進休息關 或 run 結束）
  simTime += dt;
  if (activePlayers().length === 0) endMission();
}

/* =====================================================================
   Render — 旋轉視角 + 戰爭迷霧
   ===================================================================== */
const hsl = (h, s, l, a = 1) => `hsla(${h},${s}%,${l}%,${a})`;
function applyCam() { ctx.translate(cv.width / 2 + shakeX, cv.height * camAnchorY + shakeY); ctx.rotate(cam.angle); ctx.scale(cam.scale, cam.scale); ctx.translate(-cam.x, -cam.y); }

function draw() {
  shakeX = 0; shakeY = 0;
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.fillStyle = CONFIG.fog.color; ctx.fillRect(0, 0, cv.width, cv.height);

  if (scene === 'SANDBOX') { drawSandboxBackdrop(); return; }
  if (scene === 'MAP') { drawRoadmap(); return; }
  if (scene === 'EDITOR') { drawEditor(); return; }
  if (scene === 'REST') { drawRest(); return; }
  if (scene === 'ARMORY') { drawArmory(); return; }
  if (scene === 'RUNEND') { drawRunEnd(); return; }
  if (scene === 'RUNWIN') { drawRunWin(); return; }

  // 鎖定滑鼠前＝黑螢幕（不洩漏場面、不破壞氣氛；全關卡適用，含第0關）
  if (!Input.locked) { drawCombatStart(); return; }

  // 打擊感：本幀螢幕震動偏移（隨機抖 + 相機踢；套用於 applyCam/w2s 錨點）
  shakeX = (Math.random() * 2 - 1) * shakeAmt; shakeY = (Math.random() * 2 - 1) * shakeAmt + kickY;

  // ---- 世界（鏡頭變換）----
  ctx.save(); applyCam();
  drawGrid(); drawBushes(); drawLowWalls(); drawDestructibles(); drawWalls(); drawDoors(); drawButtons(); drawWaypoints(); drawZonesWorld();
  drawCorpses(); drawDrops(); drawPrisoners(); drawIntroActors(); drawParticles(); drawBullets(); drawEnemies(); drawPlayers();
  if (debugView) drawDebug();
  ctx.restore();

  // ---- 戰爭迷霧（除錯時關閉）。演出鎖控制時 drawFog 改挖「聚光圈」＝重點區外全是迷霧 ----
  if (!debugView) drawFog();

  // ---- 霧上：淡牆骨架（空間參考）----
  ctx.save(); applyCam(); drawSkeleton(); ctx.restore();

  // ---- 螢幕層：血條/標記/HUD/卡片 ----（演出鎖控制時隱藏＝乾淨電影感；gate 解鎖時照常）
  if (!(cutscene && cutscene.lock)) { drawScreenOverlays(); drawHUD(); drawCards(); }
  if (cutscene) drawCutscene();   // 第0關：對話泡 + 字幕（最上層）
}

// 第0關演出 actor（守衛＝非戰鬥單位點 + 名牌；控制台＝互動標記），畫在世界層
function drawIntroActors() {
  for (const g of introGuards) {
    ctx.strokeStyle = hsl(g.hue, 60, 70); ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(g.pos.x, g.pos.y); ctx.lineTo(g.pos.x + Math.cos(g.facing) * 20, g.pos.y + Math.sin(g.facing) * 20); ctx.stroke();
    ctx.fillStyle = hsl(g.hue, 55, 45); ctx.beginPath(); ctx.arc(g.pos.x, g.pos.y, CONFIG.unitRadius, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = hsl(g.hue, 60, 72); ctx.beginPath(); ctx.arc(g.pos.x, g.pos.y, CONFIG.unitRadius, 0, Math.PI * 2); ctx.stroke();
  }
  if (introConsole && !introConsole.used) {
    const c = introConsole, pulse = 0.5 + 0.5 * Math.sin(simTime * 5);
    ctx.strokeStyle = `rgba(127,227,255,${0.5 + 0.4 * pulse})`; ctx.lineWidth = 2;
    ctx.strokeRect(c.x - 12, c.y - 10, 24, 20);
    ctx.fillStyle = '#7fe3ff'; ctx.font = 'bold 11px Consolas'; ctx.textAlign = 'center';
    ctx.fillText('密碼', c.x, c.y + 4); ctx.textAlign = 'left';
  }
}

// 第0關：對白框（下）+ 字幕/目標（上），螢幕座標
function drawCutscene() {
  const cs = cutscene;
  if (cs.subtitle) {
    ctx.textAlign = 'center';
    const tw = ctx.measureText(cs.subtitle).width;
    ctx.font = 'bold 16px Consolas';
    const w = Math.max(260, ctx.measureText(cs.subtitle).width + 48);
    ctx.fillStyle = 'rgba(10,14,20,0.78)'; ctx.fillRect(cv.width / 2 - w / 2, 22, w, 34);
    ctx.fillStyle = '#ffe08a'; ctx.fillText(cs.subtitle, cv.width / 2, 44);
    ctx.textAlign = 'left';
  }
  if (cs.line) {
    const p = cs.line.pos ? cs.line.pos() : null;
    if (p) drawSpeechBubble(w2s(p), cs.line.text);   // 對話泡：說話者頭頂、不顯姓名
  }
  if (introActive) {   // 跳過提示（右上角）
    ctx.fillStyle = 'rgba(205,214,224,0.5)'; ctx.font = '11px Consolas'; ctx.textAlign = 'right';
    ctx.fillText('Esc：跳過演出', cv.width - 14, 18); ctx.textAlign = 'left';
  }
}
// 簡易自動換行（依 measureText；headless stub 回固定寬→不換行，無例外）
function wrapText(text, maxW) {
  const out = []; let cur = '';
  for (const ch of text) {
    if (ch === '\n') { out.push(cur); cur = ''; continue; }
    const t = cur + ch;
    if (cur && ctx.measureText(t).width > maxW) { out.push(cur); cur = ch; } else cur = t;
  }
  if (cur || !out.length) out.push(cur);
  return out;
}
// 對話泡：圓角框 + 指向頭頂的小尾，置於螢幕座標 s 的上方；夾在畫面內
function drawSpeechBubble(s, text) {
  ctx.font = '15px Consolas';
  const lines = wrapText(text, 230), lh = 20, pad = 9;
  let tw = 0; for (const l of lines) tw = Math.max(tw, ctx.measureText(l).width);
  const w = tw + pad * 2, h = lines.length * lh + pad * 2 - 4;
  let bx = clamp(s.x - w / 2, 8, cv.width - w - 8);
  let by = s.y - 22 - h; if (by < 8) by = s.y + 22;   // 頭頂放不下就改放下方
  const r = 8;
  ctx.fillStyle = 'rgba(12,16,22,0.92)'; ctx.strokeStyle = 'rgba(127,227,255,0.65)'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(bx + r, by); ctx.arcTo(bx + w, by, bx + w, by + h, r); ctx.arcTo(bx + w, by + h, bx, by + h, r);
  ctx.arcTo(bx, by + h, bx, by, r); ctx.arcTo(bx, by, bx + w, by, r); ctx.closePath();
  ctx.fill(); ctx.stroke();
  // 指向頭頂的小三角尾
  const tailX = clamp(s.x, bx + 14, bx + w - 14), tipY = (by > s.y) ? by : by + h, dir = (by > s.y) ? -1 : 1;
  ctx.beginPath(); ctx.moveTo(tailX - 7, tipY); ctx.lineTo(tailX + 7, tipY); ctx.lineTo(tailX, tipY + dir * 10); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#e6edf3'; ctx.textAlign = 'center';
  lines.forEach((l, i) => ctx.fillText(l, bx + w / 2, by + pad + 14 + i * lh));
  ctx.textAlign = 'left';
}
// （備用）舊版底部對話框＋姓名，改用對話泡後不再呼叫；保留供需要時切回
function drawDialogueBoxLegacy(who, text) {
  const bx = 140, bw = cv.width - 280, by = cv.height - 150, bh = 96;
  ctx.fillStyle = 'rgba(8,11,16,0.9)'; ctx.fillRect(bx, by, bw, bh);
  ctx.strokeStyle = 'rgba(127,227,255,0.5)'; ctx.lineWidth = 2; ctx.strokeRect(bx, by, bw, bh);
  ctx.textAlign = 'left';
  ctx.fillStyle = '#7fe3ff'; ctx.font = 'bold 15px Consolas'; ctx.fillText(who || '', bx + 18, by + 28);
  ctx.fillStyle = '#e6edf3'; ctx.font = '16px Consolas'; ctx.fillText(text, bx + 18, by + 58);
}
// 鎖定滑鼠前的黑螢幕（取代「世界透出來」的暫停畫面，避免洩漏場面/破壞氣氛）
function drawCombatStart() {
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, cv.width, cv.height);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffe08a'; ctx.font = 'bold 18px Consolas';
  ctx.fillText('▶ 點擊畫面以開始', cv.width / 2, cv.height / 2 - 2);
  ctx.fillStyle = 'rgba(205,214,224,0.7)'; ctx.font = '12px Consolas';
  ctx.fillText('（滑鼠移動=轉向 · Esc=暫停）', cv.width / 2, cv.height / 2 + 22);
  ctx.textAlign = 'left';
}

function drawGrid() {
  ctx.strokeStyle = '#10151d'; ctx.lineWidth = 1;
  for (let x = 40; x <= 1240; x += 40) { ctx.beginPath(); ctx.moveTo(x, 40); ctx.lineTo(x, 680); ctx.stroke(); }
  for (let y = 40; y <= 680; y += 40) { ctx.beginPath(); ctx.moveTo(40, y); ctx.lineTo(1240, y); ctx.stroke(); }
}
function drawWalls() {
  ctx.strokeStyle = '#4a5566'; ctx.lineWidth = 6; ctx.lineCap = 'round';
  for (const w of MAP.walls) { ctx.beginPath(); ctx.moveTo(w.x1, w.y1); ctx.lineTo(w.x2, w.y2); ctx.stroke(); }
}
// 門：關＝粗琥珀實線（實體）；開＝細淡虛線（可通行）
function drawDoors() {
  ctx.lineCap = 'round';
  for (const d of MAP.doors) {
    if (d.open) { ctx.setLineDash([6, 10]); ctx.strokeStyle = 'rgba(180,150,90,0.35)'; ctx.lineWidth = 3; }
    else { ctx.setLineDash([]); ctx.strokeStyle = '#caa05a'; ctx.lineWidth = 8; }
    ctx.beginPath(); ctx.moveTo(d.x1, d.y1); ctx.lineTo(d.x2, d.y2); ctx.stroke();
  }
  ctx.setLineDash([]);
}
// 低矮牆＝掩體：半高、藍灰虛線（看得過去、可越/減速、機率擋彈）
function drawLowWalls() {
  ctx.setLineDash([10, 6]); ctx.strokeStyle = 'rgba(120,150,180,0.55)'; ctx.lineWidth = 5; ctx.lineCap = 'butt';
  for (const lw of MAP.lowWalls) { ctx.beginPath(); ctx.moveTo(lw.x1, lw.y1); ctx.lineTo(lw.x2, lw.y2); ctx.stroke(); }
  ctx.setLineDash([]); ctx.lineCap = 'round';
}
// 可破壞地形：依現形態繪（wall 棕實線/glass 淡藍透明/lowwall 棕虛線/fence 交叉網/flat 不畫）+ 受損變淡
function drawDestructibles() {
  for (const d of destructibles()) {
    if (d.cur === 'flat') continue;
    const frac = Math.max(0, Math.min(1, (d.curHp || 0) / (d.hp || 1)));
    const dim = 0.45 + 0.55 * frac;   // 受損→變淡（裂痕感）
    ctx.lineCap = 'round';
    if (d.cur === 'wall') { ctx.strokeStyle = `rgba(150,120,80,${dim})`; ctx.lineWidth = 6; seg(d); }
    else if (d.cur === 'glass') { ctx.strokeStyle = `rgba(150,210,235,${0.3 + 0.4 * frac})`; ctx.lineWidth = 5; seg(d); }
    else if (d.cur === 'lowwall') { ctx.setLineDash([10, 6]); ctx.strokeStyle = `rgba(165,140,100,${dim})`; ctx.lineWidth = 5; ctx.lineCap = 'butt'; seg(d); ctx.setLineDash([]); ctx.lineCap = 'round'; }
    else if (d.cur === 'fence') {   // 鐵絲網：細線 + 沿線交叉小斜
      ctx.strokeStyle = 'rgba(160,170,180,0.6)'; ctx.lineWidth = 2; seg(d);
      const L = Math.hypot(d.x2 - d.x1, d.y2 - d.y1) || 1, ux = (d.x2 - d.x1) / L, uy = (d.y2 - d.y1) / L, nx = -uy, ny = ux;
      for (let t = 6; t < L; t += 12) { const cx = d.x1 + ux * t, cy = d.y1 + uy * t; ctx.beginPath(); ctx.moveTo(cx - nx * 4, cy - ny * 4); ctx.lineTo(cx + nx * 4, cy + ny * 4); ctx.stroke(); }
    }
  }
}
const seg = (d) => { ctx.beginPath(); ctx.moveTo(d.x1, d.y1); ctx.lineTo(d.x2, d.y2); ctx.stroke(); };
// 陣亡標記：地上叉叉（敵紅/我藍，整場保留；在世界層、會被迷霧蓋）
function drawCorpses() {
  ctx.lineWidth = 2; const r = 7;
  for (const c of corpses) {
    ctx.strokeStyle = c.enemy ? 'rgba(255,110,110,0.45)' : 'rgba(150,180,220,0.45)';
    ctx.beginPath(); ctx.moveTo(c.x - r, c.y - r); ctx.lineTo(c.x + r, c.y + r); ctx.moveTo(c.x + r, c.y - r); ctx.lineTo(c.x - r, c.y + r); ctx.stroke();
  }
}
// 遮蔽區（草叢）：半透明綠地塊（不擋移動/子彈/視線幾何；只讓「叢內單位」對叢外觀察者隱形）
function drawBushes() {
  for (const b of (MAP.bushes || [])) {
    ctx.fillStyle = 'rgba(60,150,80,0.30)'; ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.strokeStyle = 'rgba(90,190,110,0.5)'; ctx.lineWidth = 2; ctx.setLineDash([7, 5]); ctx.strokeRect(b.x, b.y, b.w, b.h); ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(120,210,140,0.22)';   // 點點草葉感
    for (let gx = b.x + 10; gx < b.x + b.w; gx += 22) for (let gy = b.y + 10; gy < b.y + b.h; gy += 22) ctx.fillRect(gx, gy, 3, 3);
  }
}
// 按鈕：方塊；連動門開＝綠、關＝琥珀

}
function drawZonesWorld() {

function drawBullets() {
  ctx.save(); ctx.globalCompositeOperation = 'lighter'; ctx.lineCap = 'round';
  for (const b of bullets) {
    const l = Math.hypot(b.vx, b.vy) || 1;
    const len = clamp(l * 0.045 * CONFIG.juice.tracer, 16, 160);            // 曳光長度隨速度

    g.addColorStop(0, `rgba(${col},0)`); g.addColorStop(1, `rgba(${col},0.9)`);
    ctx.strokeStyle = g; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(b.x, b.y); ctx.stroke();
    ctx.fillStyle = `rgba(${col},1)`; ctx.beginPath(); ctx.arc(b.x, b.y, 2.2, 0, Math.PI * 2); ctx.fill();   // 亮頭

}
function drawParticles() {

// 地上掉落的武器（脈動小方塊 + 稀有度色，被附身單位走過即撿）
function drawDrops() {

// 俘虜（未釋放）：青色圈 + 柵欄記號（受迷霧遮蔽，門後看不到）
function drawPrisoners() {

function drawUnitBody(u, fill, ringColor, ringW) {
  const rec = u.recoil || 0, cx = u.pos.x - Math.cos(u.facing) * rec, cy = u.pos.y - Math.sin(u.facing) * rec;   // 後座：繪製往後彈（不動實際座標）
  ctx.strokeStyle = ringColor; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(u.facing) * (u.radius + 8), cy + Math.sin(u.facing) * (u.radius + 8)); ctx.stroke();
  ctx.fillStyle = fill; ctx.beginPath(); ctx.arc(cx, cy, u.radius, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = ringColor; ctx.lineWidth = ringW; ctx.beginPath(); ctx.arc(cx, cy, u.radius, 0, Math.PI * 2); ctx.stroke();
  if (u.muzzle > 0) {   // 槍口閃焰：徑向亮焰 + 短光錐（加色疊加）
    const a = clamp(u.muzzle / 0.05, 0, 1), bx = cx + Math.cos(u.facing) * (u.radius + 5), by = cy + Math.sin(u.facing) * (u.radius + 5);
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    const rad = 6 + 12 * a, g = ctx.createRadialGradient(bx, by, 0, bx, by, rad);
    g.addColorStop(0, `rgba(255,240,190,${0.95 * a})`); g.addColorStop(0.5, `rgba(255,180,70,${0.5 * a})`); g.addColorStop(1, 'rgba(255,140,40,0)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(bx, by, rad, 0, Math.PI * 2); ctx.fill();
    const tip = u.radius + 5 + 16 * a, sp = 6 * a;
    ctx.fillStyle = `rgba(255,230,150,${0.5 * a})`; ctx.beginPath();
    ctx.moveTo(cx + Math.cos(u.facing) * u.radius, cy + Math.sin(u.facing) * u.radius);
    ctx.lineTo(cx + Math.cos(u.facing) * tip - Math.sin(u.facing) * sp, cy + Math.sin(u.facing) * tip + Math.cos(u.facing) * sp);
    ctx.lineTo(cx + Math.cos(u.facing) * tip + Math.sin(u.facing) * sp, cy + Math.sin(u.facing) * tip - Math.cos(u.facing) * sp);
    ctx.closePath(); ctx.fill(); ctx.restore();
  }
}
function drawPlayers() {
  for (const p of players) {
    if (p.state === 'DEAD' || p.state === 'EXTRACTED') continue;
    const controlled = (p.state === 'CONTROLLED');
    const low = p.hp / p.maxHp <= CONFIG.lowHpFrac;
    if (low) { const a = 0.35 + 0.35 * Math.sin(simTime * 16); ctx.strokeStyle = `rgba(255,60,60,${a})`; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(p.pos.x, p.pos.y, p.radius + 8, 0, Math.PI * 2); ctx.stroke(); }
    if (controlled) { ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(p.pos.x, p.pos.y, p.radius + 5, 0, Math.PI * 2); ctx.stroke(); }
    drawUnitBody(p, hsl(p.hue, 55, controlled ? 62 : 48), controlled ? '#ffffff' : hsl(p.hue, 60, 75), controlled ? 3 : 2);
    if (p.stance === 'engage') {   // 主動姿態標示（會主動對視野內任何敵開火）；防守＝預設不標
      ctx.fillStyle = 'rgba(255,110,80,0.95)'; ctx.font = 'bold 12px Consolas'; ctx.textAlign = 'center';
      ctx.fillText('⚔', p.pos.x, p.pos.y - p.radius - 5); ctx.textAlign = 'left';
    }
    if (inConceal(p.pos)) {   // 我方在草叢內＝隱蔽中（虛線綠圈）
      ctx.strokeStyle = 'rgba(120,220,140,0.8)'; ctx.lineWidth = 1.5; ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.arc(p.pos.x, p.pos.y, p.radius + 6, 0, Math.PI * 2); ctx.stroke(); ctx.setLineDash([]);
    }

}
function drawEnemies() {
  for (const e of enemies) {
    if (e.dead) continue;
    if (!debugView && !isRevealed(e) && !(cutscene && cutscene.lock)) continue;   // 未被我方感知（含躲草叢）→ 不繪；演出鎖控制時交給聚光迷霧（同事永遠在聚光內）
    const low = e.hp / e.maxHp <= 0.4;
    const hue = e.isReinforce ? 18 : (e.type ? e.type.hue : 0);
    drawUnitBody(e, hsl(hue, 65, low ? 38 : 48), hsl(hue, 70, 65), 2);
    if (e.armor > 0) {   // 裝甲：外加一圈板甲標記（金屬色）
      ctx.strokeStyle = hsl(hue, 25, 82); ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(e.pos.x, e.pos.y, e.radius + 4, 0, Math.PI * 2); ctx.stroke();
    }
    // 識別回饋（公平性）：未交戰但正在識別你 → 頭頂漸滿的黃→紅警示弧 + 驚嘆號
    if (e.state !== 'ENGAGED' && e.detect > 0.001) {
      const r = e.radius + 9, a0 = -Math.PI / 2 - 0.9, a1 = a0 + 1.8 * clamp(e.detect, 0, 1);
      ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(e.pos.x, e.pos.y, r, -Math.PI / 2 - 0.9, -Math.PI / 2 + 0.9); ctx.stroke();
      ctx.strokeStyle = hsl(50 - 50 * e.detect, 95, 55); ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(e.pos.x, e.pos.y, r, a0, a1); ctx.stroke();
      ctx.fillStyle = hsl(50 - 50 * e.detect, 95, 60); ctx.font = 'bold 12px Consolas'; ctx.textAlign = 'center';
      ctx.fillText(e.detect > 0.66 ? '！' : '?', e.pos.x, e.pos.y - r - 4); ctx.textAlign = 'left';
    }
  }
}
function drawDebug() {

/* ---- 戰爭迷霧：在全屏霧層上以 destination-out 挖出視錐+近身圈 ---- */
function visionPolygon(u) {
  const half = CONFIG.vision.coneHalfDeg * Math.PI / 180, rays = CONFIG.vision.fanRays;
  const poly = [{ x: u.pos.x, y: u.pos.y }];
  for (let i = 0; i <= rays; i++) { const ang = u.facing - half + (2 * half) * (i / rays); poly.push(rayHit(u.pos, ang, CONFIG.vision.coneMax)); }
  return poly;
}
function drawFog() {
  // 在離屏 canvas 上做「不透明霧 → destination-out 挖出可見孔洞」，再整層貼回主畫布。
  // 如此可見孔洞露出的是主畫布上的世界（牆/敵人/子彈/單位），重疊的視錐也不會互相補回霧。
  fctx.setTransform(1, 0, 0, 1, 0, 0);
  fctx.globalCompositeOperation = 'source-over'; fctx.globalAlpha = 1;
  fctx.fillStyle = CONFIG.fog.color; fctx.fillRect(0, 0, cv.width, cv.height);
  fctx.globalCompositeOperation = 'destination-out';
  if (cutscene && cutscene.lock && cutscene.reveal) {
    // 演出聚光：只挖出重點演出區（羽化圓），其餘全包在迷霧裡（主角走出此圈＝沒入迷霧）
    const rv = cutscene.reveal, c = w2s(rv), r = rv.r * cam.scale;
    const g = fctx.createRadialGradient(c.x, c.y, r * 0.62, c.x, c.y, r);
    g.addColorStop(0, '#000'); g.addColorStop(1, 'rgba(0,0,0,0)');
    fctx.fillStyle = g; fctx.beginPath(); fctx.arc(c.x, c.y, r, 0, Math.PI * 2); fctx.fill();
  } else {
    fctx.fillStyle = '#000';
    for (const p of activePlayers()) {
      const c = w2s(p.pos);
      fctx.beginPath(); fctx.arc(c.x, c.y, p.senseRadius * cam.scale, 0, Math.PI * 2); fctx.fill();   // 近身圈
      const poly = visionPolygon(p);                                                                  // 視錐
      fctx.beginPath(); const s0 = w2s(poly[0]); fctx.moveTo(s0.x, s0.y);
      for (let i = 1; i < poly.length; i++) { const s = w2s(poly[i]); fctx.lineTo(s.x, s.y); }
      fctx.closePath(); fctx.fill();
    }
  }
  fctx.globalCompositeOperation = 'source-over';
  ctx.drawImage(fogCanvas, 0, 0);
}
function drawSkeleton() {
  ctx.globalAlpha = CONFIG.fog.skeletonAlpha;
  ctx.strokeStyle = '#9fb3c8'; ctx.lineWidth = 4; ctx.lineCap = 'round';
  for (const w of MAP.walls) { ctx.beginPath(); ctx.moveTo(w.x1, w.y1); ctx.lineTo(w.x2, w.y2); ctx.stroke(); }
  ctx.strokeStyle = '#caa05a'; for (const d of MAP.doors) { if (d.open) continue; ctx.beginPath(); ctx.moveTo(d.x1, d.y1); ctx.lineTo(d.x2, d.y2); ctx.stroke(); }  // 關門也給空間參考
  ctx.strokeStyle = '#7d96b0'; ctx.lineWidth = 3; for (const lw of MAP.lowWalls) { ctx.beginPath(); ctx.moveTo(lw.x1, lw.y1); ctx.lineTo(lw.x2, lw.y2); ctx.stroke(); }
  ctx.globalAlpha = 1;
}

/* ---- 螢幕層覆蓋：血條 / 單位標記 / 區域標記（皆保持正立）---- */
function screenBar(s, frac, col, yoff) {
  const w = 30, h = 4, x = s.x - w / 2, y = s.y + yoff;
  ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(x - 1, y - 1, w + 2, h + 2);
  ctx.fillStyle = col; ctx.fillRect(x, y, w * clamp(frac, 0, 1), h);
}
function edgeMarker(worldPos, color, label, filled) {
  const m = 24; let s = w2s(worldPos);
  const onScreen = s.x >= m && s.x <= cv.width - m && s.y >= m && s.y <= cv.height - m;
  const x = clamp(s.x, m, cv.width - m), y = clamp(s.y, m, cv.height - m);
  ctx.fillStyle = color; ctx.strokeStyle = color; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(x, y, onScreen ? 5 : 8, 0, Math.PI * 2); filled ? ctx.fill() : ctx.stroke();
  if (label) { ctx.font = 'bold 11px Consolas'; ctx.textAlign = 'center'; ctx.fillText(label, x, y - 11); ctx.textAlign = 'left'; }
  return onScreen;
}
function drawScreenOverlays() {
  // 區域標記（永遠正立、離場時夾到邊緣）
  const reinforcing = simTime > curTimeBudget;
  edgeMarker(EXTRACT, '#5fd06b', 'EXTRACT', false);
  edgeMarker(ENTRY, reinforcing ? '#ff5d5d' : '#caa05a', reinforcing ? 'INBOUND' : 'ENTRY', false);

  // 我方單位：血條 + 編號（永遠可見）
  for (const p of activePlayers()) {
    const s = w2s(p.pos), low = p.hp / p.maxHp <= CONFIG.lowHpFrac;
    let col = p.hp / p.maxHp > 0.6 ? '#5fd06b' : low ? '#ff4d4d' : '#e0c24a';
    if (low && Math.sin(simTime * 18) > 0) col = '#ffffff';
    screenBar(s, p.hp / p.maxHp, col, -p.radius * cam.scale - 12);
    if (p.reloadT > 0) screenBar(s, 1 - p.reloadT / (p.reloadDur || p.weapon.reloadTime), '#7fa8ff', -p.radius * cam.scale - 6);
    ctx.font = 'bold 10px Consolas'; ctx.textAlign = 'center';
    ctx.fillStyle = (p.state === 'CONTROLLED') ? '#ffffff' : hsl(p.hue, 60, 72);
    let tag = `${p.id + 1}`; if (p.state === 'EXTRACTING') tag += '→EXT'; if (low) tag += ' LOW';
    ctx.fillText(tag, s.x, s.y + p.radius * cam.scale + 14);
    ctx.textAlign = 'left';
    // 離場(畫面外)的我方 → 邊緣箭頭
    edgeMarker(p.pos, hsl(p.hue, 60, 65), null, true);
  }
  // 被看到的敵人：血條
  for (const e of enemies) {
    if (e.dead) continue;
    if (!debugView && !isRevealed(e)) continue;
    const s = w2s(e.pos);
    screenBar(s, e.hp / e.maxHp, '#ff6b6b', -e.radius * cam.scale - 10);
  }
  // 砲塔準星（沿被附身單位 facing；另畫一條較淡的目標朝向線顯示轉向延遲）
  if (controlledId != null && players[controlledId].state === 'CONTROLLED') {
    const u = players[controlledId], s = w2s(u.pos);
    const r1 = u.radius * cam.scale + 6;
    const da = aimDir + cam.angle;     // 滑鼠目標朝向（螢幕角）
    ctx.strokeStyle = 'rgba(255,255,255,0.22)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(s.x + Math.cos(da) * r1, s.y + Math.sin(da) * r1); ctx.lineTo(s.x + Math.cos(da) * 120, s.y + Math.sin(da) * 120); ctx.stroke();
    const sa = u.facing + cam.angle;   // 砲塔現朝向（螢幕角）= 子彈方向
    const lineLen = isScoping() ? u.weapon.range * cam.scale : 84;   // 望遠：示意線拉長到武器射程（便於單發精準）
    ctx.strokeStyle = isScoping() ? 'rgba(127,227,255,0.7)' : 'rgba(255,255,255,0.75)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(s.x + Math.cos(sa) * r1, s.y + Math.sin(sa) * r1); ctx.lineTo(s.x + Math.cos(sa) * lineLen, s.y + Math.sin(sa) * lineLen); ctx.stroke();
    ctx.beginPath(); ctx.arc(s.x + Math.cos(sa) * (lineLen + 12), s.y + Math.sin(sa) * (lineLen + 12), 4, 0, Math.PI * 2); ctx.stroke();
    if (u.sprinting) {
      ctx.fillStyle = 'rgba(127,227,255,0.9)'; ctx.font = 'bold 11px Consolas'; ctx.textAlign = 'center';
      ctx.fillText(`▸▸ SPRINT x${sprintMult(u).toFixed(2)}`, s.x, s.y - u.radius * cam.scale - 26);
      ctx.textAlign = 'left';
    }
    // 互動提示（在範圍內的門/按鈕/俘虜上方）
    const it = nearestInteractable(u);
    if (it) {
      const wpos = it.type === 'door' ? doorMid(it.door) : it.type === 'button' ? { x: it.button.x, y: it.button.y } : it.type === 'console' ? { x: introConsole.x, y: introConsole.y } : it.prisoner.pos;
      const ips = w2s(wpos);
      const label = it.type === 'button' ? 'F：啟動按鈕' : it.type === 'prisoner' ? 'F：釋放俘虜' : it.type === 'console' ? 'F：取得發射密碼' : (it.door.open ? 'F：關門' : 'F：開門');
      ctx.font = 'bold 12px Consolas'; ctx.textAlign = 'center';
      const tw = ctx.measureText(label).width + 12;
      ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(ips.x - tw / 2, ips.y - 30, tw, 18);
      ctx.fillStyle = '#ffe08a'; ctx.fillText(label, ips.x, ips.y - 17);
      ctx.textAlign = 'left';
    }
  }
}

/* ---- HUD（螢幕層）---- */
function drawHUD() {
  // 關卡數（左上）；名冊改以底部單位卡片呈現
  ctx.textAlign = 'left'; ctx.font = 'bold 14px Consolas'; ctx.fillStyle = '#9fb3c8';
  ctx.fillText(`MISSION ${missionIndex + 1}`, 16, 24);

  // 計時器（上中）
  ctx.textAlign = 'center';
  const remain = curTimeBudget - simTime;
  if (remain > 0) {
    ctx.fillStyle = '#cdd6e0'; ctx.font = '16px Consolas';
    ctx.fillText(`TIME ${simTime.toFixed(1)} / ${curTimeBudget}s`, cv.width / 2, 26);
    const bw = 320, bx = cv.width / 2 - bw / 2;
    ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.fillRect(bx, 34, bw, 6);
    ctx.fillStyle = remain < 15 ? '#e0c24a' : '#7fe3ff'; ctx.fillRect(bx, 34, bw * clamp(simTime / curTimeBudget, 0, 1), 6);
  } else {
    const blink = Math.sin(simTime * 8) > 0;
    ctx.fillStyle = blink ? '#ff5d5d' : '#ff9b5a'; ctx.font = 'bold 18px Consolas';
    ctx.fillText(`⚠ REINFORCEMENTS INBOUND  (+${(simTime - curTimeBudget).toFixed(0)}s)`, cv.width / 2, 30);
  }

  // 計數（右上）
  ctx.textAlign = 'right'; ctx.font = '13px Consolas'; ctx.fillStyle = '#cdd6e0';
  ctx.fillText(`EXTRACTED ${extractedCount}   ON FIELD ${activePlayers().length}   DEAD ${deadCount}   ENEMIES ${enemies.filter(e => !e.dead).length}`, cv.width - 16, 22);
  if (drops.length || backpack.length) { ctx.fillStyle = '#ffe08a'; ctx.fillText(`BACKPACK ${backpack.length}${drops.length ? `   · 地上 ${drops.length} 件可撿` : ''}`, cv.width - 16, 40); }

  // 護送撤離提示（controlledId 指向 EXTRACTING 單位＝護送中）

function drawCard(p, x, y, w, h, i) {
  const ctrl = (p.state === 'CONTROLLED');

  ctx.fillRect(x, y, w, h);
  ctx.lineWidth = ctrl ? 2.5 : 1;
  ctx.strokeStyle = inactive ? 'rgba(120,130,140,0.35)' : (ctrl ? '#ffffff' : hsl(p.hue, 50, 55, 0.85));
  ctx.strokeRect(x, y, w, h);

  // 名稱 + 編號 + 狀態
  ctx.textAlign = 'left'; ctx.font = 'bold 13px Consolas';
  ctx.fillStyle = inactive ? '#7a828c' : (ctrl ? '#ffffff' : hsl(p.hue, 60, 74));
  ctx.fillText(`[${i + 1}] ${p.name}`, bx, y + 15);
  ctx.textAlign = 'right'; ctx.font = '9px Consolas';
  ctx.fillStyle = p.state === 'EXTRACTED' ? '#5fd06b' : p.state === 'DEAD' ? '#8a6a6a' : 'rgba(205,214,224,0.65)';
  ctx.fillText(p.state === 'EXTRACTED' ? 'EXTRACTED' : p.state === 'EXTRACTING' ? 'EXTRACTING' : p.state, x + w - pad, y + 14);

  // 個性 archetype（盯哨可靠度色提示）
  const arch = p.archetype;
  ctx.textAlign = 'left'; ctx.font = 'bold 11px Consolas';
  ctx.fillStyle = inactive ? '#6a727c' : TIER_COLOR[arch.tier];
  ctx.fillText(arch.name, bx, y + 29);

  // 生命
  const hpFrac = clamp(p.hp / p.maxHp, 0, 1), low = hpFrac <= CONFIG.lowHpFrac && !inactive;
  const by = y + 35;
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(bx, by, bw, 7);
  let hpcol = inactive ? '#3a424c' : hpFrac > 0.6 ? '#5fd06b' : low ? '#ff4d4d' : '#e0c24a';
  if (low && Math.sin(simTime * 18) > 0) hpcol = '#ffffff';
  ctx.fillStyle = hpcol; ctx.fillRect(bx, by, bw * hpFrac, 7);
  ctx.textAlign = 'right'; ctx.font = '8px Consolas'; ctx.fillStyle = 'rgba(255,255,255,0.85)';
  if (!inactive) ctx.fillText(`${Math.max(0, Math.ceil(p.hp))}`, bx + bw - 2, by + 6);

  // 武器 + 彈藥
  const W = p.weapon;
  ctx.beginPath(); ctx.fillStyle = rarityColor(W.rarity); ctx.arc(bx + 3, y + 56, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.textAlign = 'left'; ctx.font = '11px Consolas';
  ctx.fillStyle = inactive ? '#6a727c' : '#cdd6e0'; ctx.fillText(`${W.name} 重${W.weight}`, bx + 11, y + 59);
  ctx.textAlign = 'right'; ctx.font = '11px Consolas';
  if (p.reloadT > 0 && !inactive) {
    ctx.fillStyle = '#7fa8ff'; ctx.fillText('RELOAD', x + w - pad, y + 59);
  } else {
    ctx.fillStyle = inactive ? '#6a727c' : (p.ammoInMag <= 5 ? '#ff7d7d' : '#cdd6e0');
    ctx.fillText(`${p.ammoInMag}/${p.magazine || W.magazine} (${p.ammoReserve})`, x + w - pad, y + 59);
  }
  // 裝備（持續）/ 道具（一次性，按 Q；用過或無＝灰）右上小字
  if (!inactive) {
    ctx.textAlign = 'right'; ctx.font = '8px Consolas';
    ctx.fillStyle = p.equipId ? '#9fd0e0' : '#4a525c'; ctx.fillText('🛡' + (p.equipId ? EQUIPMENT[p.equipId].name : '—'), x + w - pad, y + 27);
    ctx.fillStyle = (p.itemId && !p.itemUsed) ? '#ffd27d' : '#4a525c'; ctx.fillText('C ' + (p.itemId && !p.itemUsed ? ITEMS[p.itemId].name : (p.itemId ? '用過' : '—')), x + w - pad, y + 38);
    ctx.textAlign = 'left';
  }

  // 技能 + 冷卻
  ctx.textAlign = 'left'; ctx.font = '11px Consolas';
  ctx.fillStyle = inactive ? '#6a727c' : '#cdd6e0';
  ctx.fillText(`SK:${p.ability ? p.ability.name : '—'}`, bx, y + 76);
  if (p.ability && !inactive) {
    const sbw = 64, sbx = x + w - pad - sbw, sby = y + 69;
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(sbx, sby, sbw, 8);
    const cdFrac = 1 - clamp(p.abilityCd / p.ability.cooldown, 0, 1);
    ctx.fillStyle = p.abilityCd > 0 ? '#5a7fb0' : '#5fd0c0'; ctx.fillRect(sbx, sby, sbw * cdFrac, 8);

}

const TUNE_ROOTS = { CONFIG, WEAPONS, ENEMY_TYPES, ABILITIES, EQUIPMENT, ITEMS };

  { key: 'ENEMY',   label: '敵人',          roots: ['ENEMY_TYPES'] },
  { key: 'KIT',     label: '技能/裝備/道具', roots: ['ABILITIES', 'EQUIPMENT', 'ITEMS'] },

const TUNE_STORE_KEY = 'sleeper_tuning_v1';

  } catch (e) { tunerEl = null; }
}
initTunerUI();

/* =====================================================================
   自訂戰鬥（SANDBOX）— 無路線圖/演出的純戰鬥沙盒：自選小隊 + 貼地圖 JSON 打一場。
   重用整個戰鬥引擎（startMission/endMission），只多一個設定場景 + fromSandbox 路由。
   進入：左上「⚔ 自訂戰鬥」鈕，或 index.html?sandbox=1。打完/Backspace 回設定可改了再打。
   ===================================================================== */
const SANDBOX_STORE_KEY = 'sleeper_sandbox_v1';
const SANDBOX_WEAPON_IDS = WEAPON_IDS.filter(id => !['fangs', 'lmg', 'shotgun'].includes(id));  // 排除敵人專屬武器
let fromSandbox = false;        // 此場由沙盒啟動（endMission 回設定而非結算/路線圖）
let sandboxCfg = null;          // 上次設定（記憶 + localStorage）
let sandboxLast = null;         // 上一場結果（撤離/陣亡）顯示用
let sandboxEl = null, sandboxMembersEl = null, sandboxMapText = null, sandboxMapSel = null, sandboxMsgEl = null, sandboxResultEl = null, sandboxRows = [];

const defaultMember = () => ({ archetypeId: rngPick(ARCHETYPE_IDS), weaponId: 'rifle', abilityId: 'heal', equipId: '' });
const randomMember = () => ({ archetypeId: rngPick(ARCHETYPE_IDS), weaponId: rngPick(SANDBOX_WEAPON_IDS), abilityId: rngPick(ABILITY_IDS), equipId: rngPick(['', ...EQUIP_IDS]) });
function makeSandboxMember(m, used) {
  const r = makeRecruit(used);
  if (m.archetypeId && ARCHETYPES[m.archetypeId]) r.archetypeId = m.archetypeId;
  if (m.weaponId && WEAPONS[m.weaponId]) r.weaponId = m.weaponId;
  if (m.abilityId && ABILITIES[m.abilityId]) r.abilityId = m.abilityId;
  r.equipId = (m.equipId && EQUIPMENT[m.equipId]) ? m.equipId : null;
  return r;
}
function loadSandboxCfg() { try { return JSON.parse(localStorage.getItem(SANDBOX_STORE_KEY) || 'null'); } catch (e) { return null; } }
function saveSandboxCfg() {
  const cfg = { members: sandboxRows.map(r => ({ archetypeId: r.archetype.value, weaponId: r.weapon.value, abilityId: r.ability.value, equipId: r.equip.value })), map: (sandboxMapText ? sandboxMapText.value : '').trim(), mapSel: sandboxMapSel ? sandboxMapSel.value : 'alpha' };
  sandboxCfg = cfg; try { localStorage.setItem(SANDBOX_STORE_KEY, JSON.stringify(cfg)); } catch (e) {}
}
function sandboxMsg(t) { if (sandboxMsgEl) sandboxMsgEl.textContent = t || ''; }

function enterSandbox() {
  scene = 'SANDBOX'; fromSandbox = false; releasePointer();
  if (typeof cutscene !== 'undefined') cutscene = null; introActive = false;
  if (sandboxEl) { buildSandboxForm(); sandboxEl.classList.add('open'); }
}
function exitSandbox() { if (sandboxEl) sandboxEl.classList.remove('open'); initRun(); }   // 離開沙盒＝回正常遊戲

function sandboxStart() {
  if (!sandboxRows.length) { sandboxMsg('至少要一名隊員'); return; }
  let mapObj = null; const txt = (sandboxMapText.value || '').trim();
  if (txt) { try { mapObj = JSON.parse(txt); } catch (e) { sandboxMsg('地圖 JSON 解析失敗：' + e.message); return; } }
  else mapObj = JSON.parse(JSON.stringify(MAPS[sandboxMapSel.value] || MAPS.alpha));
  if (!mapObj || typeof mapObj !== 'object') { sandboxMsg('地圖無效'); return; }
  MAPS.__sandbox = normalizeForPlay(mapObj);
  const used = new Set();
  roster = sandboxRows.map(r => makeSandboxMember({ archetypeId: r.archetype.value, weaponId: r.weapon.value, abilityId: r.ability.value, equipId: r.equip.value || null }, used));
  missionIndex = 0; roadCurrent = null; introActive = false; cutscene = null; introGuards = []; introConsole = null;
  forcedMap = '__sandbox'; fromSandbox = true; saveSandboxCfg();
  if (sandboxEl) sandboxEl.classList.remove('open');
  startMission();
}

// ── 表單建構（DOM，全包 try/catch；無 DOM 環境停用）──
function sbSelect(ids, val, labelFn, noneText) {
  const s = document.createElement('select');
  if (noneText) { const o = document.createElement('option'); o.value = ''; o.textContent = noneText; s.appendChild(o); }
  ids.forEach(id => { const o = document.createElement('option'); o.value = id; o.textContent = labelFn(id); s.appendChild(o); });
  if (val != null) s.value = val; return s;
}
function addMemberRow(m) {
  m = m || defaultMember();
  const row = document.createElement('div'); row.className = 'mem';
  const idx = document.createElement('span'); idx.className = 'idx'; row.appendChild(idx);
  const a = sbSelect(ARCHETYPE_IDS, m.archetypeId, id => ARCHETYPES[id].name);
  const w = sbSelect(SANDBOX_WEAPON_IDS, m.weaponId, id => WEAPONS[id].name);
  const k = sbSelect(ABILITY_IDS, m.abilityId, id => ABILITIES[id].name);
  const e = sbSelect(EQUIP_IDS, m.equipId || '', id => EQUIPMENT[id].name, '(無裝備)');
  const del = document.createElement('button'); del.className = 'x'; del.textContent = '✕';
  const rec = { archetype: a, weapon: w, ability: k, equip: e, row };
  del.addEventListener('click', () => { const i = sandboxRows.indexOf(rec); if (i >= 0) sandboxRows.splice(i, 1); row.remove(); renumberMembers(); });
  row.appendChild(a); row.appendChild(w); row.appendChild(k); row.appendChild(e); row.appendChild(del);
  sandboxMembersEl.appendChild(row); sandboxRows.push(rec); renumberMembers();
}
function renumberMembers() { sandboxRows.forEach((r, i) => { const idx = r.row.querySelector('.idx'); if (idx) idx.textContent = '#' + (i + 1); }); }
function buildSandboxForm() {
  if (!sandboxEl || !sandboxMembersEl) return;
  if (sandboxResultEl) sandboxResultEl.textContent = !sandboxLast ? '' : sandboxLast.aborted ? '上一場：已中止' : `上一場結果：撤離 ${sandboxLast.extracted} / 陣亡 ${sandboxLast.dead}（共 ${sandboxLast.total}）`;
  sandboxMembersEl.innerHTML = ''; sandboxRows = [];
  const cfg = sandboxCfg || loadSandboxCfg();
  const mems = (cfg && cfg.members && cfg.members.length) ? cfg.members : [defaultMember(), defaultMember(), defaultMember()];
  mems.forEach(m => addMemberRow(m));
  if (cfg) { if (typeof cfg.map === 'string') sandboxMapText.value = cfg.map; if (cfg.mapSel) sandboxMapSel.value = cfg.mapSel; }
  sandboxMsg('');
}
function initSandboxUI() {
  try {
    if (typeof document === 'undefined' || !document.body || !document.createElement) return;
    const btn = document.createElement('button'); btn.id = 'sandboxBtn'; btn.textContent = '⚔ 自訂戰鬥'; btn.title = '純戰鬥沙盒（無路線圖/演出）';
    btn.addEventListener('click', () => enterSandbox()); document.body.appendChild(btn);

    const ov = document.createElement('div'); ov.id = 'sandbox';
    const card = document.createElement('div'); card.className = 'card'; ov.appendChild(card);
    const h2 = document.createElement('h2'); h2.textContent = '自訂戰鬥 (SANDBOX)'; card.appendChild(h2);
    const sub = document.createElement('div'); sub.className = 'muted'; sub.textContent = '自選小隊 + 地圖，打一場。敵人沿用地圖的 enemySpawns。無路線圖、無演出。'; card.appendChild(sub);
    sandboxResultEl = document.createElement('div'); sandboxResultEl.id = 'sbResult'; sandboxResultEl.style.margin = '4px 0'; card.appendChild(sandboxResultEl);

    const h3a = document.createElement('h3'); h3a.textContent = '小隊'; card.appendChild(h3a);
    const cols = document.createElement('div'); cols.className = 'cols'; ['　', '個性', '武器', '技能', '裝備', '　'].forEach(t => { const s = document.createElement('span'); s.textContent = t; cols.appendChild(s); }); card.appendChild(cols);
    sandboxMembersEl = document.createElement('div'); card.appendChild(sandboxMembersEl);
    const r1 = document.createElement('div'); r1.className = 'row';
    const addBtn = document.createElement('button'); addBtn.textContent = '＋ 新增隊員'; addBtn.addEventListener('click', () => addMemberRow());
    const cnt = document.createElement('input'); cnt.type = 'number'; cnt.value = 3; cnt.min = 1; cnt.max = 8; cnt.style.width = '48px';
    const rnd = document.createElement('button'); rnd.textContent = '🎲 隨機小隊'; rnd.addEventListener('click', () => { const n = Math.max(1, Math.min(8, +cnt.value || 3)); sandboxMembersEl.innerHTML = ''; sandboxRows = []; for (let i = 0; i < n; i++) addMemberRow(randomMember()); });
    r1.appendChild(addBtn); r1.appendChild(rnd); r1.appendChild(cnt); r1.appendChild(document.createTextNode('人')); card.appendChild(r1);

    const h3b = document.createElement('h3'); h3b.textContent = '地圖'; card.appendChild(h3b);
    const r2 = document.createElement('div'); r2.className = 'row';
    sandboxMapSel = document.createElement('select'); ['alpha', 'bravo', 'outpost', 'lanes'].forEach(k => { const o = document.createElement('option'); o.value = k; o.textContent = k + '（' + (MAPS[k] ? MAPS[k].label : k) + '）'; sandboxMapSel.appendChild(o); });
    const fill = document.createElement('button'); fill.textContent = '↧ 載入此內建到下方'; fill.addEventListener('click', () => { sandboxMapText.value = JSON.stringify(MAPS[sandboxMapSel.value], null, 2); });
    const mhint = document.createElement('span'); mhint.className = 'muted'; mhint.textContent = '下方空白＝用左側內建；貼上 JSON＝用貼上的';
    r2.appendChild(sandboxMapSel); r2.appendChild(fill); r2.appendChild(mhint); card.appendChild(r2);
    sandboxMapText = document.createElement('textarea'); sandboxMapText.placeholder = '貼上地圖 JSON（編輯器「匯出 → 純 JSON」），留空則用上方內建地圖'; card.appendChild(sandboxMapText);

    const r3 = document.createElement('div'); r3.className = 'row';
    const go = document.createElement('button'); go.className = 'go'; go.textContent = '▶ 開打'; go.addEventListener('click', () => sandboxStart());
    const leave = document.createElement('button'); leave.textContent = '離開（回正常遊戲）'; leave.addEventListener('click', () => exitSandbox());
    sandboxMsgEl = document.createElement('span'); sandboxMsgEl.id = 'sbMsg';
    r3.appendChild(go); r3.appendChild(leave); r3.appendChild(sandboxMsgEl); card.appendChild(r3);
    const note = document.createElement('div'); note.className = 'muted'; note.textContent = '開打後點畫面鎖定滑鼠開始。打完（全員撤離/陣亡）或按 Backspace 會回到本設定，改了再打。按 ` 可開數值面板。'; card.appendChild(note);

    document.body.appendChild(ov); sandboxEl = ov; sandboxCfg = loadSandboxCfg();
  } catch (e) { sandboxEl = null; }
}
initSandboxUI();

function drawSandboxBackdrop() {
  ctx.fillStyle = '#06080d'; ctx.fillRect(0, 0, cv.width, cv.height);
  ctx.fillStyle = '#1a2230'; ctx.font = 'bold 30px Consolas'; ctx.textAlign = 'center';
  ctx.fillText('自訂戰鬥 (SANDBOX)', cv.width / 2, cv.height / 2 - 12);
  ctx.fillStyle = '#39414f'; ctx.font = '14px Consolas'; ctx.fillText('在上方面板設定小隊與地圖，按「開打」', cv.width / 2, cv.height / 2 + 22);
  ctx.textAlign = 'left';
}

/* =====================================================================
   Main loop
   ===================================================================== */
const FIXED = 1 / 60;
let acc = 0, last = performance.now();
function frame(now) {
  let delta = (now - last) / 1000; last = now;
  if (delta > 0.25) delta = 0.25;
  if (hitstopT > 0) { hitstopT -= delta; }          // 頓幀：凍結模擬、畫面續繪（不快轉補回）
  else { acc += delta; while (acc >= FIXED) { update(FIXED); acc -= FIXED; } }
  draw();
  requestAnimationFrame(frame);
}

let __bootSandbox = false; try { __bootSandbox = typeof location !== 'undefined' && /[?&]sandbox\b/.test(location.search || ''); } catch (e) {}
if (__bootSandbox && sandboxEl) enterSandbox(); else initRun();
requestAnimationFrame(frame);
</script>
</body>
</html>
