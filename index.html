  ctx.fillStyle = p.state === 'EXTRACTED' ? '#5fd06b' : p.state === 'DEAD' ? '#8a6a6a' : 'rgba(205,214,224,0.65)';
  ctx.fillText(p.state === 'EXTRACTED' ? 'EXTRACTED' : p.state === 'EXTRACTING' ? 'EXTRACTING' : p.state, x + w - pad, y + 14);

  // 個性 archetype（盯哨可靠度色提示）
  const arch = p.archetype;
  ctx.textAlign = 'left'; ctx.font = 'bold 11px Consolas';
  ctx.fillStyle = inactive ? '#6a727c' : TIER_COLOR[arch.tier];
  ctx.fillText(arch.name, bx, y + 29);

  // 生命
  const hpFrac = clamp(p.hp / p.maxHp, 0, 1), low = hpFrac <= CONFIG.lowHpFrac && !inactive;
  const by = y + 35;
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(bx, by, bw, 7);
  let hpcol = inactive ? '#3a424c' : hpFrac > 0.6 ? '#5fd06b' : low ? '#ff4d4d' : '#e0c24a';
  if (low && Math.sin(simTime * 18) > 0) hpcol = '#ffffff';
  ctx.fillStyle = hpcol; ctx.fillRect(bx, by, bw * hpFrac, 7);
  ctx.textAlign = 'right'; ctx.font = '8px Consolas'; ctx.fillStyle = 'rgba(255,255,255,0.85)';
  if (!inactive) ctx.fillText(`${Math.max(0, Math.ceil(p.hp))}`, bx + bw - 2, by + 6);

  // 武器 + 彈藥
  const W = p.weapon;
  ctx.beginPath(); ctx.fillStyle = rarityColor(W.rarity); ctx.arc(bx + 3, y + 56, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.textAlign = 'left'; ctx.font = '11px Consolas';
  ctx.fillStyle = inactive ? '#6a727c' : '#cdd6e0'; ctx.fillText(`${W.name} 重${W.weight}`, bx + 11, y + 59);
  ctx.textAlign = 'right'; ctx.font = '11px Consolas';
  if (p.reloadT > 0 && !inactive) {
    ctx.fillStyle = '#7fa8ff'; ctx.fillText('RELOAD', x + w - pad, y + 59);
  } else {
    ctx.fillStyle = inactive ? '#6a727c' : (p.ammoInMag <= 5 ? '#ff7d7d' : '#cdd6e0');
    ctx.fillText(`${p.ammoInMag}/${p.magazine || W.magazine} (${p.ammoReserve})`, x + w - pad, y + 59);
  }
  // 裝備（持續）/ 道具（一次性，按 Q；用過或無＝灰）右上小字
  if (!inactive) {
    ctx.textAlign = 'right'; ctx.font = '8px Consolas';
    ctx.fillStyle = p.equipId ? '#9fd0e0' : '#4a525c'; ctx.fillText('🛡' + (p.equipId ? EQUIPMENT[p.equipId].name : '—'), x + w - pad, y + 27);
    ctx.fillStyle = (p.itemId && !p.itemUsed) ? '#ffd27d' : '#4a525c'; ctx.fillText('Q ' + (p.itemId && !p.itemUsed ? ITEMS[p.itemId].name : (p.itemId ? '用過' : '—')), x + w - pad, y + 38);
    ctx.textAlign = 'left';
  }

  // 技能 + 冷卻
  ctx.textAlign = 'left'; ctx.font = '11px Consolas';
  ctx.fillStyle = inactive ? '#6a727c' : '#cdd6e0';
  ctx.fillText(`SK:${p.ability ? p.ability.name : '—'}`, bx, y + 76);
  if (p.ability && !inactive) {
    const sbw = 64, sbx = x + w - pad - sbw, sby = y + 69;
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(sbx, sby, sbw, 8);
    const cdFrac = 1 - clamp(p.abilityCd / p.ability.cooldown, 0, 1);
    ctx.fillStyle = p.abilityCd > 0 ? '#5a7fb0' : '#5fd0c0'; ctx.fillRect(sbx, sby, sbw * cdFrac, 8);
    ctx.textAlign = 'right'; ctx.font = '8px Consolas'; ctx.fillStyle = '#e8eef5';
    ctx.fillText(p.abilityCd > 0 ? p.abilityCd.toFixed(1) + 's' : 'READY', x + w - pad - 2, sby + 7);
  }
  ctx.textAlign = 'left';
}

/* ---- 休息關：clickable rect 小工具 ---- */
function pushRect(x, y, w, h, fn) { restRects.push({ x, y, w, h, fn }); }
function uiButton(x, y, w, h, label, fn, opts = {}) {

/* ---- 休息關：倉庫格 ---- */
function drawRestWarehouse(wy) {
  const manage = (restPhase === 'CHOICE' || restPhase === 'DONE');
  const cap = warehouseCap(), used = warehouseUsed(), over = overCap();
  ctx.textAlign = 'left'; ctx.font = 'bold 13px Consolas'; ctx.fillStyle = over ? '#ff8a8a' : '#cdd6e0';
  ctx.fillText(`共用倉庫  ${used}/${cap}${over ? '  ⚠ 超過上限，請丟棄' : ''}`, 140, wy - 8);
  ctx.font = '10px Consolas'; ctx.fillStyle = '#7a8696';
  ctx.fillText(CONFIG.loadout.abilitiesCountTowardCap ? '（武器與技能皆佔格）' : '（僅武器佔格）', 140 + 220, wy - 8);
  const cw = 56, ch = 56, gap = 8, perRow = 16, slots = Math.max(cap, warehouse.length);
  const startX = (cv.width - (perRow * cw + (perRow - 1) * gap)) / 2;
  for (let s = 0; s < slots; s++) {
    const col = s % perRow, row = Math.floor(s / perRow);
    const x = startX + col * (cw + gap), y = wy + row * (ch + gap);
    const it = warehouse[s];
    const selected = restSel && restSel.type === 'wh' && restSel.idx === s;
    const beyond = s >= cap;   // 超過上限的格（紅框警示）
    ctx.fillStyle = it ? 'rgba(30,38,50,0.95)' : 'rgba(16,20,28,0.6)';
    ctx.fillRect(x, y, cw, ch);
    ctx.lineWidth = selected ? 2.5 : 1.2;
    ctx.strokeStyle = selected ? '#ffffff' : (beyond && it ? '#ff6b6b' : 'rgba(120,140,160,0.4)');
    ctx.strokeRect(x, y, cw, ch);
    if (it) {
      const meta = it.kind === 'weapon' ? { name: WEAPONS[it.id].name, tag: '武器', col: rarityColor(WEAPONS[it.id].rarity), dot: true }
        : it.kind === 'ability' ? { name: ABILITIES[it.id].name, tag: '技能', col: '#c0a0ff' }
          : it.kind === 'equip' ? { name: EQUIPMENT[it.id].name, tag: '裝備', col: '#9fd0e0' }
            : { name: ITEMS[it.id].name, tag: '道具', col: '#ffd27d' };
      if (meta.dot) { ctx.beginPath(); ctx.fillStyle = meta.col; ctx.arc(x + 8, y + 9, 3.5, 0, Math.PI * 2); ctx.fill(); }
      ctx.textAlign = 'center'; ctx.font = '10px Consolas'; ctx.fillStyle = meta.dot ? '#dde6ef' : meta.col;
      ctx.fillText(meta.name, x + cw / 2, y + 30); ctx.font = '8px Consolas'; ctx.fillStyle = '#8b97a5'; ctx.fillText(meta.tag, x + cw / 2, y + 46);
      if (manage) pushRect(x, y, cw, ch, () => { restSel = selected ? null : { type: 'wh', idx: s }; });
    }
  }
  // 丟棄選取
  if (manage) uiButton(cv.width - 150, wy - 22, 120, 20, restSelItem() ? '丟棄選取 ✕' : '（先選倉庫物）', () => { if (restSel && restSel.type === 'wh') discardWarehouse(restSel.idx); }, { enabled: !!restSelItem(), font: '11px Consolas', bg: 'rgba(90,40,40,0.9)', border: '#c66' });
  ctx.textAlign = 'left';
}

/* ---- 路線圖畫面 ---- */
function drawRoadmap() {
  ctx.fillStyle = '#0a0e14'; ctx.fillRect(0, 0, cv.width, cv.height);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#7fe3ff'; ctx.font = 'bold 28px Consolas'; ctx.fillText('ROUTE · 路線圖', cv.width / 2, 56);
  ctx.fillStyle = 'rgba(205,214,224,0.7)'; ctx.font = '13px Consolas';
  ctx.fillText('點擊（或按數字鍵）前往發亮的節點 ▷', cv.width / 2, 80);
  // 圖例（區分戰鬥地圖）
  ctx.font = '12px Consolas';
  ctx.fillStyle = hsl(8, 65, 55); ctx.fillText('⚔ 開闊區', cv.width / 2 - 290, 102);
  ctx.fillStyle = hsl(35, 70, 58); ctx.fillText('⊟ 門禁設施', cv.width / 2 - 180, 102);
  ctx.fillStyle = hsl(48, 75, 58); ctx.fillText('★ 軍械庫', cv.width / 2 - 20, 102);
  ctx.fillStyle = hsl(150, 60, 55); ctx.fillText('＋ 休息', cv.width / 2 + 120, 102);

  const avail = roadAvailable.filter(id => !roadCompleted.has(id));
  // 邊
  for (const [a, b] of ROADMAP.edges) {
    const pa = roadNodePos(roadNode(a)), pb = roadNodePos(roadNode(b));
    const hot = roadCompleted.has(a) || avail.includes(a) || avail.includes(b);
    ctx.strokeStyle = hot ? 'rgba(160,190,220,0.45)' : 'rgba(120,140,160,0.14)';
    ctx.lineWidth = hot ? 2 : 1;
    ctx.beginPath(); ctx.moveTo(pa.x, pa.y); ctx.lineTo(pb.x, pb.y); ctx.stroke();
  }
  // 節點
  for (const n of ROADMAP.nodes) {
    const p = roadNodePos(n);
    const done = roadCompleted.has(n.id), isAvail = avail.includes(n.id);
    const hover = isAvail && Math.hypot(mouse.mx - p.x, mouse.my - p.y) <= 26;
    const isBravo = n.type === 'COMBAT' && (n.map === 'bravo');
    const base = n.type === 'REST' ? 150 : n.type === 'ARMORY' ? 48 : (isBravo ? 35 : 8);   // hue: 開闊紅、門禁橙、軍械庫金、休息青
    let fill, stroke;
    if (done) { fill = 'rgba(70,80,90,0.5)'; stroke = 'rgba(120,130,140,0.6)'; }

  const cw = 200, gap = 10;
  roster.slice(0, 6).forEach((r, i) => drawRosterCard(r, 24 + i * (cw + gap), cv.height - 84, cw, 76, i));

  editorBtnRect = { x: cv.width - 190, y: 18, w: 160, h: 30 };
  ctx.fillStyle = 'rgba(40,50,64,0.95)'; ctx.fillRect(editorBtnRect.x, editorBtnRect.y, editorBtnRect.w, editorBtnRect.h);
  ctx.lineWidth = 1.2; ctx.strokeStyle = 'rgba(150,170,190,0.7)'; ctx.strokeRect(editorBtnRect.x, editorBtnRect.y, editorBtnRect.w, editorBtnRect.h);
  ctx.fillStyle = '#dbe6f0'; ctx.font = '13px Consolas'; ctx.textAlign = 'center'; ctx.fillText('✎ 關卡編輯器', editorBtnRect.x + editorBtnRect.w / 2, editorBtnRect.y + 20);
  ctx.textAlign = 'left';

/* =====================================================================
   LEVEL EDITOR — 遊戲內視覺關卡編輯器（放置→試玩→輸出 JS 貼回 MAPS）
   ===================================================================== */
let editorBtnRect = null;
const isDragTool = (t) => t === 'wall' || t === 'door' || t === 'low';
function blankEditMap() { return { label: '新關卡', timeBudget: 0, walls: [...rectWalls(40, 40, 1240, 680)], doors: [], lowWalls: [], buttons: [], waypoints: [], edges: [], entryPoints: [{ x: 110, y: 360 }], extractionPoints: [{ x: 1190, y: 360 }], enemySpawns: [], prisoners: [] }; }
function normalizeEdit(e) {
  e.label = e.label || '新關卡'; if (typeof e.timeBudget !== 'number') e.timeBudget = 0;
  for (const k of ['walls', 'doors', 'lowWalls', 'buttons', 'waypoints', 'edges', 'entryPoints', 'extractionPoints', 'enemySpawns', 'prisoners']) if (!Array.isArray(e[k])) e[k] = [];
  if (!e.entryPoints.length) e.entryPoints = [{ x: 110, y: 360 }];
  if (!e.extractionPoints.length) e.extractionPoints = [{ x: 1190, y: 360 }];
  e.waypoints.forEach((w, i) => { w.id = i; if (!w.tags) w.tags = ['patrol']; if (!w.pos) w.pos = { x: 640, y: 360 }; });
  e.doors.forEach((d, i) => { if (!d.id) d.id = 'd' + (i + 1); d.open = false; });

}
const normalizeForPlay = (e) => normalizeEdit(JSON.parse(JSON.stringify(e)));
function editorOpen() { if (!edit) editorLoad('blank'); else normalizeEdit(edit); scene = 'EDITOR'; editDrag = null; releasePointer(); editMsg = '左鍵=放置/拖拉 · 右鍵=刪除 · 數字鍵 1‑0=切工具 · G=格線'; }

}
function snapPt(p) { const s = editSnap || 0; let x = p.x, y = p.y; if (s) { x = Math.round(x / s) * s; y = Math.round(y / s) * s; } return { x: clamp(x, 0, 1280), y: clamp(y, 0, 720) }; }

// spawn 工具循環：步兵R → 步兵F → 警犬 → 重機槍 → 霰彈兵 → 移除
const SPAWN_CYCLE = [{ personality: 'rusher' }, { personality: 'flanker' }, { type: 'dog' }, { type: 'heavy_lmg' }, { type: 'heavy_shot' }];
const spawnCycleIdx = (s) => SPAWN_CYCLE.findIndex(c => c.type ? (c.type === s.type) : (!s.type && c.personality === s.personality));
const SPAWN_TAG = { dog: { s: '犬', c: '#ffcf5a' }, heavy_lmg: { s: '機', c: '#c79bff' }, heavy_shot: { s: '霰', c: '#7fb4ff' } };
const spawnInfo = (s) => s.type ? (SPAWN_TAG[s.type] || { s: '?', c: '#c07bff' }) : (s.personality === 'rusher' ? { s: 'R', c: '#ff6b6b' } : { s: 'F', c: '#ffb454' });
function cycleSpawn(i) {
  const s = edit.enemySpawns.find(s => s.nodeId === i);
  if (!s) { edit.enemySpawns.push({ nodeId: i, ...SPAWN_CYCLE[0] }); return; }
  const next = spawnCycleIdx(s) + 1;
  if (next >= SPAWN_CYCLE.length) { edit.enemySpawns = edit.enemySpawns.filter(x => x !== s); return; }   // 走完一輪＝移除
  edit.enemySpawns = edit.enemySpawns.map(x => x === s ? { nodeId: i, ...SPAWN_CYCLE[next] } : x);          // 重建以清掉舊欄位
}
function removeWaypoint(idx) {
  edit.waypoints.splice(idx, 1);
  edit.edges = edit.edges.filter(([a, b]) => a !== idx && b !== idx).map(([a, b]) => [a > idx ? a - 1 : a, b > idx ? b - 1 : b]);
  edit.enemySpawns = edit.enemySpawns.filter(s => s.nodeId !== idx).map(s => ({ ...s, nodeId: s.nodeId > idx ? s.nodeId - 1 : s.nodeId }));
  edit.waypoints.forEach((w, i) => w.id = i); editSelWp = null;
}
function editorClickAt(m) {
  const t = editTool;
  if (t === 'wp') edit.waypoints.push({ id: edit.waypoints.length, pos: { x: m.x, y: m.y }, tags: [editTagBrush] });
  else if (t === 'edge') { const i = editNearestWp(m, 26); if (i < 0) { editSelWp = null; return; } if (editSelWp == null) editSelWp = i; else if (editSelWp !== i) { toggleEdge(editSelWp, i); editSelWp = null; } else editSelWp = null; }
  else if (t === 'spawn') { const i = editNearestWp(m, 26); if (i >= 0) cycleSpawn(i); }
  else if (t === 'button') edit.buttons.push({ id: 'b' + (edit.buttons.length + 1), x: m.x, y: m.y, doorId: editNearestDoorId(m) });
  else if (t === 'prisoner') edit.prisoners.push({ x: m.x, y: m.y });
  else if (t === 'entry') edit.entryPoints = [{ x: m.x, y: m.y }];
  else if (t === 'extract') edit.extractionPoints = [{ x: m.x, y: m.y }];

}
function editorCommitSeg(a, b) {
  if (editTool === 'wall') edit.walls.push({ x1: a.x, y1: a.y, x2: b.x, y2: b.y });
  else if (editTool === 'door') edit.doors.push({ id: 'd' + (edit.doors.length + 1), x1: a.x, y1: a.y, x2: b.x, y2: b.y, open: false });

}
function editorEraseAt(m) {
  let i = editNearestWp(m, 16); if (i >= 0) { removeWaypoint(i); return; }
  i = edit.prisoners.findIndex(p => dist(m, { x: p.x, y: p.y }) < 14); if (i >= 0) { edit.prisoners.splice(i, 1); return; }
  i = edit.buttons.findIndex(b => dist(m, { x: b.x, y: b.y }) < 14); if (i >= 0) { edit.buttons.splice(i, 1); return; }
  const near = (arr) => arr.findIndex(s => dist(m, closestOnSeg(m, { x: s.x1, y: s.y1 }, { x: s.x2, y: s.y2 })) < 10);
  i = near(edit.doors); if (i >= 0) { edit.doors.splice(i, 1); return; }
  i = near(edit.lowWalls); if (i >= 0) { edit.lowWalls.splice(i, 1); return; }

}
function editorValidate() {
  const e = edit, issues = [];
  if (e.waypoints.length < 1) issues.push('需要 ≥1 個 waypoint');
  if (!e.entryPoints.length) issues.push('缺進場點'); if (!e.extractionPoints.length) issues.push('缺撤離點');
  let xcross = 0;
  for (const [a, b] of e.edges) { const A = e.waypoints[a], B = e.waypoints[b]; if (!A || !B) continue; for (const lw of e.lowWalls) if (segIntersect(A.pos, B.pos, { x: lw.x1, y: lw.y1 }, { x: lw.x2, y: lw.y2 })) xcross++; }
  if (xcross) issues.push(xcross + ' 條敵人邊穿過低矮牆(會卡牆)');

    const near = (p) => { let bi = -1, bd = Infinity; e.waypoints.forEach((w, i) => { const d = dist(p, w.pos); if (d < bd) { bd = d; bi = i; } }); return bi; };
    const en = near(e.entryPoints[0]), ex = near(e.extractionPoints[0]);
    const adjL = e.waypoints.map(() => []); for (const [a, b] of e.edges) { if (adjL[a] && adjL[b]) { adjL[a].push(b); adjL[b].push(a); } }
    const seen = new Set([en]), q = [en]; while (q.length) { const c = q.shift(); for (const nb of adjL[c]) if (!seen.has(nb)) { seen.add(nb); q.push(nb); } }
    if (!seen.has(ex)) issues.push('進場↔撤離 未連通');

}
function editorTestPlay() {
  const fatal = editorValidate().filter(s => /未連通|waypoint|進場|撤離/.test(s));
  if (fatal.length) { editMsg = '無法試玩：' + fatal.join('；'); return; }

}
function editorExport() {
  const e = edit, J = a => JSON.stringify(a);
  const key = (e.label || 'mymap').replace(/[^a-zA-Z0-9_]/g, '') || 'mymap';
  const tb = e.timeBudget ? `\n  timeBudget: ${e.timeBudget},` : '';
  const s = `${key}: {\n  label: ${J(e.label)},${tb}\n  walls: ${J(e.walls)},\n  doors: ${J(e.doors)},\n  lowWalls: ${J(e.lowWalls)},\n  buttons: ${J(e.buttons)},\n  waypoints: ${J(e.waypoints)},\n  edges: ${J(e.edges)},\n  entryPoints: ${J(e.entryPoints)},\n  extractionPoints: ${J(e.extractionPoints)},\n  enemySpawns: ${J(e.enemySpawns)},\n  prisoners: ${J(e.prisoners)},\n},`;
  console.log('=== SLEEPER MAP EXPORT (貼進 MAPS{}，再於 ROADMAP 節點加 map:\'' + key + '\') ===\n' + s);
  try { localStorage.setItem('sleeper_map', JSON.stringify(e)); } catch (_) { }

/* ---- 編輯器繪製 ---- */
function eBtn(x, y, w, h, label, fn, opts = {}) {
  const on = opts.active, en = opts.enabled !== false;
  ctx.fillStyle = on ? 'rgba(95,160,210,0.95)' : (en ? 'rgba(40,50,64,0.95)' : 'rgba(30,34,40,0.6)');
  ctx.fillRect(x, y, w, h); ctx.lineWidth = 1.2; ctx.strokeStyle = on ? '#bfe3ff' : 'rgba(150,170,190,0.6)'; ctx.strokeRect(x, y, w, h);
  ctx.fillStyle = en ? (on ? '#08121a' : '#dbe6f0') : '#666'; ctx.font = '12px Consolas'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w / 2, y + h / 2 + 1); ctx.textBaseline = 'alphabetic'; ctx.textAlign = 'left';
  if (en && fn) editRects.push({ x, y, w, h, fn });
}
function drawEditGeom() {

  for (const [a, b] of e.edges) { const A = e.waypoints[a], B = e.waypoints[b]; if (!A || !B) continue; const bad = e.lowWalls.some(lw => segIntersect(A.pos, B.pos, { x: lw.x1, y: lw.y1 }, { x: lw.x2, y: lw.y2 })); ctx.strokeStyle = bad ? 'rgba(255,90,90,0.85)' : 'rgba(120,160,200,0.5)'; ctx.lineWidth = bad ? 2.5 : 1.5; ctx.beginPath(); ctx.moveTo(A.pos.x, A.pos.y); ctx.lineTo(B.pos.x, B.pos.y); ctx.stroke(); }

  ctx.strokeStyle = '#4a5566'; ctx.lineWidth = 6; for (const w of e.walls) { ctx.beginPath(); ctx.moveTo(w.x1, w.y1); ctx.lineTo(w.x2, w.y2); ctx.stroke(); }
  ctx.strokeStyle = '#caa05a'; ctx.lineWidth = 8; for (const d of e.doors) { ctx.beginPath(); ctx.moveTo(d.x1, d.y1); ctx.lineTo(d.x2, d.y2); ctx.stroke(); }

    const gi = sp ? spawnInfo(sp) : null;

    ctx.fillStyle = '#8aa'; ctx.font = '9px Consolas'; ctx.textAlign = 'center'; ctx.fillText('#' + w.id + (gi ? ' ' + gi.s : ''), w.pos.x, w.pos.y - 10);
    ctx.fillStyle = 'rgba(150,170,190,0.55)'; ctx.fillText(w.tags.join(','), w.pos.x, w.pos.y + 18); ctx.textAlign = 'left';
  }
  for (const pr of e.prisoners) { ctx.strokeStyle = '#7fe3c0'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(pr.x, pr.y, 11, 0, Math.PI * 2); ctx.stroke(); ctx.fillStyle = '#7fe3c0'; ctx.font = 'bold 11px Consolas'; ctx.textAlign = 'center'; ctx.fillText('俘', pr.x, pr.y + 4); ctx.textAlign = 'left'; }
  const en = e.entryPoints[0], ex = e.extractionPoints[0];
  if (en) { ctx.strokeStyle = '#caa05a'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(en.x, en.y, 12, 0, Math.PI * 2); ctx.stroke(); ctx.fillStyle = '#caa05a'; ctx.font = 'bold 12px Consolas'; ctx.textAlign = 'center'; ctx.fillText('進', en.x, en.y + 4); ctx.textAlign = 'left'; }
  if (ex) { ctx.strokeStyle = '#5fd06b'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(ex.x, ex.y, 12, 0, Math.PI * 2); ctx.stroke(); ctx.fillStyle = '#5fd06b'; ctx.font = 'bold 12px Consolas'; ctx.textAlign = 'center'; ctx.fillText('撤', ex.x, ex.y + 4); ctx.textAlign = 'left'; }
}
function drawEditorUI() {

  drawEditGeom();

  const cur = snapPt({ x: mouse.mx, y: mouse.my });
  if (editDrag && isDragTool(editTool)) { ctx.strokeStyle = '#ffd27d'; ctx.setLineDash([6, 6]); ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(editDrag.x, editDrag.y); ctx.lineTo(cur.x, cur.y); ctx.stroke(); ctx.setLineDash([]); }
  ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(cur.x, cur.y, 4, 0, Math.PI * 2); ctx.stroke();
  // 上方工具列
  ctx.fillStyle = 'rgba(8,11,16,0.86)'; ctx.fillRect(0, 0, cv.width, 104);
  ctx.fillStyle = '#7fe3ff'; ctx.font = 'bold 16px Consolas'; ctx.textAlign = 'left'; ctx.fillText('關卡編輯器', 14, 26);
  let ax = cv.width - 14; const act = (label, fn, w, opts) => { ax -= w; eBtn(ax, 12, w, 24, label, fn, opts); ax -= 6; };
  act('離開', editorExit, 56); act('試玩', editorTestPlay, 56); act('輸出', editorExport, 56); act('草稿', () => editorLoad('saved'), 56);
  act('bravo', () => editorLoad('bravo'), 58); act('alpha', () => editorLoad('alpha'), 58); act('空白', () => editorLoad('blank'), 56);
  act('格線:' + (editSnap ? '開' : '關'), () => editSnap = editSnap ? 0 : 20, 78, { active: !!editSnap });
  const TBC = [0, 60, 90, 120, 150]; act('時間:' + (edit.timeBudget ? edit.timeBudget + 's' : '預設'), () => { edit.timeBudget = TBC[(TBC.indexOf(edit.timeBudget) + 1) % TBC.length] || 0; }, 86);
  const tools = [['wall', '牆'], ['door', '門'], ['low', '矮牆'], ['wp', '點'], ['edge', '連線'], ['spawn', '敵'], ['button', '鈕'], ['entry', '進'], ['extract', '撤'], ['erase', '刪'], ['prisoner', '俘虜']];
  let tx = 14; tools.forEach((t, i) => { const hot = t[0] === 'prisoner' ? 'P' : ((i + 1) % 10); eBtn(tx, 44, 58, 24, hot + ' ' + t[1], () => { editTool = t[0]; editSelWp = null; }, { active: editTool === t[0] }); tx += 62; });
  ctx.fillStyle = editTool === 'wp' ? '#dbe6f0' : '#5a6470'; ctx.font = '11px Consolas'; ctx.textAlign = 'left'; ctx.fillText('點標籤:', 14, 92);
  const tags = ['patrol', 'cover', 'flank', 'vantage', 'rush', 'choke', 'spawn']; let gx = 66; tags.forEach(tg => { eBtn(gx, 79, 62, 18, tg, () => editTagBrush = tg, { active: editTagBrush === tg }); gx += 66; });

  ctx.fillStyle = 'rgba(8,11,16,0.82)'; ctx.fillRect(0, cv.height - 46, cv.width, 46);
  ctx.textAlign = 'left'; ctx.font = '12px Consolas'; ctx.fillStyle = '#9fb3c8';
  ctx.fillText('工具:' + editTool + '　左鍵放置/拖拉 · 右鍵刪除 · 1‑0 切工具 · G 格線 · edge:點兩個點連線 · 敵:點 waypoint 循環 步兵R→步兵F→警犬→重機槍→霰彈兵→無', 14, cv.height - 26);
  ctx.fillStyle = issues.length ? '#ff9b6b' : '#5fd06b'; ctx.fillText(issues.length ? '⚠ ' + issues.join('；') : '✓ 可試玩 / 輸出', 14, cv.height - 8);
  if (editMsg) { ctx.fillStyle = '#ffe08a'; ctx.textAlign = 'right'; ctx.fillText(editMsg, cv.width - 14, cv.height - 8); ctx.textAlign = 'left'; }
}
function drawEditor() { ctx.fillStyle = '#0a0e14'; ctx.fillRect(0, 0, cv.width, cv.height); drawEditorUI(); }

/* =====================================================================
   Main loop
   ===================================================================== */
const FIXED = 1 / 60;
let acc = 0, last = performance.now();
function frame(now) {
  let delta = (now - last) / 1000; last = now;
  if (delta > 0.25) delta = 0.25;
  acc += delta;
  while (acc >= FIXED) { update(FIXED); acc -= FIXED; }
  draw();
  requestAnimationFrame(frame);
}

initRun();
requestAnimationFrame(frame);
