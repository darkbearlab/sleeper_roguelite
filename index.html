<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLEEPER — 垂直切片 (Vertical Slice)</title>
<style>
  html,body{margin:0;height:100%;background:#06080d;overflow:hidden;
    font-family:Consolas,"Courier New",monospace;color:#cdd6e0;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{background:#06080d;image-rendering:auto;cursor:crosshair;
    box-shadow:0 0 40px #000a;max-width:100%;max-height:100%;}
</style>
</head>
<body>
<div id="wrap"><canvas id="cv" width="1280" height="720"></canvas></div>
<script>
"use strict";
/* =====================================================================
   CODENAME: SLEEPER — Phase 1 垂直切片（戰術化 + 旋轉視角 + 戰爭迷霧）
   原生 JS + Canvas 2D，零外部相依。
   分區： CONFIG / Math / Map / LoS+Vision / Camera / State /
          Possession / Combat(換彈/發散) / IdleAI / EnemyAI /
          Extraction / Movement / Input / Update / Render(迷霧)
   ===================================================================== */

/* =====================================================================
   CONFIG — 所有可調數值集中於此（全部為佔位值，待調平衡）
   ===================================================================== */
const CONFIG = {
  // --- 規格指定值 ---
  switchHandoverMs: 0,      // 切換附身交接延遲（0 = 無 CD）
  idleAccuracyMult: 0.5,    // 待機精度倍率（待機基礎發散 = spreadBase / 此值，越低越散）
  idleReactionDelay: 0.4,   // 待機：看到敵人到開火的延遲 (s)
  idleFireRateMult: 0.7,    // 待機射速倍率（越低越慢）
  idleTap: { size: 3, gap: 0.55 },  // 點放(TAP)：每 burst 發數 / burst 後停頓秒數（讓 bloom 回復）
  unitHp: 100,
  moveSpeed: 110,           // px/s（戰術化：放慢）
  turnSpeed: 480,           // deg/s（預設砲塔轉速；實際以各武器 turnSpeed 為準）
  mouseSensitivity: 0.0035, // FPS 式滑鼠鎖定靈敏度（rad/px）。轉速不夠快時砲塔會追不上＝轉向延遲
  // Shift 奔跑：奔跑倍率 = base − (武器weight−1)×weightPenalty，夾在 [minMult, base]（越重跑越慢）
  sprint: { base: 1.9, weightPenalty: 0.5, minMult: 1.1 },
  // 武器數值移至下方 WEAPONS 目錄（可指派、未來可換）

  timeBudget: 90,
  reinforce: { startInterval: 2.0, rampEvery: 10, rampDelta: -0.3, minInterval: 0.4 },
  hysteresisBonus: 25,
  squadSize: 3,
  // 跨關回復：每場戰鬥開始時，存活成員「缺血」回復的比例。
  // 1.0＝自動全補（目前行為）；0＝殘血照舊帶入；0.5＝回復一半缺口。當前血量已跨關攜帶，調此鈕即生效。
  interMissionHealFrac: 1.0,

  // 共用倉庫 / 裝備 / 搜刮（meta 庫存層；佔位旋鈕）
  loadout: {
    slotsPerMember: 2,             // 倉庫容量 = 生還人數 × 此值（喚醒/陣亡即時改變）
    abilitiesCountTowardCap: true, // 技能是否佔倉庫格（實測太擠可關）
    scavengeChoices: 3,            // 搜刮抽選數（三選一，用 agency 蓋過純 RNG）
  },
  // 彈藥：每武器類別一個共用儲備（reserve）。本階段「不咬人」＝寬裕值，正常一場打不完。
  // pistol＝底線武器，彈藥視為無限、不納入分配。
  ammo: { stockStart: 600, defaultAlloc: 240, salvageAlly: 120, salvageEnemy: 60 },
  pickupRadius: 26,                // 被附身單位走到掉落物多近會撿進臨時背包

  // 地形 / 互動（門、按鈕、低矮牆）
  interactRadius: 40,             // 互動(開關門/按鈕)距離；門以「到門線段最近點」量距，整扇門寬都好按
  enemyHearRadius: 320,           // 玩家開火驚動半徑（半徑內 IDLE 敵人 → ENGAGED；不論命中）
  // 低矮牆＝掩體：玩家穿越減速、敵人視為實體繞行、不擋視線、子彈「遠距機率擋／貼牆可越射」
  lowWall: { slow: 0.3, touchR: 12, closeRange: 90, blockChance: 0.55 },
  // 重裝敵人裝甲：高機率「整發擋下」非穿甲攻擊；穿甲(pierce)越高越能無視。
  // 有效擋格率 = blockChance × (1 − weapon.pierce)。血量與一般敵人相同，靠這條形成質差。
  armor: { blockChance: 0.85 },
  // 側翼/突襲（敵我皆適用）：依攻擊來向 vs 目標視野錐。flank＝錐外(側後)＝×flankMult 且無視所有裝甲；
  // surprise＝閒置敵人正面＝×surpriseMult（僅對敵）；兩者皆中取較高、不相乘。
  flank: { flankMult: 2.0, surpriseMult: 1.5 },

  // --- 額外佔位 ---
  unitRadius: 12,
  nodeReach: 22,
  extractRadius: 34,
  sweepAmpDeg: 70,
  sweepSpeed: 35,
  wanderAmpDeg: 28,         // WANDER：相對「進入閒置時正前方」的最大偏擺（度，視野不離正前方）
  wanderSpeed: 45,          // WANDER：擺頭轉速（度/秒，較慢＝沉穩不慌張）
  ghostAlertTime: 4.0,
  ghostCloseRange: 150,
  lowHpFrac: 0.35,

  // 戰爭迷霧 / 視野（敵我共用）：前方 90° 視錐(距離無限、被牆遮斷) + 360° 近身感知
  vision: {
    coneHalfDeg: 45,        // 視錐半角（總 90°）
    senseRadius: 90,        // 近身感知半徑（基礎；× 單位 strength，越強越長）
    fanRays: 28,            // 視錐渲染射線數
    coneMax: 2200,          // 視錐射線最大長度（≈無限，實際被牆截斷）
  },
  fog: { color: '#05070b', skeletonAlpha: 0.16 },

  // 旋轉鏡頭（跟隨被附身單位、使其朝上）；anchorY＝單位在畫面的縱向位置(0.5置中, 越大越靠下→前方視野越長)
  camera: { scale: 1.0, followLerp: 9, rotateLerp: 8, anchorY: 0.66 },

  enemy: {
    moveSpeed: 85,
    hp: 70,
    reactionDelay: 0.35,
    strength: 1.0,
    // 敵人武器＝WEAPONS.carbine（已入目錄、可掉落/撿取/裝備）；數值在 WEAPONS 調整
  },

  // 敵人選點權重
  chargeMul: 1.7,   // 未能交火時加碼推進
  holdProxMul: 0.2, // 已能交火時壓低推進（拉開距離對射）
  ai: {
    rusher:  { tags: { rush: 20, choke: 10, patrol: 5 },               wRush: 700, wFlank: 0,   wExpose: 5,  wSight: 25 },
    flanker: { tags: { flank: 30, vantage: 15, cover: 25, patrol: 5 }, wRush: 500, wFlank: 120, wExpose: 70, wSight: 25 },
    holder:  { tags: { vantage: 25, cover: 30, choke: 12, patrol: 5 }, wRush: 200, wFlank: 0,   wExpose: 55, wSight: 35 },  // 重機槍：守點壓制、不愛推進/暴露
  },
};

const SPECIAL_TAGS = ['flank', 'vantage', 'choke'];

/* =====================================================================
   WEAPONS / ABILITIES — 資料驅動（未來可掉落/更換）
   每把武器：威力 / 射速 / 射程 / 彈速 / 發散(基礎,連射,上限,回復) / 彈夾 / 換彈 / 總彈藥 /
            迴轉速度(turnSpeed) / 稀有度(rarity)
   ===================================================================== */
// weight：重量（影響 Shift 奔跑倍率，越重跑越慢）
// pierce：穿甲值 0~1（對裝甲敵人的有效擋格率 = armor.blockChance × (1−pierce)）。
//   分級：pistol/smg/pdw/carbine=0（反人員，對甲無力）／rifle=0.5（過半穿）／dmr=0.9（裝甲可靠解）。
// pellets：單次擊發的彈丸數（霰彈）；burst：點放節奏 { size 連發數, gap 連發後停頓秒 }（重機槍）。
const WEAPONS = {
  // pistol＝底線武器（§7）：弱、永遠有、彈藥無限（不納入分配/儲備）
  pistol:{ name: 'Pistol',rarity: 'common',   weight: 0.5, damage: 10, fireRate: 6,  range: 280, projSpeed: 680, spreadBase: 2.5, spreadPerShot: 2.0, spreadMax: 12, spreadRecover: 10, magazine: 12, reloadTime: 1.1, turnSpeed: 600, pierce: 0 },
  smg:   { name: 'SMG',   rarity: 'common',   weight: 0.9, damage: 13, fireRate: 12, range: 330, projSpeed: 740, spreadBase: 3.2, spreadPerShot: 2.6, spreadMax: 16, spreadRecover: 11, magazine: 35, reloadTime: 1.3, turnSpeed: 560, pierce: 0 },
  pdw:   { name: 'PDW',   rarity: 'uncommon', weight: 1.2, damage: 16, fireRate: 9,  range: 380, projSpeed: 780, spreadBase: 2.2, spreadPerShot: 2.2, spreadMax: 13, spreadRecover: 9,  magazine: 40, reloadTime: 1.5, turnSpeed: 520, pierce: 0 },
  rifle: { name: 'Rifle', rarity: 'common',   weight: 1.8, damage: 22, fireRate: 7,  range: 470, projSpeed: 840, spreadBase: 1.4, spreadPerShot: 1.8, spreadMax: 10, spreadRecover: 8,  magazine: 30, reloadTime: 1.8, turnSpeed: 440, pierce: 0.5 },
  // carbine＝敵人武器（現入目錄，可掉落/撿取/裝備）；dmr＝稀有戰利品（搜刮天花板）
  carbine:{ name:'Carbine',rarity:'common',   weight: 1.3, damage: 9,  fireRate: 3,  range: 340, projSpeed: 640, spreadBase: 3,   spreadPerShot: 1.8, spreadMax: 14, spreadRecover: 8,  magazine: 30, reloadTime: 2.0, turnSpeed: 360, pierce: 0 },
  dmr:   { name: 'DMR',   rarity: 'rare',     weight: 2.0, damage: 34, fireRate: 3.5,range: 560, projSpeed: 980, spreadBase: 1.0, spreadPerShot: 1.4, spreadMax: 8,  spreadRecover: 7,  magazine: 15, reloadTime: 2.0, turnSpeed: 400, pierce: 0.9 },
  // --- 敵人專屬武器（不入玩家戰利品池）---
  fangs:  { name:'Fangs',  rarity:'common',   weight: 0,   damage: 7,  fireRate: 8,  range: 34,  projSpeed: 520, spreadBase: 6,   spreadPerShot: 0,   spreadMax: 6,  spreadRecover: 20, magazine: 999, reloadTime: 0.1, turnSpeed: 560, pierce: 0 },                       // 警犬：貼臉短間距連咬（走一般射擊管線）
  lmg:    { name:'LMG',    rarity:'rare',     weight: 3.0, damage: 11, fireRate: 11, range: 420, projSpeed: 760, spreadBase: 3.5, spreadPerShot: 1.2, spreadMax: 18, spreadRecover: 6,  magazine: 60,  reloadTime: 3.0, turnSpeed: 260, pierce: 0, burst: { size: 8, gap: 0.7 } },  // 重機槍：點放掃射
  shotgun:{ name:'Shotgun',rarity:'uncommon', weight: 2.2, damage: 6,  fireRate: 1.4,range: 240, projSpeed: 620, spreadBase: 9,   spreadPerShot: 0,   spreadMax: 9,  spreadRecover: 10, magazine: 6,   reloadTime: 2.2, turnSpeed: 360, pierce: 0, pellets: 7 },                   // 霰彈兵：貼臉多發爆發
};
const WEAPON_IDS = Object.keys(WEAPONS);
const FLOOR_WEAPON = 'pistol';                              // 預設武器底線（§7）
const RECRUIT_WEAPON_IDS = ['smg', 'pdw', 'rifle'];        // 隨機招募只抽這些（不含底線/敵槍/稀有）
const LOOT_WEAPON_IDS = ['smg', 'pdw', 'rifle', 'carbine', 'dmr']; // 搜刮戰利品池（含稀有）
const isInfiniteAmmo = (id) => id === FLOOR_WEAPON;        // 底線武器彈藥無限
const RARITY_COLOR = { common: '#b8c2cc', uncommon: '#5fd06b', rare: '#5aa9ff', epic: '#c07bff', legendary: '#ffb454' };
const rarityColor = (r) => RARITY_COLOR[r] || '#b8c2cc';

// 技能：目前全部佔位＝恢復生命，有 CD（僅手動可用）。多種＝倉庫換技能有取捨（量/CD 不同）。
const ABILITIES = {
  heal:     { name: 'Heal',      cooldown: 8,  heal: 25 },
  medkit:   { name: 'Medkit',    cooldown: 14, heal: 50 },
  firstaid: { name: 'First Aid', cooldown: 5,  heal: 14 },
};
const ABILITY_IDS = Object.keys(ABILITIES);
const LOOT_ABILITY_IDS = ['medkit', 'firstaid', 'heal']; // 搜刮可出的技能 item

// 裝備（持續被動，每單位 1 槽；效果於 makePlayer 套用）。fx 欄位皆為佔位倍率/加值。
//   maxHpAdd / senseMul / reloadMul / magMul / dmgResist(0~1減傷) / spreadMul(發散×) / turnMul / moveMul
const EQUIPMENT = {
  armor:    { name: 'Armor',     rarity: 'uncommon', fx: { dmgResist: 0.15 } },
  scope:    { name: 'Scope',     rarity: 'uncommon', fx: { senseMul: 1.4 } },
  quickmag: { name: 'QuickMag',  rarity: 'uncommon', fx: { reloadMul: 0.7 } },
  extmag:   { name: 'ExtMag',    rarity: 'uncommon', fx: { magMul: 1.5 } },
  stabil:   { name: 'Stabilizer',rarity: 'rare',     fx: { spreadMul: 0.7 } },
  light:    { name: 'LightFrame',rarity: 'common',   fx: { turnMul: 1.2, moveMul: 1.1 } },
  plate:    { name: 'HeavyPlate',rarity: 'rare',     fx: { dmgResist: 0.3, moveMul: 0.9 } },
};
const EQUIP_IDS = Object.keys(EQUIPMENT);
const LOOT_EQUIP_IDS = EQUIP_IDS.slice();

// 道具（一次性，戰鬥中按 Q 觸發、用完消失；第一版只做瞬發 + 短時 buff，無拋射/區域）。
//   heal: 立即補血 / refill: 補滿彈夾+備彈 / buff: { dur, moveMul, fireRateMul }
const ITEMS = {
  stim:      { name: 'Stim',       rarity: 'common',   heal: 60 },
  ammobox:   { name: 'Ammo Box',   rarity: 'common',   refill: true },
  adrenaline:{ name: 'Adrenaline', rarity: 'uncommon', buff: { dur: 6, moveMul: 1.4, fireRateMul: 1.4 } },
};
const ITEM_IDS = Object.keys(ITEMS);
const LOOT_ITEM_IDS = ITEM_IDS.slice();

/* =====================================================================
   ARCHETYPES — 待機個性矩陣（策展組合）。每名單位招募時隨機抽一種。
   facing: HOLD(固定) | SWEEP(掃視) | WANDER(亂飄) | TRACK(轉向看得到的威脅)
   discipline: TAP(點放：短 burst + 停頓讓 bloom 回復，準/省彈/斷續) | AUTO(扣到底：持續噴，bloom 拉滿，散/耗彈/壓制)
   tier 為盯哨可靠度(0=☆ 最飄忽 → 3=★★★ 最可靠)，僅用於 UI 名稱顏色提示。
   ===================================================================== */
const ARCHETYPES = {
  rock:       { name: 'Rock',       facing: 'HOLD',   discipline: 'TAP',  fireMode: 'AGGRESSIVE',  tier: 3 },
  sentinel:   { name: 'Sentinel',   facing: 'SWEEP',  discipline: 'TAP',  fireMode: 'AGGRESSIVE',  tier: 2 },
  suppressor: { name: 'Suppressor', facing: 'HOLD',   discipline: 'AUTO', fireMode: 'SUPPRESSIVE', tier: 2 },
  hunter:     { name: 'Hunter',     facing: 'TRACK',  discipline: 'TAP',  fireMode: 'AGGRESSIVE',  tier: 2 },
  sprayer:    { name: 'Sprayer',    facing: 'SWEEP',  discipline: 'AUTO', fireMode: 'AGGRESSIVE',  tier: 1 },
  watchdog:   { name: 'Watchdog',   facing: 'TRACK',  discipline: 'AUTO', fireMode: 'DEFENSIVE',   tier: 1 },
  drifter:    { name: 'Drifter',    facing: 'WANDER', discipline: 'TAP',  fireMode: 'DEFENSIVE',   tier: 0 },
  twitch:     { name: 'Twitch',     facing: 'WANDER', discipline: 'AUTO', fireMode: 'AGGRESSIVE',  tier: 0 },
};
const ARCHETYPE_IDS = Object.keys(ARCHETYPES);
const TIER_COLOR = ['#ff7d7d', '#e0b050', '#9fd0e0', '#7fffa8']; // 0(☆)→3(★★★)

/* =====================================================================
   ENEMY_TYPES — 敵人類型目錄（資料驅動；enemySpawns 以 type 指定，預設 grunt）。
   weaponId/hp/moveSpeed 同表掌控；armor=擋格率(>0 即帶甲)；attack=ranged|burst（霰彈靠武器 pellets）；
   personality=預設選點個性（spawn 可覆蓋）；coneHalfDeg/senseMul=感知；radius/hue=外觀。
   血量刻意與 grunt 相同——重裝的質差來自「裝甲」而非血量（§使用者設計）。
   ===================================================================== */
const ENEMY_TYPES = {
  grunt:      { name: '步兵',   weaponId: 'carbine', hp: CONFIG.enemy.hp, moveSpeed: CONFIG.enemy.moveSpeed, personality: 'rusher',  hue: 0,   radius: CONFIG.unitRadius },
  dog:        { name: '警犬',   weaponId: 'fangs',   hp: 45,              moveSpeed: 165,                    personality: 'rusher',  hue: 45,  radius: 9,  coneHalfDeg: 80, senseMul: 1.5 },  // 快、脆、貼臉連咬、視野廣
  heavy_lmg:  { name: '重機槍兵', weaponId: 'lmg',   hp: CONFIG.enemy.hp, moveSpeed: 55,                     personality: 'holder',  hue: 280, radius: 14, armor: CONFIG.armor.blockChance, attack: 'burst' },  // 慢、帶甲、點放掃射
  heavy_shot: { name: '霰彈兵', weaponId: 'shotgun', hp: CONFIG.enemy.hp, moveSpeed: 70,                     personality: 'rusher',  hue: 200, radius: 14, armor: CONFIG.armor.blockChance },                   // 中速、帶甲、推進貼臉
};
const ENEMY_TYPE_IDS = Object.keys(ENEMY_TYPES);

// 招募隨機（全部都隨機、無固定基準）：名字/色相/感知/武器/個性
const UNIT_NAMES = ['Guard', 'Sentry', 'Ghost', 'Vanguard', 'Warden', 'Wisp', 'Echo', 'Raven', 'Slate', 'Cinder', 'Marlow', 'Vesper', 'Koda', 'Bishop', 'Reed', 'Tace', 'Lark', 'Nyx'];
const HUE_POOL = [205, 155, 285, 35, 95, 330, 170, 250, 310, 55, 130];
const rngPick = (a) => a[Math.floor(Math.random() * a.length)];
function makeRecruit(used) {
  let name = rngPick(UNIT_NAMES);
  if (used) { let g = 0; while (used.has(name) && g++ < 50) name = rngPick(UNIT_NAMES); used.add(name); }
  return { name, hue: rngPick(HUE_POOL), strength: rngPick([0.8, 1.0, 1.2]),
    weaponId: rngPick(RECRUIT_WEAPON_IDS), abilityId: 'heal', archetypeId: rngPick(ARCHETYPE_IDS),
    bonusMaxHp: 0, hp: CONFIG.unitHp, allocatedAmmo: CONFIG.ammo.defaultAlloc, disciplineOverride: null,
    equipId: null, itemId: null };   // 裝備（持續被動）/ 道具（一次性）各 1 槽，預設空
}

/* =====================================================================
   ROADMAP — Slay-the-Spire 式路線圖（目前只有 COMBAT / REST 兩種節點）
   col=直行(左→右推進)、row=縱向位置；start=第一行可選節點；edges 有向 a→b。
   戰鬥都綁同一張地圖、休息都同一種；走到無後繼的終點＝RUN COMPLETE。
   ===================================================================== */
const ROADMAP = {
  start: [0, 1],
  nodes: [
    { id: 0, col: 0, row: 1, type: 'COMBAT' },                  // map 預設 alpha
    { id: 1, col: 0, row: 3, type: 'COMBAT', map: 'bravo' },    // 門/掩體圖（開門才見敵）
    { id: 2, col: 1, row: 0, type: 'ARMORY' },                  // 軍械庫：三選一拿 武器/裝備/技能/道具
    { id: 3, col: 1, row: 2, type: 'REST' },
    { id: 4, col: 1, row: 4, type: 'COMBAT' },
    { id: 5, col: 2, row: 1, type: 'COMBAT' },
    { id: 6, col: 2, row: 3, type: 'COMBAT', map: 'bravo' },    // 門/掩體圖
    { id: 7, col: 3, row: 1, type: 'REST' },
    { id: 8, col: 3, row: 3, type: 'ARMORY' },
    { id: 9, col: 4, row: 2, type: 'COMBAT', map: 'bravo' },  // 終點＝門禁設施（必經，保證體驗）
  ],
  edges: [[0, 2], [0, 3], [1, 3], [1, 4], [2, 5], [3, 5], [3, 6], [4, 6], [5, 7], [5, 8], [6, 8], [7, 9], [8, 9]],
};
const roadAdj = {};
for (const n of ROADMAP.nodes) roadAdj[n.id] = [];
for (const [a, b] of ROADMAP.edges) roadAdj[a].push(b);
const roadNode = (id) => ROADMAP.nodes.find(n => n.id === id);
const roadMaxCol = Math.max(...ROADMAP.nodes.map(n => n.col));
const roadNodePos = (n) => ({ x: 130 + n.col * ((1280 - 260) / roadMaxCol), y: 150 + n.row * 92 });

/* =====================================================================
   Math — 向量 / 角度 / 幾何
   ===================================================================== */
const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const angTo = (a, b) => Math.atan2(b.y - a.y, b.x - a.x);
function angDiff(a, b) { let d = a - b; while (d > Math.PI) d -= 2 * Math.PI; while (d < -Math.PI) d += 2 * Math.PI; return d; }
function rotToward(cur, target, maxStep) { const d = angDiff(target, cur); if (Math.abs(d) <= maxStep) return target; return cur + Math.sign(d) * maxStep; }
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

function segIntersect(a, b, c, d) {
  const rx = b.x - a.x, ry = b.y - a.y, sx = d.x - c.x, sy = d.y - c.y;
  const rxs = rx * sy - ry * sx;
  if (Math.abs(rxs) < 1e-9) return false;
  const qpx = c.x - a.x, qpy = c.y - a.y;
  const t = (qpx * sy - qpy * sx) / rxs;
  const u = (qpx * ry - qpy * rx) / rxs;
  return t >= 0 && t <= 1 && u >= 0 && u <= 1;
}
function closestOnSeg(p, a, b) {
  const abx = b.x - a.x, aby = b.y - a.y;
  const len2 = abx * abx + aby * aby || 1;
  const t = clamp(((p.x - a.x) * abx + (p.y - a.y) * aby) / len2, 0, 1);
  return { x: a.x + abx * t, y: a.y + aby * t };
}
function segCircle(a, b, c, r) { const cp = closestOnSeg(c, a, b); return dist(cp, c) < r; }

// 射線 origin + dir·t 與線段 a-b 的最近正向 t（無交回傳 null）
function raySegT(o, d, a, b) {
  const rx = d.x, ry = d.y, sx = b.x - a.x, sy = b.y - a.y;
  const rxs = rx * sy - ry * sx;
  if (Math.abs(rxs) < 1e-9) return null;
  const qpx = a.x - o.x, qpy = a.y - o.y;
  const t = (qpx * sy - qpy * sx) / rxs;
  const u = (qpx * ry - qpy * rx) / rxs;
  if (t >= 0 && u >= 0 && u <= 1) return t;
  return null;
}
// 射線打到最近牆面的落點
function rayHit(o, ang, maxLen) {
  const d = { x: Math.cos(ang), y: Math.sin(ang) };
  let best = maxLen;
  for (const w of MAP.walls) {
    const t = raySegT(o, d, { x: w.x1, y: w.y1 }, { x: w.x2, y: w.y2 });
    if (t != null && t < best) best = t;
  }
  for (const dr of MAP.doors) {           // 關閉的門也截斷視錐（低矮牆不擋視線）
    if (dr.open) continue;
    const t = raySegT(o, d, { x: dr.x1, y: dr.y1 }, { x: dr.x2, y: dr.y2 });
    if (t != null && t < best) best = t;
  }
  return { x: o.x + d.x * best, y: o.y + d.y * best };
}

/* =====================================================================
   LoS / Vision — 牆面射線 + 節點可見度表 + 感知 canSee()
   （視線/子彈會被「永久牆 + 關閉的門」截斷；低矮牆矮、不擋視線）
   ===================================================================== */
function segBlocked(a, b) {
  for (const w of MAP.walls) if (segIntersect(a, b, { x: w.x1, y: w.y1 }, { x: w.x2, y: w.y2 })) return true;
  for (const d of MAP.doors) if (!d.open && segIntersect(a, b, { x: d.x1, y: d.y1 }, { x: d.x2, y: d.y2 })) return true;
  return false;
}
const clearLine = (a, b) => !segBlocked(a, b);
// 只看永久牆（門/低矮牆不算）——給節點可見度表，與門開關狀態無關、保持穩定
function clearLineWalls(a, b) {
  for (const w of MAP.walls) if (segIntersect(a, b, { x: w.x1, y: w.y1 }, { x: w.x2, y: w.y2 })) return false;
  return true;
}

function nearestNode(pos, requireLoS = false) {
  let best = -1, bd = Infinity;
  for (let i = 0; i < N; i++) {
    if (requireLoS && !clearLine(pos, wp(i).pos)) continue;
    const d = dist(pos, wp(i).pos);
    if (d < bd) { bd = d; best = i; }
  }
  if (best < 0) return nearestNode(pos, false);
  return best;
}
function buildNextHop() {
  const arr = new Array(N).fill(null);
  const d = new Array(N).fill(Infinity);
  const q = [extractNodeId]; d[extractNodeId] = 0;
  while (q.length) { const c = q.shift(); for (const nb of adj[c]) if (d[nb] === Infinity) { d[nb] = d[c] + 1; q.push(nb); } }
  for (let n = 0; n < N; n++) {
    if (n === extractNodeId) { arr[n] = n; continue; }
    let best = null, bd = d[n];
    for (const nb of adj[n]) if (d[nb] < bd) { bd = d[nb]; best = nb; }
    arr[n] = best != null ? best : n;
  }
  return arr;
}
// 切換作用中地圖並重建衍生表（N/adj/nodeVis/nextHop/EXTRACT/ENTRY/extractNodeId）
function buildMapDerived(key) {
  MAP = MAPS[key] || MAPS.alpha;
  EXTRACT = MAP.extractionPoints[0]; ENTRY = MAP.entryPoints[0];
  N = MAP.waypoints.length;
  adj = Array.from({ length: N }, () => []);
  for (const [a, b] of MAP.edges) { adj[a].push(b); adj[b].push(a); }
  nodeVis = Array.from({ length: N }, () => new Array(N).fill(false));
  for (let i = 0; i < N; i++) { nodeVis[i][i] = true; for (let j = i + 1; j < N; j++) { const v = clearLineWalls(wp(i).pos, wp(j).pos); nodeVis[i][j] = v; nodeVis[j][i] = v; } }
  extractNodeId = nearestNode(EXTRACT, false);
  nextHop = buildNextHop();
}

// 感知模型（敵我共用）：有視線，且（近身內 360° 或 前方 90° 視錐內）。視錐距離無限，靠牆截斷。
function canSee(observer, targetPos) {
  if (!clearLine(observer.pos, targetPos)) return false;
  if (dist(observer.pos, targetPos) <= observer.senseRadius) return true;
  const half = (observer.coneHalfDeg || CONFIG.vision.coneHalfDeg) * Math.PI / 180;   // 逐單位視錐（警犬更寬）
  return Math.abs(angDiff(angTo(observer.pos, targetPos), observer.facing)) <= half;
}
function isRevealed(enemy) { return activePlayers().some(p => canSee(p, enemy.pos)); }

   Camera — 旋轉視角（跟隨置中被附身單位、使其朝上）
   ===================================================================== */
let cam, camTarget;
function initCamera(f) {
  cam = { x: f.pos.x, y: f.pos.y, angle: -Math.PI / 2 - f.facing, scale: CONFIG.camera.scale };
  camTarget = { x: cam.x, y: cam.y, angle: cam.angle };
}
function updateCamera(dt) {
  if (!cam) return;   // 安全防護：非戰鬥場景 cam 可能尚未建立
  // 演出固定機位（cutscene.cam 非 null）：俯視框住場面，不跟單位
  if (cutscene && cutscene.cam) { camTarget.x = cutscene.cam.x; camTarget.y = cutscene.cam.y; camTarget.angle = cutscene.cam.angle; }
  // 跟隨被附身單位：手動控制(CONTROLLED) 或 護送撤離中(EXTRACTING) 都跟（撤出/陣亡後 controlledId 會被清空，鏡頭定住）
  else if (controlledId != null && (players[controlledId].state === 'CONTROLLED' || players[controlledId].state === 'EXTRACTING')) {
    const f = players[controlledId];
    camTarget.x = f.pos.x; camTarget.y = f.pos.y;
    camTarget.angle = -Math.PI / 2 - f.facing;   // facing → 螢幕上方
  }
  const kp = 1 - Math.exp(-CONFIG.camera.followLerp * dt);
  const ka = 1 - Math.exp(-CONFIG.camera.rotateLerp * dt);
  cam.x += (camTarget.x - cam.x) * kp;
  cam.y += (camTarget.y - cam.y) * kp;
  cam.angle += angDiff(camTarget.angle, cam.angle) * ka;
  cam.scale = CONFIG.camera.scale;
}
function w2s(p) {
  const ux = p.x - cam.x, uy = p.y - cam.y, c = Math.cos(cam.angle), s = Math.sin(cam.angle);
  return { x: cv.width / 2 + (ux * c - uy * s) * cam.scale, y: cv.height * CONFIG.camera.anchorY + (ux * s + uy * c) * cam.scale };
}

function makePlayer(i, cfg, pos) {
  const W = WEAPONS[cfg.weaponId];
  const ab = ABILITIES[cfg.abilityId];

  const fx = (cfg.equipId && EQUIPMENT[cfg.equipId]) ? EQUIPMENT[cfg.equipId].fx : {};   // 裝備持續被動
  const maxHp = CONFIG.unitHp + (cfg.bonusMaxHp || 0) + (fx.maxHpAdd || 0);
  // 跨關回復：以攜帶的當前血量為底，回復「缺口 × interMissionHealFrac」（frac=1 → 滿血，與舊行為一致）
  const carried = clamp(cfg.hp != null ? cfg.hp : maxHp, 0, maxHp);
  const startHp = clamp(Math.round(carried + (maxHp - carried) * CONFIG.interMissionHealFrac), 1, maxHp);
  const disc = cfg.disciplineOverride || arch.discipline;  // 搜刮可把某員紀律提升為 TAP（per-member 覆蓋）
  // 彈藥備量＝休息關分配的量（底線武器無限）
  const reserve = isInfiniteAmmo(cfg.weaponId) ? 9999 : (cfg.allocatedAmmo != null ? cfg.allocatedAmmo : CONFIG.ammo.defaultAlloc);

// 跨關陣容工具

// 開新的一輪 run（從基礎陣容起，先進路線圖）
function initRun() {

// 在路線圖選擇一個可前往的節點
function selectNode(id) {
  if (!roadAvailable.includes(id) || roadCompleted.has(id)) return;
  roadCurrent = id;
  const t = roadNode(id).type;
  if (t === 'COMBAT') startMission();
  else if (t === 'ARMORY') enterArmory();

}

// 完成目前節點 → 回路線圖開放後繼節點；無後繼＝走完路線
function advanceNode() {
  if (roadCurrent != null) roadCompleted.add(roadCurrent);
  const succ = roadCurrent != null ? roadAdj[roadCurrent] : [];
  if (!succ || succ.length === 0) scene = 'RUNWIN';
  else { roadAvailable = succ.slice(); scene = 'MAP'; }

}

// 開始一場戰鬥（用目前 roster 重建單位、重置敵人/計時）
function startMission() {
  const mapKey = forcedMap || (roadCurrent != null && roadNode(roadCurrent).map) || 'alpha';
  buildMapDerived(mapKey);                       // 切換到此節點指定的戰鬥地圖（重建衍生表）
  const nodeTB = (roadCurrent != null && roadNode(roadCurrent).timeBudget);
  curTimeBudget = nodeTB || MAP.timeBudget || CONFIG.timeBudget;   // 各關時間：節點 > 地圖 > 全域
  for (const d of MAP.doors) d.open = false;     // 每場戰鬥門重置為關閉
  players = roster.map((r, i) => makePlayer(i, r, spawnPos(i, roster.length)));
  controlledId = 0;
  enemies = []; bullets = []; particles = [];
  reservations = new Map(); enemyIdSeq = 1; drops = [];
  prisoners = (MAP.prisoners || []).map(o => ({ pos: { x: o.x, y: o.y }, freed: false }));   // 俘虜（每場重置）
  for (const s of MAP.enemySpawns) { const e = makeEnemy(s.nodeId, s.personality, false, s.facing, s.type); enemies.push(e); commitReservation(e, e.currentNode); }
  // 每清一關多放幾名 rusher（暫定的上升張力，待路徑圖時再正式設計難度）
  for (let k = 0; k < missionIndex; k++) { const sp = MAP.enemySpawns[k % MAP.enemySpawns.length]; enemies.push(makeEnemy(sp.nodeId, 'rusher')); }
  simTime = 0; reinforceTimer = 0; lastSwitchT = -Infinity;
  extractedCount = 0; deadCount = 0; result = null;
  scene = 'COMBAT';
  aimDir = players[controlledId].facing;
  initCamera(players[controlledId]);
}

// 戰鬥結算：撤出者帶入後續（→回路線圖）；0 撤出則 run 結束
function endMission() {
  if (fromEditor) { fromEditor = false; forcedMap = null; scene = 'EDITOR'; editMsg = '試玩結束 — 回到編輯器'; releasePointer(); return; }
  if (introActive) { finishIntro(); return; }   // 第0關：撤離 → 序章休息（含教學），不走一般結算
  const survivors = players.filter(p => p.state === 'EXTRACTED');
  lastSummary = { mission: missionIndex + 1, extracted: survivors.map(p => p.name), dead: players.filter(p => p.state === 'DEAD').map(p => p.name) };
  if (survivors.length >= 1) { roster = survivors.map(rosterFromPlayer); missionIndex++; advanceNode(); }

/* =====================================================================
   第0關（序章 / 教學）：cutscene 導演 + 演出 actor。流程見對話腳本 introBeats。

function startIntro() {

  extractedCount = 0; deadCount = 0; result = null;
  scene = 'COMBAT'; aimDir = players[0].facing;
  initCamera(players[0]);
  cutscene = { beats: introBeats(victim), i: 0, line: null, subtitle: '', lock: true, gate: null,

// 序章對白/演出腳本（節拍序列）。對白以「對話泡」呈現於說話者頭頂（pos 給世界座標、不顯姓名）。
function introBeats(victim) {

    { kind: 'wait', dur: 0.8 },
    { kind: 'move', actor: () => players[0], to: { x: 320, y: 170 }, speed: 120 },  // 自迷霧走回、停在同僚正後方
    { kind: 'face', actor: () => players[0], to: { x: 320, y: 240 } },
    { kind: 'wait', dur: 0.4 },

    { kind: 'wait', dur: 0.5 },

    { kind: 'sub', text: '取得發射密碼（走到控制台按 E）' },

    { kind: 'say', pos: guard0, text: 'For our Father.' },              // 兩名守衛依序回應

}
// 守衛入隊：比照解放俘虜，但帶 RECRUIT 初始武器（用 introCast[1]/[2] 以對齊最終 roster）
function guardsJoin() {

    if (!b._entered) { b._entered = true; b._t = 0; beatEnter(cs, b); }
    const instant = (b.kind === 'sub' || b.kind === 'cam' || b.kind === 'do' || b.kind === 'face' || b.kind === 'reveal');
    if (!instant) b._t += dt;

  else if (b.kind === 'sub') cs.subtitle = b.text;
  else if (b.kind === 'reveal') cs.reveal = b.to;   // 聚光區（null＝回一般迷霧）
  else if (b.kind === 'cam') cs.cam = (b.to === 'follow') ? null : b.to;

    case 'move': {

function spawnMuzzleBullet(p, v) { spawnHit(v.pos); for (let i = 0; i < 3; i++) particles.push(mkPart(p.pos, 60, 0.15, '#ffe08a')); }
// 結束序章 → 序章休息（含教學）。陣容＝撤出者（與 introCast 一致），失敗保底用 introCast。
function finishIntro() {
  const survivors = players.filter(p => p.state === 'EXTRACTED');
  roster = survivors.length ? survivors.map(rosterFromPlayer) : introCast.slice();
  introActive = false; cutscene = null; introGuards = []; introConsole = null;
  missionIndex = 0;
  enterRest(true);   // 序章休息：顯示教學面板
}
// Esc：只跳過演出。陣容直接用 introCast，照樣進序章休息（不顯示教學面板）。

  roster = introCast.slice(); missionIndex = 0;

/* =====================================================================
   休息關 meta 流程：共用倉庫(有上限) + 臨時背包整理 + 二選一(搜刮/喚醒) + 配裝/彈藥分配
   restPhase: CHOICE(可整理) → OFFERS(搜刮三選一) / TARGET(指定升級對象) → DONE(可整理→繼續)
   ===================================================================== */
const RARITY_WEIGHT = { common: 60, uncommon: 25, rare: 12, epic: 4, legendary: 1 };
const weaponValue = (W) => W.damage * W.fireRate * (W.range / 400);   // 粗略估值（自動配裝用）
function weightedPick(ids, weightOf) { const w = ids.map(weightOf); const tot = w.reduce((a, b) => a + b, 0); let r = Math.random() * tot; for (let i = 0; i < ids.length; i++) { r -= w[i]; if (r <= 0) return ids[i]; } return ids[ids.length - 1]; }
const rollLootWeapon = () => weightedPick(LOOT_WEAPON_IDS, id => RARITY_WEIGHT[WEAPONS[id].rarity] || 10);

// --- 倉庫容量 ---
const warehouseCap = () => roster.length * CONFIG.loadout.slotsPerMember;
const warehouseUsed = () => CONFIG.loadout.abilitiesCountTowardCap ? warehouse.length : warehouse.filter(it => it.kind === 'weapon').length;
const overCap = () => warehouseUsed() > warehouseCap();

// --- 軍械庫節點：三選一拿 武器/裝備/技能/道具 → 倉庫 → 回路線圖（不進戰鬥、不耗時）---
function enterArmory() { scene = 'ARMORY'; releasePointer(); armoryOffers = rollArmory(CONFIG.loadout.scavengeChoices); }
function rollArmory(n) {
  const weapon = () => { const id = rollLootWeapon(), W = WEAPONS[id]; return { type: 'weapon', id, label: `武器 · ${W.name}（${W.rarity}）`, color: rarityColor(W.rarity) }; };
  const equipO = () => { const id = rngPick(LOOT_EQUIP_IDS), E = EQUIPMENT[id]; return { type: 'equip', id, label: `裝備 · ${E.name}（${E.rarity}）`, color: '#9fd0e0' }; };
  const ability = () => { const id = rngPick(LOOT_ABILITY_IDS), A = ABILITIES[id]; return { type: 'ability', id, label: `技能 · ${A.name}`, color: '#c0a0ff' }; };
  const itemO = () => { const id = rngPick(LOOT_ITEM_IDS), I = ITEMS[id]; return { type: 'item', id, label: `道具 · ${I.name}`, color: '#ffd27d' }; };
  const gens = [weapon, equipO, ability, itemO];
  const offers = []; while (offers.length < n) offers.push(rngPick(gens)());
  return offers;
}
function armoryPick(i) {
  if (scene !== 'ARMORY' || !armoryOffers || i < 0 || i >= armoryOffers.length) return;
  const o = armoryOffers[i]; warehouse.push({ kind: o.type, id: o.id }); armoryOffers = null; advanceNode();
}

// --- 進入休息關：整理臨時背包（彈藥折算進儲備、item 進倉庫 haul）---
function enterRest(tutorial = false) {
  scene = 'REST'; releasePointer();
  restTutorial = tutorial;   // 序章休息＝顯示教學說明面板
  restPhase = 'CHOICE'; restOffers = null; restPick = null; restPendingUpgrade = null; restSel = null; restMsg = '';
  for (const it of backpack) {
    if (it.kind === 'weapon') { if (!isInfiniteAmmo(it.id)) ammoStock[it.id] = (ammoStock[it.id] || 0) + (it.ammo || 0); warehouse.push({ kind: 'weapon', id: it.id }); }
    else if (it.kind === 'ability') warehouse.push({ kind: 'ability', id: it.id });
  }
  backpack = [];
}

// --- 搜刮：隨機三選一（地板保證至少一個基本補給；天花板可出稀有武器/技能/質升級）---
function rollScavenge(n) {
  const supply = () => { const amt = 200; return { type: 'supply', amt, label: `補給 · 全武器類彈藥 +${amt}`, color: '#8fd0ff' }; };
  const maxhp = () => { const amt = 20; return { type: 'maxhp', amt, label: `療養 · 全隊 +${amt} maxHP`, color: '#7fffa8' }; };

function restDoScavenge() { if (restPhase !== 'CHOICE') return; restOffers = rollScavenge(CONFIG.loadout.scavengeChoices); restPhase = 'OFFERS'; }

  else if (o.type === 'weapon') { warehouse.push({ kind: 'weapon', id: o.id }); restMsg = `搜刮：${WEAPONS[o.id].name} 入倉庫`; }
  else if (o.type === 'ability') { warehouse.push({ kind: 'ability', id: o.id }); restMsg = `搜刮：${ABILITIES[o.id].name} 入倉庫`; }

  else if (o.type === 'item') { warehouse.push({ kind: 'item', id: o.id }); restMsg = `搜刮：${ITEMS[o.id].name} 入倉庫`; }

// --- 喚醒：必須先把倉庫整理到 ≤ 當前上限（§5），再 +1 隊員（容量 +slotsPerMember）---

function autoEquipFromWarehouse(rec) {

  else advanceNode();                                             // 正式 REST 節點 → 開放後繼

// --- 配裝/彈藥管理（CHOICE 與 DONE 階段皆可操作）---
function setMemberWeapon(mi, newId) {
  const r = roster[mi], oldId = r.weaponId;
  if (oldId !== newId) { if (!isInfiniteAmmo(oldId)) ammoStock[oldId] = (ammoStock[oldId] || 0) + (r.allocatedAmmo || 0); r.allocatedAmmo = 0; }
  r.weaponId = newId;
}
function equipWeaponFromWarehouse(whIdx, mi) {

  const oldId = roster[mi].weaponId; warehouse.splice(whIdx, 1); setMemberWeapon(mi, it.id);
  if (!isInfiniteAmmo(oldId)) warehouse.push({ kind: 'weapon', id: oldId });   // 底線武器換下即消失
  restSel = null;
}
function unequipWeapon(mi) { const oldId = roster[mi].weaponId; if (isInfiniteAmmo(oldId)) return; setMemberWeapon(mi, FLOOR_WEAPON); warehouse.push({ kind: 'weapon', id: oldId }); }
function equipAbilityFromWarehouse(whIdx, mi) {
  const it = warehouse[whIdx]; if (!it || it.kind !== 'ability') return;
  const oldId = roster[mi].abilityId; warehouse.splice(whIdx, 1); roster[mi].abilityId = it.id;
  if (oldId) warehouse.push({ kind: 'ability', id: oldId }); restSel = null;
}
function unequipAbility(mi) { const oldId = roster[mi].abilityId; if (!oldId) return; roster[mi].abilityId = null; warehouse.push({ kind: 'ability', id: oldId }); }
// 通用裝備/道具槽（kind 'equip'→field 'equipId'；kind 'item'→field 'itemId'）
function equipGearFromWarehouse(whIdx, mi, kind, field) {
  const it = warehouse[whIdx]; if (!it || it.kind !== kind) return;
  const oldId = roster[mi][field]; warehouse.splice(whIdx, 1); roster[mi][field] = it.id;
  if (oldId) warehouse.push({ kind, id: oldId }); restSel = null;
}
function unequipGear(mi, kind, field) { const oldId = roster[mi][field]; if (!oldId) return; roster[mi][field] = null; warehouse.push({ kind, id: oldId }); }
function discardWarehouse(whIdx) { if (whIdx >= 0 && whIdx < warehouse.length) warehouse.splice(whIdx, 1); restSel = null; }
function allocAmmo(mi, dir) {
  const r = roster[mi]; if (isInfiniteAmmo(r.weaponId)) return;
  const type = r.weaponId, step = WEAPONS[type].magazine;
  if (dir > 0) { const take = Math.min(step, ammoStock[type] || 0); r.allocatedAmmo = (r.allocatedAmmo || 0) + take; ammoStock[type] -= take; }
  else { const give = Math.min(step, r.allocatedAmmo || 0); r.allocatedAmmo -= give; ammoStock[type] = (ammoStock[type] || 0) + give; }
}

/* =====================================================================
   Possession
   ===================================================================== */
const activePlayers = () => players.filter(p => p.state === 'CONTROLLED' || p.state === 'IDLE' || p.state === 'EXTRACTING');

function possess(i) {
  const u = players[i];
  if (!u || u.state === 'DEAD' || u.state === 'EXTRACTED') return;
  if (controlledId != null && controlledId !== i) {
    const c = players[controlledId];
    if (c.state === 'CONTROLLED') { c.idleAnchor = c.facing; c.state = 'IDLE'; }  // 記住交回待機時的正前方
  }
  controlledId = i;
  if (u.state === 'EXTRACTING') {
    aimDir = u.facing;        // 護送：保持撤離自走、滑鼠可轉視野，任一指令才奪回（不中斷撤離）
  } else {
    u.state = 'CONTROLLED'; u.extractNode = null;
    u.facing = u.idleAnchor;  // 接手時正面恢復到該單位「進入閒置時的正前方」
    aimDir = u.idleAnchor;
  }
}
// 護送中（controlledId 指向 EXTRACTING 單位）收到任一指令 → 奪回手動、撤離中斷
function seizeIfEscorting() {
  if (controlledId == null) return false;
  const u = players[controlledId];
  if (!u || u.state !== 'EXTRACTING') return false;
  u.state = 'CONTROLLED'; u.extractNode = null;
  return true;
}
function toggleExtract() {   // H：當前單位撤離↔取消（撤離後留在 controlledId＝進入護送）
  if (controlledId == null) return;
  const u = players[controlledId];
  if (u.state === 'CONTROLLED') {
    u.idleAnchor = u.facing;  // 撤離途中的 overwatch 也以當前正前方為錨
    u.state = 'EXTRACTING'; u.extractNode = null;
    aimDir = u.facing;
  } else if (u.state === 'EXTRACTING') {
    u.state = 'CONTROLLED'; u.extractNode = null;   // 護送中再按 H → 取消撤離回手動
  }
}
function extractAll() {   // Shift+H：全體撤離（CONTROLLED/IDLE 全轉 EXTRACTING），挑一名護送
  let escortId = controlledId;
  for (const p of players) {
    if (p.state === 'CONTROLLED' || p.state === 'IDLE') { p.idleAnchor = p.facing; p.state = 'EXTRACTING'; p.extractNode = null; }
  }
  if (escortId == null || !players[escortId] || players[escortId].state !== 'EXTRACTING') {
    let best = -1, bd = Infinity;   // 沒有現成控制對象 → 護送最靠近撤離點者
    for (const p of players) { if (p.state !== 'EXTRACTING') continue; const d = dist(p.pos, EXTRACT); if (d < bd) { bd = d; best = p.id; } }
    escortId = best;
  }
  controlledId = (escortId >= 0) ? escortId : null;
  if (controlledId != null) aimDir = players[controlledId].facing;
}
function autoPossess(fromPos) {
  // 非撤離(IDLE)單位優先，沒有才退而附身撤離中(EXTRACTING)單位（possess 會自動進入護送、不中斷撤離）
  const pick = (state) => {
    let best = -1, bd = Infinity;
    for (const p of players) { if (p.state !== state) continue; const d = fromPos ? dist(p.pos, fromPos) : p.id; if (d < bd) { bd = d; best = p.id; } }
    return best;
  };
  let id = pick('IDLE'); if (id < 0) id = pick('EXTRACTING');
  if (id >= 0) possess(id); else controlledId = null;
}

/* =====================================================================
   Combat — 開火(發散) / 換彈 / 彈藥 / 子彈 / 傷害 / 死亡
   ===================================================================== */
// spreadDeg：本發實際發散；bloomAdd>0 才累積連射發散。回傳是否真的開了一槍。
function fireUnit(u, angle, spreadDeg, fireRateMult, bloomAdd) {
  const W = u.weapon;
  if (u.reloadT > 0 || u.fireCooldown > 0) return false;
  if (u.ammoInMag <= 0) { startReload(u); return false; }
  const pellets = W.pellets || 1;   // 霰彈：單次擊發多顆彈丸，各自抽散布
  for (let p = 0; p < pellets; p++) {
    const a = angle + (Math.random() * 2 - 1) * spreadDeg * (u.spreadMul || 1) * Math.PI / 180;   // 裝備(穩定器)可降發散
    bullets.push({
      x: u.pos.x + Math.cos(angle) * (u.radius + 2), y: u.pos.y + Math.sin(angle) * (u.radius + 2),
      vx: Math.cos(a) * W.projSpeed, vy: Math.sin(a) * W.projSpeed,
      dmg: W.damage, faction: u.faction, range: W.range, traveled: 0,
      ox: u.pos.x, oy: u.pos.y,   // 發射原點（低矮牆「貼牆可越射」判定用）
      pierce: W.pierce || 0,      // 穿甲：對裝甲敵人的擋格率衰減
    });
  }
  u.ammoInMag--;
  u.fireCooldown = (1 / W.fireRate) / (fireRateMult * (u.buffFire || 1));   // 道具(腎上腺素)可加射速
  if (bloomAdd) u.bloom = Math.min(W.spreadMax, u.bloom + bloomAdd);
  u.muzzle = 0.05;
  if (u.ammoInMag <= 0) startReload(u);
  if (u.faction === 'player') alertEnemiesNear(u.pos);   // 槍聲：驚動聽覺半徑內的閒置敵人（不論命中）
  return true;
}
// 玩家開火的「槍聲」：半徑內 IDLE 敵人轉入 ENGAGED（latch）
function alertEnemiesNear(pos) {
  for (const e of enemies) if (!e.dead && e.state === 'IDLE' && dist(e.pos, pos) <= CONFIG.enemyHearRadius) e.state = 'ENGAGED';
}
const unitMag = (u) => u.magazine || u.weapon.magazine;   // 有效彈夾（裝備可改）
function startReload(u) {
  if (u.reloadT > 0 || u.ammoReserve <= 0 || u.ammoInMag >= unitMag(u)) return;
  u.reloadDur = u.weapon.reloadTime * (u.reloadMul || 1);   // 裝備(快卸彈匣)可加速
  u.reloadT = u.reloadDur;
}
function tickAmmo(u, dt) {
  if (u.reloadT > 0) {
    u.reloadT -= dt;
    if (u.reloadT <= 0) {
      u.reloadT = 0;
      const take = Math.min(unitMag(u) - u.ammoInMag, u.ammoReserve);
      u.ammoInMag += take; u.ammoReserve -= take;
    }
  }
  if (u.bloom > 0) u.bloom = Math.max(0, u.bloom - u.weapon.spreadRecover * dt);
  if (u.buffT > 0) { u.buffT -= dt; if (u.buffT <= 0) { u.buffT = 0; u.buffMove = 1; u.buffFire = 1; } }  // 道具短時 buff 倒數
}
// 手動：基礎+連射 bloom（玩家的扳機紀律＝技巧）。待機：固定平庸發散、不累積 bloom、射速慢。敵人：同手動會 bloom。
// 技能（僅手動可用，待機不放）：目前佔位＝恢復少量生命，有 CD
function useAbility(u) {
  if (!u || u.state !== 'CONTROLLED' || !u.ability || u.abilityCd > 0) return;
  const a = u.ability;
  if (a.heal) { u.hp = Math.min(u.maxHp, u.hp + a.heal); spawnHeal(u.pos); }
  u.abilityCd = a.cooldown;
}
// 道具（一次性，Q 鍵；用完消失）：瞬補 / 補彈 / 短時 buff
function useItem(u) {
  if (!u || u.state !== 'CONTROLLED' || !u.itemId || u.itemUsed) return;
  const it = ITEMS[u.itemId];
  if (it.heal) { u.hp = Math.min(u.maxHp, u.hp + it.heal); spawnHeal(u.pos); }
  if (it.refill) { u.ammoInMag = unitMag(u); if (!isInfiniteAmmo(u.weaponId)) u.ammoReserve += unitMag(u) * 2; spawnPickup(u.pos); }
  if (it.buff) { u.buffT = it.buff.dur; u.buffMove = it.buff.moveMul || 1; u.buffFire = it.buff.fireRateMul || 1; spawnHeal(u.pos); }
  u.itemUsed = true;   // 用完即消（rosterFromPlayer 不再帶回）
}

// 手動：基礎+連射 bloom（玩家扳機紀律＝技巧）。敵人：同手動會 bloom。
const manualFire = (u, ang) => fireUnit(u, ang, u.weapon.spreadBase + u.bloom, 1, u.weapon.spreadPerShot);
const enemyFire  = (u, ang) => fireUnit(u, ang, u.weapon.spreadBase + u.bloom, 1, u.weapon.spreadPerShot);
// 敵人攻擊分派：ranged＝持續射擊（霰彈靠武器 pellets 自動多發）；burst＝點放掃射（打 size 發→停 gap 秒）
function enemyAttack(e, ang, dt) {
  if (e.attack !== 'burst') { enemyFire(e, ang); return; }
  if (e.burstCd > 0) { e.burstCd -= dt; return; }   // 連發後停頓（讓 bloom 回復＝掃射節奏）
  if (enemyFire(e, ang)) { e.burstLeft--; if (e.burstLeft <= 0) { e.burstLeft = e.weapon.burst.size; e.burstCd = e.weapon.burst.gap; } }
}
// 待機開火：基礎較差(spreadBase/精度倍率)＋連射 bloom；射速 ×idleFireRateMult。TAP 靠停頓讓 bloom 回復、AUTO 把 bloom 拉滿。
const idleEngageFire = (u, ang) => fireUnit(u, ang, u.weapon.spreadBase / CONFIG.idleAccuracyMult + u.bloom, CONFIG.idleFireRateMult, u.weapon.spreadPerShot);

// fromAng＝攻擊來向（目標→發射原點的角度）。落在目標視野錐外＝flank（側後）。
function damageUnit(u, dmg, pierce = 0, fromAng = null) {
  const coneHalf = (u.coneHalfDeg || CONFIG.vision.coneHalfDeg) * Math.PI / 180;
  const flanked = (fromAng != null) && Math.abs(angDiff(fromAng, u.facing)) > coneHalf;   // 錐外＝繞背
  const surprise = (u.faction === 'enemy' && u.state === 'IDLE');                          // 閒置敵人被突襲（僅對敵）
  const mult = flanked ? CONFIG.flank.flankMult : (surprise ? CONFIG.flank.surpriseMult : 1);  // 取較高、不相乘
  if (u.faction === 'enemy') {
    u.state = 'ENGAGED';   // 被攻擊（即使被甲擋下）也進入交戰（latch）
    if (!flanked && u.armor > 0 && Math.random() < u.armor * (1 - pierce)) { spawnBlock(u.pos); return; }   // 裝甲：整發擋下非穿甲（繞背無視）
  }
  const resist = flanked ? 0 : (u.dmgResist || 0);   // 繞背無視所有裝甲（含玩家固定減傷＝甲只罩正面）
  u.hp -= dmg * mult * (1 - resist);
  if (u.faction === 'player') u.alertTimer = CONFIG.ghostAlertTime;
  if (flanked || surprise) spawnCrit(u.pos); else spawnHit(u.pos);   // 繞背/突襲命中＝不同火花
  if (u.hp <= 0) killUnit(u);
}
function killUnit(u) {
  spawnDeath(u.pos);
  if (u.faction === 'enemy') { spawnDrop(u, CONFIG.ammo.salvageEnemy); u.dead = true; releaseReservation(u); }
  else {
    spawnDrop(u, CONFIG.ammo.salvageAlly);
    const wasControlled = (u.state === 'CONTROLLED') || controlledId === u.id;
    u.state = 'DEAD'; deadCount++;
    if (wasControlled) { controlledId = null; autoPossess(u.pos); }
  }
}
// 掉落：陣亡單位的武器落在原地（底線武器不掉、無回收價值）。彈藥折算量於休息關進儲備。
function spawnDrop(u, ammo) {
  if (isInfiniteAmmo(u.weaponId)) return;
  if (!LOOT_WEAPON_IDS.includes(u.weaponId)) return;   // 敵人專屬武器(fangs/lmg/shotgun)不掉落
  drops.push({ pos: { x: u.pos.x, y: u.pos.y }, kind: 'weapon', id: u.weaponId, ammo });
}
// 拾取：僅被附身單位走到掉落物上即撿入臨時背包（任務中不可動用＝撿/不撿的時間/暴露取捨）
function updateDrops() {
  if (controlledId == null) return;
  const u = players[controlledId]; if (!u || u.state !== 'CONTROLLED') return;
  for (let i = drops.length - 1; i >= 0; i--) {
    if (dist(u.pos, drops[i].pos) <= CONFIG.pickupRadius) {
      const d = drops[i]; backpack.push({ kind: d.kind, id: d.id, ammo: d.ammo });
      spawnPickup(d.pos); drops.splice(i, 1);
    }
  }
}

/* =====================================================================
   互動 — 開關門 / 按鈕（僅被附身單位；自走單位不會開門，§Q4）
   ===================================================================== */
const doorMid = (d) => ({ x: (d.x1 + d.x2) / 2, y: (d.y1 + d.y2) / 2 });
// 到門「線段最近點」的距離（門很寬，量到中點會在門邊按不到）
const distToDoor = (pos, d) => dist(pos, closestOnSeg(pos, { x: d.x1, y: d.y1 }, { x: d.x2, y: d.y2 }));
// 回傳被附身單位 interactRadius 內最近的互動點（門/按鈕/俘虜），無則 null
function nearestInteractable(u) {
  if (!u) return null;
  let best = null, bd = CONFIG.interactRadius;
  for (const d of MAP.doors) { const dd = distToDoor(u.pos, d); if (dd < bd) { bd = dd; best = { type: 'door', door: d }; } }
  for (const b of MAP.buttons) { const dd = dist(u.pos, { x: b.x, y: b.y }); if (dd < bd) { bd = dd; best = { type: 'button', button: b }; } }
  for (const pr of (prisoners || [])) { if (pr.freed) continue; const dd = dist(u.pos, pr.pos); if (dd < bd) { bd = dd; best = { type: 'prisoner', prisoner: pr }; } }
  if (introConsole && !introConsole.used) { const dd = dist(u.pos, introConsole); if (dd < bd) { bd = dd; best = { type: 'console' }; } }   // 序章控制台
  return best;
}
function tryInteract() {
  if (controlledId == null) return;
  const u = players[controlledId]; if (!u || u.state !== 'CONTROLLED') return;
  const it = nearestInteractable(u); if (!it) return;
  if (it.type === 'door') it.door.open = !it.door.open;
  else if (it.type === 'button') { const d = MAP.doors.find(x => x.id === it.button.doorId); if (d) d.open = !d.open; }
  else if (it.type === 'prisoner') freePrisoner(it.prisoner);
  else if (it.type === 'console') { introConsole.used = true; spawnPickup(introConsole); }   // 取得發射密碼
}
// 釋放俘虜 → 變成一名我方單位（隨機個性 + 底線 pistol；需自行撤離才永久入隊）
function freePrisoner(pr) {
  pr.freed = true;
  const cfg = makeRecruit(new Set(players.map(p => p.name)));
  cfg.weaponId = FLOOR_WEAPON;   // 底線武器（跟喚醒 sleeper 同規則）
  const u = makePlayer(players.length, cfg, { x: pr.pos.x, y: pr.pos.y });
  u.state = 'IDLE'; u.idleAnchor = u.facing;
  players.push(u); spawnHeal(pr.pos);
}
function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    const old = { x: b.x, y: b.y };
    b.x += b.vx * dt; b.y += b.vy * dt;
    b.traveled += Math.hypot(b.vx, b.vy) * dt;
    let gone = b.traveled > b.range;
    if (!gone) for (const w of MAP.walls) if (segIntersect(old, b, { x: w.x1, y: w.y1 }, { x: w.x2, y: w.y2 })) { gone = true; break; }           // 永久牆全擋
    if (!gone) for (const dr of MAP.doors) if (!dr.open && segIntersect(old, b, { x: dr.x1, y: dr.y1 }, { x: dr.x2, y: dr.y2 })) { gone = true; break; } // 關門全擋
    // 低矮牆＝掩體：射手貼近(<closeRange)可越射；否則 blockChance 機率擋下
    if (!gone) for (const lw of MAP.lowWalls) {
      if (!segIntersect(old, b, { x: lw.x1, y: lw.y1 }, { x: lw.x2, y: lw.y2 })) continue;
      const cp = closestOnSeg({ x: b.ox, y: b.oy }, { x: lw.x1, y: lw.y1 }, { x: lw.x2, y: lw.y2 });
      if (dist({ x: b.ox, y: b.oy }, cp) >= CONFIG.lowWall.closeRange && Math.random() < CONFIG.lowWall.blockChance) { gone = true; break; }
    }
    if (!gone) {
      const targets = b.faction === 'player' ? enemies.filter(e => !e.dead) : activePlayers();
      for (const t of targets) if (segCircle(old, b, t.pos, t.radius)) { damageUnit(t, b.dmg, b.pierce || 0, angTo(t.pos, { x: b.ox, y: b.oy })); gone = true; break; }
    }
    if (gone) bullets.splice(i, 1);
  }
}

/* =====================================================================
   IdleAI — 待機策略（套懲罰、僅對「感知到」的敵人反應）
   ===================================================================== */
function idleTick(u, dt, lockFacing) {
  const W = u.weapon, st = u.idleStrategy;
  const turn = (u.turnSpeed || W.turnSpeed) * Math.PI / 180 * dt;

  // 感知到的最近威脅（近身或視錐內）
  let nearest = null, nd = Infinity;
  for (const e of enemies) { if (e.dead) continue; if (!canSee(u, e.pos)) continue; const d = dist(u.pos, e.pos); if (d < nd) { nd = d; nearest = e; } }

  // 視線（個性軸）。lockFacing＝true 時沿用外部設定的朝向（撤離：面向移動方向）
  if (lockFacing) {
    // 不改朝向
  } else if (st.facing === 'SWEEP') {
    u.sweepPhase += CONFIG.sweepSpeed * Math.PI / 180 * dt * u.sweepDir;
    const amp = CONFIG.sweepAmpDeg * Math.PI / 180;
    if (u.sweepPhase > amp) { u.sweepPhase = amp; u.sweepDir = -1; }
    if (u.sweepPhase < -amp) { u.sweepPhase = -amp; u.sweepDir = 1; }
    u.facing = u.idleAnchor + u.sweepPhase;                 // 以閒置正前方為中心掃視
  } else if (st.facing === 'TRACK') {
    if (nearest) u.facing = rotToward(u.facing, angTo(u.pos, nearest.pos), turn);
  } else if (st.facing === 'WANDER') {
    // 只在閒置正前方附近小幅擺動（視野不離正前方）、緩慢轉動
    u.wanderTimer -= dt;
    if (u.wanderTimer <= 0) { u.wanderTarget = u.idleAnchor + (Math.random() * 2 - 1) * CONFIG.wanderAmpDeg * Math.PI / 180; u.wanderTimer = 1.2 + Math.random() * 1.8; }
    u.facing = rotToward(u.facing, u.wanderTarget, CONFIG.wanderSpeed * Math.PI / 180 * dt);
  } // HOLD：維持閒置正前方
  if (u.alertTimer > 0) u.alertTimer -= dt;

  // 交戰目標：感知到 + 在射程內
  let target = null, td = Infinity;
  for (const e of enemies) {
    if (e.dead || st.targeting === 'NONE') continue;
    if (!canSee(u, e.pos)) continue;
    const d = dist(u.pos, e.pos);
    if (d <= W.range && d < td) { td = d; target = e; }
  }
  let mayFire = false;
  if (st.fireMode === 'AGGRESSIVE' || st.fireMode === 'SUPPRESSIVE') mayFire = !!target;
  else if (st.fireMode === 'DEFENSIVE') mayFire = !!target && (u.alertTimer > 0 || (nearest && nd < CONFIG.ghostCloseRange));

  u.engageTimer = mayFire ? u.engageTimer + dt : 0;
  if (mayFire && u.engageTimer >= CONFIG.idleReactionDelay) {
    const ang = angTo(u.pos, target.pos);
    if (st.discipline === 'AUTO') {
      idleEngageFire(u, ang);                              // 扣到底：持續噴、bloom 拉滿、耗彈快
    } else {                                               // TAP 點放：短 burst + 停頓讓 bloom 回復
      if (u.burstCd > 0) u.burstCd -= dt;
      else {
        if (u.burstLeft <= 0) u.burstLeft = CONFIG.idleTap.size;
        if (idleEngageFire(u, ang)) { u.burstLeft--; if (u.burstLeft <= 0) u.burstCd = CONFIG.idleTap.gap; }
      }
    }
  } else { u.burstCd = 0; u.burstLeft = CONFIG.idleTap.size; }
}

/* =====================================================================
   EnemyAI — waypoint 選點(tag+位置+暴露+hysteresis+reservation)
             開火/朝向受感知限制；堅守時視錐朝「最近、朝我方那側的 waypoint」
   ===================================================================== */
const isSpecial = (n) => wp(n).tags.some(t => SPECIAL_TAGS.includes(t));
function releaseReservation(e) { if (e.reservedNode != null && reservations.get(e.reservedNode) === e.id) reservations.delete(e.reservedNode); e.reservedNode = null; }
function commitReservation(e, node) { if (isSpecial(node)) { reservations.set(node, e.id); e.reservedNode = node; } }
function nearestFriendly(pos) { let best = null, bd = Infinity; for (const p of activePlayers()) { const d = dist(pos, p.pos); if (d < bd) { bd = d; best = p; } } return best; }

function scoreNode(e, n, f, engaging) {
  const node = wp(n), P = e.personality;
  let s = 0;
  for (const t of node.tags) s += (P.tags[t] || 0);
  if (!f) return s;
  const dn = dist(node.pos, f.pos);
  s += (1 - Math.min(1, dn / MAXD)) * P.wRush * (engaging ? CONFIG.holdProxMul : CONFIG.chargeMul);
  if (P.wFlank) { const a = Math.abs(angDiff(angTo(f.pos, node.pos), f.facing)); s += (a / Math.PI) * P.wFlank; }
  // 暴露：被我方「視野」覆蓋的節點扣分（用感知模型）
  let exposed = 0;
  for (const p of activePlayers()) if (canSee(p, node.pos)) exposed++;
  s -= exposed * P.wExpose * (engaging ? 1 : 0.25);
  const fn = nearestNode(f.pos, false);
  if (nodeVis[n][fn]) s += P.wSight;
  return s;
}

// 堅守/推進時的視錐朝向目標：最近、且位於朝我方那側的 waypoint
function watchPoint(e, f) {
  if (!f) return wp(e.targetNode).pos;
  const tox = f.pos.x - e.pos.x, toy = f.pos.y - e.pos.y;
  let best = null, bd = Infinity;
  for (const n of MAP.waypoints) {
    if (n.id === e.currentNode) continue;
    const dx = n.pos.x - e.pos.x, dy = n.pos.y - e.pos.y;
    if (dx * tox + dy * toy <= 0) continue;          // 只取朝我方那一側
    const d = dx * dx + dy * dy;
    if (d < bd) { bd = d; best = n; }
  }
  return best ? best.pos : f.pos;
}

// 交戰中敵人會開擋路的門（IDLE 不會）——§ 規格：敵人原則上不主動開門，除非已開始交戰
function enemyTryOpenDoors(e) {
  for (const d of MAP.doors) { if (d.open) continue; if (distToDoor(e.pos, d) <= CONFIG.interactRadius) d.open = true; }
}

// IDLE：守在崗位、視錐維持固定 watchFacing、不推進、不開門、不開火（看到/聽到/被打才轉 ENGAGED）
function enemyIdleTick(e, dt) {
  const turn = e.weapon.turnSpeed * Math.PI / 180 * dt;
  e.facing = rotToward(e.facing, e.watchFacing, turn);   // 緩慢回正到守備朝向
  e.engageTimer = 0;
}

function enemyTick(e, dt) {
  const f = nearestFriendly(e.pos);
  // 偵測（任一狀態都檢查）：看到玩家 → 進入交戰（latch）
  if (f && canSee(e, f.pos)) e.state = 'ENGAGED';
  if (e.state !== 'ENGAGED') { enemyIdleTick(e, dt); return; }   // 守點被動

  // --- ENGAGED：選點推進 / charge-hold / 開火 / 開擋路的門 ---
  const seen = !!f && canSee(e, f.pos);
  const inRange = !!f && dist(e.pos, f.pos) <= e.weapon.range;
  const engaging = seen && inRange;

  let cands = [e.currentNode, ...adj[e.currentNode]];
  cands = [...new Set(cands)].filter(n => !(isSpecial(n) && reservations.has(n) && reservations.get(n) !== e.id));
  if (cands.length === 0) cands = [e.currentNode];

  let best = e.currentNode, bestScore = -Infinity;
  for (const n of cands) {
    let s = scoreNode(e, n, f, engaging);
    if (n === e.targetNode && hysteresisOn) s += CONFIG.hysteresisBonus;
    if (s > bestScore) { bestScore = s; best = n; }
  }
  if (best !== e.targetNode) { releaseReservation(e); e.targetNode = best; commitReservation(e, best); }

  const tn = wp(e.targetNode);
  moveToward(e, tn.pos, e.moveSpeed * dt);   // 逐類型移速（警犬快、重機槍慢）
  if (dist(e.pos, tn.pos) < CONFIG.nodeReach) e.currentNode = e.targetNode;

  const turn = e.weapon.turnSpeed * Math.PI / 180 * dt;
  if (seen) {
    const ang = angTo(e.pos, f.pos);
    e.facing = rotToward(e.facing, ang, turn * 2);
    if (inRange) { e.engageTimer += dt; if (e.engageTimer >= CONFIG.enemy.reactionDelay) enemyAttack(e, ang, dt); }
    else e.engageTimer = 0;
  } else {
    e.engageTimer = 0;
    e.facing = rotToward(e.facing, angTo(e.pos, watchPoint(e, f)), turn);  // 視錐朝可能的進攻路線
  }
  enemyTryOpenDoors(e);   // 交戰中可破門追擊
}

/* =====================================================================
   Extraction — EXTRACTING 自走（沿圖直線、保留 overwatch）
   ===================================================================== */
function extractTick(u, dt) {
  if (u.extractNode == null) u.extractNode = nearestNode(u.pos, true);
  if (u.extractNode !== extractNodeId && dist(u.pos, wp(u.extractNode).pos) < CONFIG.nodeReach) {
    const nx = nextHop[u.extractNode]; if (nx != null) u.extractNode = nx;
  }
  const goal = (u.extractNode === extractNodeId) ? EXTRACT : wp(u.extractNode).pos;
  const turn = (u.turnSpeed || u.weapon.turnSpeed) * Math.PI / 180 * dt;
  if (u.id === controlledId) u.facing = rotToward(u.facing, aimDir, turn);            // 護送：滑鼠自由轉視野（不中斷撤離）
  else u.facing = rotToward(u.facing, angTo(u.pos, goal), turn);                      // 自走：面向移動方向
  moveToward(u, goal, CONFIG.moveSpeed * lowWallSpeedMult(u.pos) * (u.moveMul || 1) * dt);   // 低矮牆減速 + 裝備
  idleTick(u, dt, true);   // 保留待機開火，但不改朝向（朝向已由上方決定）
}

/* =====================================================================
   Movement helpers
   ===================================================================== */
// Shift 奔跑倍率：隨武器重量遞減（夾在 minMult..base）
const sprintMult = (u) => clamp(CONFIG.sprint.base - (u.weapon.weight - 1) * CONFIG.sprint.weightPenalty, CONFIG.sprint.minMult, CONFIG.sprint.base);

function moveToward(u, goal, step) {
  const d = dist(u.pos, goal); if (d < 1e-3) return;
  const k = Math.min(step, d) / d;
  u.pos.x += (goal.x - u.pos.x) * k; u.pos.y += (goal.y - u.pos.y) * k;
}
function pushOutSeg(u, x1, y1, x2, y2) {
  const cp = closestOnSeg(u.pos, { x: x1, y: y1 }, { x: x2, y: y2 });
  const dx = u.pos.x - cp.x, dy = u.pos.y - cp.y, d = Math.hypot(dx, dy);
  if (d < u.radius) { const push = u.radius - d, nx = d > 1e-6 ? dx / d : 1, ny = d > 1e-6 ? dy / d : 0; u.pos.x += nx * push; u.pos.y += ny * push; }
}
function collideWalls(u) {
  for (const w of MAP.walls) pushOutSeg(u, w.x1, w.y1, w.x2, w.y2);
  for (const dr of MAP.doors) if (!dr.open) pushOutSeg(u, dr.x1, dr.y1, dr.x2, dr.y2);   // 關門擋全部單位
  if (u.faction === 'enemy') for (const lw of MAP.lowWalls) pushOutSeg(u, lw.x1, lw.y1, lw.x2, lw.y2); // 低矮牆＝對敵實體（繞行）
}
// 玩家是否貼著低矮牆（→ 移動減速）。低矮牆不擋玩家、只拖慢。
function onLowWall(pos, r) {
  for (const lw of MAP.lowWalls) { const cp = closestOnSeg(pos, { x: lw.x1, y: lw.y1 }, { x: lw.x2, y: lw.y2 }); if (dist(pos, cp) < r) return true; }
  return false;
}
const lowWallSpeedMult = (pos) => onLowWall(pos, CONFIG.unitRadius + CONFIG.lowWall.touchR) ? CONFIG.lowWall.slow : 1;
function separate(units) {
  for (let i = 0; i < units.length; i++) for (let j = i + 1; j < units.length; j++) {
    const a = units[i], b = units[j];
    const dx = b.pos.x - a.pos.x, dy = b.pos.y - a.pos.y, d = Math.hypot(dx, dy), min = a.radius + b.radius;
    if (d > 0 && d < min) { const push = (min - d) / 2, nx = dx / d, ny = dy / d; a.pos.x -= nx * push; a.pos.y -= ny * push; b.pos.x += nx * push; b.pos.y += ny * push; }
  }
}

/* =====================================================================
   Particles
   ===================================================================== */
function spawnHit(p) { for (let i = 0; i < 4; i++) particles.push(mkPart(p, 90, 0.25, '#ffd27d')); }
function spawnBlock(p) { for (let i = 0; i < 6; i++) particles.push(mkPart(p, 130, 0.28, '#bcd2ff')); }   // 裝甲彈開「鏘」的火花
function spawnCrit(p) { for (let i = 0; i < 9; i++) particles.push(mkPart(p, 170, 0.4, '#ff5a6e')); }     // 繞背/突襲＝紅色重擊火花
function spawnDeath(p) { for (let i = 0; i < 14; i++) particles.push(mkPart(p, 180, 0.5, '#ff6b6b')); }
function spawnHeal(p) { for (let i = 0; i < 12; i++) particles.push(mkPart(p, 70, 0.55, '#7fffa8')); }
function spawnPickup(p) { for (let i = 0; i < 10; i++) particles.push(mkPart(p, 90, 0.5, '#ffe08a')); }
function mkPart(p, spd, life, col) { const a = Math.random() * Math.PI * 2, s = spd * (0.4 + Math.random() * 0.6); return { x: p.x, y: p.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life, max: life, col }; }
function updateParticles(dt) { for (let i = particles.length - 1; i >= 0; i--) { const q = particles[i]; q.x += q.vx * dt; q.y += q.vy * dt; q.life -= dt; if (q.life <= 0) particles.splice(i, 1); } }

/* =====================================================================
   Input
   ===================================================================== */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const fogCanvas = document.createElement('canvas');   // 離屏迷霧遮罩（避免在主畫布上 destination-out 擦掉世界）
fogCanvas.width = cv.width; fogCanvas.height = cv.height;
const fctx = fogCanvas.getContext('2d');
const keys = new Set();
const mouse = { down: false, mx: cv.width / 2, my: cv.height / 2 };
function canvasPos(ev) { const r = cv.getBoundingClientRect(); return { x: (ev.clientX - r.left) * (cv.width / r.width), y: (ev.clientY - r.top) * (cv.height / r.height) }; }

// 點擊：戰鬥→鎖定滑鼠開始；路線圖→選節點；結算畫面→重開
cv.addEventListener('click', () => {
  if (scene === 'COMBAT') { if (!pointerLocked && cv.requestPointerLock) cv.requestPointerLock(); }
  else if (scene === 'MAP') {

  }

  else if (scene === 'RUNEND' || scene === 'RUNWIN') initRun();
  // EDITOR：互動在 mousedown/up 處理（支援拖拉），click 不處理
});
// 休息關：命中最後繪製（最上層）的可點區域
function restClick(x, y) {
  for (let i = restRects.length - 1; i >= 0; i--) {
    const r = restRects[i];
    if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) { r.fn(); return; }
  }
}
document.addEventListener('pointerlockchange', () => {
  pointerLocked = (document.pointerLockElement === cv);
  cv.style.cursor = pointerLocked ? 'none' : 'crosshair';
  if (!pointerLocked) mouse.down = false;
});
cv.addEventListener('mousemove', e => {
  if (pointerLocked) aimDir += (e.movementX || 0) * CONFIG.mouseSensitivity;  // 戰鬥：滑鼠位移轉向
  else { const p = canvasPos(e); mouse.mx = p.x; mouse.my = p.y; }            // 選單：追蹤游標位置
});
cv.addEventListener('mousedown', e => {
  if (scene === 'EDITOR') { if (e.button === 2) editorEraseAt(snapPt({ x: mouse.mx, y: mouse.my })); else editorMouseDown(); return; }
  if (scene !== 'COMBAT' || !pointerLocked) return;

    if (cutscene.line) { if (e.button === 0) cutscene.advance = true; return; }

  }
  if (e.button === 0) { seizeIfEscorting(); mouse.down = true; }          // 左鍵開火（護送中→立刻奪回、同幀開火）
  else if (e.button === 2) { seizeIfEscorting(); if (controlledId != null) useAbility(players[controlledId]); } // 右鍵放技能（護送中→奪回）
});
window.addEventListener('mouseup', e => { if (scene === 'EDITOR' && e.button === 0) { editorMouseUp(); return; } if (e.button === 0) mouse.down = false; });

// 編輯器滑鼠：UI 區優先(原始游標)，否則畫布放置(對齊游標)；拖拉工具於 mouseup 落筆
function editorMouseDown() {
  for (let i = editRects.length - 1; i >= 0; i--) { const r = editRects[i]; if (mouse.mx >= r.x && mouse.mx <= r.x + r.w && mouse.my >= r.y && mouse.my <= r.y + r.h) { r.fn(); return; } }
  const m = snapPt({ x: mouse.mx, y: mouse.my });
  if (isDragTool(editTool)) editDrag = m; else editorClickAt(m);
}
function editorMouseUp() {
  if (editDrag && isDragTool(editTool)) { const a = editDrag, b = snapPt({ x: mouse.mx, y: mouse.my }); if (dist(a, b) >= 8) editorCommitSeg(a, b); editDrag = null; }
}
cv.addEventListener('contextmenu', e => e.preventDefault());

// 路線圖：游標下的可選節點 id（無則 null）
function roadNodeAt(x, y) {
  for (const id of roadAvailable) {
    if (roadCompleted.has(id)) continue;
    const p = roadNodePos(roadNode(id));
    if (Math.hypot(x - p.x, y - p.y) <= 26) return id;
  }
  return null;
}

window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  keys.add(k);
  if (e.repeat) return;

  if (scene === 'MAP') {                         // 路線圖：數字鍵選可前往節點（亦可滑鼠點選）
    if (k >= '1' && k <= '9') { const i = parseInt(k, 10) - 1; const avail = roadAvailable.filter(id => !roadCompleted.has(id)); if (i < avail.length) selectNode(avail[i]); }
    return;
  }
  if (scene === 'REST') {                        // 休息關：依流程階段（鍵盤＝便捷，主要互動為滑鼠點選）
    if (restPhase === 'CHOICE') { if (k === '1') restDoScavenge(); else if (k === '2') restDoAwaken(); }
    else if (restPhase === 'OFFERS') { if (k >= '1' && k <= '9') pickOffer(parseInt(k, 10) - 1); }
    else if (restPhase === 'TARGET') { if (k >= '1' && k <= '9') applyTarget(parseInt(k, 10) - 1); }
    else if (restPhase === 'DONE') { if (k === ' ' || k === 'enter') restDoContinue(); }
    if ((k >= '1' && k <= '9') || k === ' ' || k === 'enter') e.preventDefault();
    return;
  }
  if (scene === 'EDITOR') {                       // 編輯器：數字鍵切工具、G 格線、Esc 離開
    const tools = ['wall', 'door', 'low', 'wp', 'edge', 'spawn', 'button', 'entry', 'extract', 'erase'];
    if (k >= '1' && k <= '9') { editTool = tools[parseInt(k, 10) - 1] || editTool; editSelWp = null; }
    else if (k === '0') editTool = 'erase';
    else if (k === 'p') { editTool = 'prisoner'; editSelWp = null; }
    else if (k === 'g') editSnap = editSnap ? 0 : 20;
    else if (k === 'escape') editorExit();
    return;
  }
  if (scene === 'ARMORY') { if (k >= '1' && k <= '9') armoryPick(parseInt(k, 10) - 1); return; }
  if (scene === 'RUNEND' || scene === 'RUNWIN') { if (k === 'r') initRun(); return; }

  // --- COMBAT ---
  if (introActive && k === 'escape') { skipIntro(); e.preventDefault(); return; }   // 第0關：Esc 跳過演出（休息關仍進）
  if (cutscene && cutscene.lock) {   // 演出鎖控制：只接受對白續播，其餘戰鬥鍵封鎖
    if ((k === ' ' || k === 'enter') && cutscene.line) { cutscene.advance = true; e.preventDefault(); }
    return;
  }
  if (fromEditor && k === 'backspace') { fromEditor = false; forcedMap = null; scene = 'EDITOR'; releasePointer(); editMsg = '已中止試玩，回到編輯器'; e.preventDefault(); return; }
  if (k >= '1' && k <= '9') {
    const i = parseInt(k, 10) - 1;
    const handover = CONFIG.switchHandoverMs / 1000;
    if (i < players.length && i !== controlledId && (simTime - lastSwitchT) >= handover) { possess(i); lastSwitchT = simTime; }  // 切到撤離中單位＝護送(不中斷)
  }
  if (k === 'h') { if (e.shiftKey) extractAll(); else toggleExtract(); }                  // H 撤離(進入護送) / Shift+H 全體撤離
  if (k === ' ') { seizeIfEscorting(); if (controlledId != null) useAbility(players[controlledId]); }  // 空白鍵=技能（右鍵亦可）；護送中→奪回
  if (k === 'r') { seizeIfEscorting(); if (controlledId != null) startReload(players[controlledId]); } // 換彈；護送中→奪回
  if (k === 'q') { seizeIfEscorting(); if (controlledId != null) useItem(players[controlledId]); }     // 道具；護送中→奪回
  if (k === 'e') { seizeIfEscorting(); tryInteract(); }                                                // 互動：開關門/按鈕；護送中→奪回

window.addEventListener('keyup', e => keys.delete(e.key.toLowerCase()));

/* =====================================================================
   Update — 固定時間步
   ===================================================================== */
function update(dt) {
  if (scene !== 'COMBAT') return;   // MAP/REST/結算：不模擬、不需鏡頭（此時 cam/players 可能尚未建立）
  if (!pointerLocked) return;       // 戰鬥：滑鼠鎖定後才開始/繼續推進（未鎖定＝暫停）
  if (cutscene) cutsceneTick(dt);   // 第0關演出導演（推進節拍）
  updateCamera(dt);
  if (cutscene && cutscene.lock) return;   // 演出鎖控制：只跑鏡頭/演出，不跑常規 sim

  for (const p of players) { if (p.fireCooldown > 0) p.fireCooldown -= dt; if (p.muzzle > 0) p.muzzle -= dt; if (p.abilityCd > 0) p.abilityCd -= dt; tickAmmo(p, dt); }
  for (const e of enemies) { if (e.dead) continue; if (e.fireCooldown > 0) e.fireCooldown -= dt; if (e.muzzle > 0) e.muzzle -= dt; tickAmmo(e, dt); }

  // 0) 護送 seize：護送(controlledId 指向 EXTRACTING)時，移動或開火 → 奪回手動、撤離中斷（滑鼠轉視野不算）
  if (controlledId != null && players[controlledId].state === 'EXTRACTING') {
    const moveCmd = keys.has('w') || keys.has('a') || keys.has('s') || keys.has('d');
    if (moveCmd || mouse.down) seizeIfEscorting();
  }

  // 1) 被附身單位：滑鼠轉向(turnSpeed) + 相對角色移動 + 左鍵開火
  if (controlledId != null) {
    const u = players[controlledId];
    if (u.state === 'CONTROLLED') {
      // 砲塔以「武器迴轉速度」追滑鼠輸入累積的目標朝向（追不上＝轉向延遲；裝備可改迴轉）
      u.facing = rotToward(u.facing, aimDir, (u.turnSpeed || u.weapon.turnSpeed) * Math.PI / 180 * dt);
      let fwd = 0, strafe = 0;
      if (keys.has('w')) fwd += 1; if (keys.has('s')) fwd -= 1;
      if (keys.has('d')) strafe += 1; if (keys.has('a')) strafe -= 1;
      const moving = !!(fwd || strafe);
      u.sprinting = moving && keys.has('shift');                  // Shift 奔跑
      if (moving) {
        const fx = Math.cos(u.facing), fy = Math.sin(u.facing);
        const rx = Math.cos(u.facing + Math.PI / 2), ry = Math.sin(u.facing + Math.PI / 2);
        let mx = fx * fwd + rx * strafe, my = fy * fwd + ry * strafe;
        const l = Math.hypot(mx, my) || 1;
        const spd = CONFIG.moveSpeed * (u.sprinting ? sprintMult(u) : 1) * lowWallSpeedMult(u.pos) * (u.moveMul || 1) * (u.buffMove || 1);  // 低矮牆減速 + 裝備/道具
        u.pos.x += mx / l * spd * dt; u.pos.y += my / l * spd * dt;
      }
      if (mouse.down) manualFire(u, u.facing);
    }
  }

  // 2) 待機 / 撤離
  for (const p of players) { if (p.state === 'IDLE') idleTick(p, dt); else if (p.state === 'EXTRACTING') extractTick(p, dt); }

  // 3) 敵人 AI
  for (const e of enemies) if (!e.dead) enemyTick(e, dt);

  // 4) 軟計時 → 追兵
  if (simTime > curTimeBudget) {
    reinforceTimer -= dt;
    if (reinforceTimer <= 0) {
      const e = makeEnemy(nearestNode(ENTRY, false), 'rusher', true);
      e.pos = { x: ENTRY.x, y: ENTRY.y };
      e.state = 'ENGAGED';                 // 追兵是來獵殺的：直接交戰
      enemies.push(e);
      const ramps = Math.floor((simTime - curTimeBudget) / CONFIG.reinforce.rampEvery);
      reinforceTimer = Math.max(CONFIG.reinforce.minInterval, CONFIG.reinforce.startInterval + CONFIG.reinforce.rampDelta * ramps);
    }
  }

  // 5) 子彈 / 特效
  updateBullets(dt); updateParticles(dt);

  // 6) 分離 + 牆面碰撞 + 掉落物拾取
  const movers = [...activePlayers(), ...enemies.filter(e => !e.dead)];
  separate(movers);
  for (const u of movers) collideWalls(u);
  updateDrops();

  // 7) 撤離判定
  for (const p of players) {
    if ((p.state === 'CONTROLLED' || p.state === 'IDLE' || p.state === 'EXTRACTING') && dist(p.pos, EXTRACT) < CONFIG.extractRadius) {
      p.state = 'EXTRACTED'; extractedCount++;
      if (controlledId === p.id) { controlledId = null; autoPossess(p.pos); }
    }
  }

  // 7.5) 戰鬥中若沒被附身、又非刻意跟隨撤離中 → 自動接手場上其他單位（非撤離優先），不留空轉
  if (controlledId == null && activePlayers().length > 0) autoPossess(null);

  // 8) 計時 + 結算（場上無我方 → 進休息關 或 run 結束）
  simTime += dt;
  if (activePlayers().length === 0) endMission();
}

/* =====================================================================
   Render — 旋轉視角 + 戰爭迷霧
   ===================================================================== */
const hsl = (h, s, l, a = 1) => `hsla(${h},${s}%,${l}%,${a})`;
function applyCam() { ctx.translate(cv.width / 2, cv.height * CONFIG.camera.anchorY); ctx.rotate(cam.angle); ctx.scale(cam.scale, cam.scale); ctx.translate(-cam.x, -cam.y); }

function draw() {
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.fillStyle = CONFIG.fog.color; ctx.fillRect(0, 0, cv.width, cv.height);

  if (scene === 'MAP') { drawRoadmap(); return; }
  if (scene === 'EDITOR') { drawEditor(); return; }
  if (scene === 'REST') { drawRest(); return; }
  if (scene === 'ARMORY') { drawArmory(); return; }
  if (scene === 'RUNEND') { drawRunEnd(); return; }

  // 鎖定滑鼠前＝黑螢幕（不洩漏場面、不破壞氣氛；全關卡適用，含第0關）
  if (!pointerLocked) { drawCombatStart(); return; }

  // ---- 世界（鏡頭變換）----
  ctx.save(); applyCam();
  drawGrid(); drawLowWalls(); drawWalls(); drawDoors(); drawButtons(); drawWaypoints(); drawZonesWorld();
  drawDrops(); drawPrisoners(); drawIntroActors(); drawParticles(); drawBullets(); drawEnemies(); drawPlayers();
  if (debugView) drawDebug();
  ctx.restore();

  // ---- 戰爭迷霧（除錯時關閉）。演出鎖控制時 drawFog 改挖「聚光圈」＝重點區外全是迷霧 ----
  if (!debugView) drawFog();

  // ---- 霧上：淡牆骨架（空間參考）----
  ctx.save(); applyCam(); drawSkeleton(); ctx.restore();

  // ---- 螢幕層：血條/標記/HUD/卡片 ----（演出鎖控制時隱藏＝乾淨電影感；gate 解鎖時照常）
  if (!(cutscene && cutscene.lock)) { drawScreenOverlays(); drawHUD(); drawCards(); }
  if (cutscene) drawCutscene();   // 第0關：對話泡 + 字幕（最上層）
}

// 第0關演出 actor（守衛＝非戰鬥單位點 + 名牌；控制台＝互動標記），畫在世界層
function drawIntroActors() {

// 第0關：對白框（下）+ 字幕/目標（上），螢幕座標
function drawCutscene() {

// 簡易自動換行（依 measureText；headless stub 回固定寬→不換行，無例外）
function wrapText(text, maxW) {
  const out = []; let cur = '';
  for (const ch of text) {
    if (ch === '\n') { out.push(cur); cur = ''; continue; }
    const t = cur + ch;
    if (cur && ctx.measureText(t).width > maxW) { out.push(cur); cur = ch; } else cur = t;
  }
  if (cur || !out.length) out.push(cur);
  return out;
}
// 對話泡：圓角框 + 指向頭頂的小尾，置於螢幕座標 s 的上方；夾在畫面內
function drawSpeechBubble(s, text) {
  ctx.font = '15px Consolas';
  const lines = wrapText(text, 230), lh = 20, pad = 9;
  let tw = 0; for (const l of lines) tw = Math.max(tw, ctx.measureText(l).width);
  const w = tw + pad * 2, h = lines.length * lh + pad * 2 - 4;
  let bx = clamp(s.x - w / 2, 8, cv.width - w - 8);
  let by = s.y - 22 - h; if (by < 8) by = s.y + 22;   // 頭頂放不下就改放下方
  const r = 8;
  ctx.fillStyle = 'rgba(12,16,22,0.92)'; ctx.strokeStyle = 'rgba(127,227,255,0.65)'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(bx + r, by); ctx.arcTo(bx + w, by, bx + w, by + h, r); ctx.arcTo(bx + w, by + h, bx, by + h, r);
  ctx.arcTo(bx, by + h, bx, by, r); ctx.arcTo(bx, by, bx + w, by, r); ctx.closePath();
  ctx.fill(); ctx.stroke();
  // 指向頭頂的小三角尾
  const tailX = clamp(s.x, bx + 14, bx + w - 14), tipY = (by > s.y) ? by : by + h, dir = (by > s.y) ? -1 : 1;
  ctx.beginPath(); ctx.moveTo(tailX - 7, tipY); ctx.lineTo(tailX + 7, tipY); ctx.lineTo(tailX, tipY + dir * 10); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#e6edf3'; ctx.textAlign = 'center';
  lines.forEach((l, i) => ctx.fillText(l, bx + w / 2, by + pad + 14 + i * lh));
  ctx.textAlign = 'left';
}
// （備用）舊版底部對話框＋姓名，改用對話泡後不再呼叫；保留供需要時切回
function drawDialogueBoxLegacy(who, text) {

  ctx.textAlign = 'left';
  ctx.fillStyle = '#7fe3ff'; ctx.font = 'bold 15px Consolas'; ctx.fillText(who || '', bx + 18, by + 28);
  ctx.fillStyle = '#e6edf3'; ctx.font = '16px Consolas'; ctx.fillText(text, bx + 18, by + 58);
}
// 鎖定滑鼠前的黑螢幕（取代「世界透出來」的暫停畫面，避免洩漏場面/破壞氣氛）

function drawWalls() {

function drawZonesWorld() {

function drawParticles() {

// 地上掉落的武器（脈動小方塊 + 稀有度色，被附身單位走過即撿）

// 俘虜（未釋放）：青色圈 + 柵欄記號（受迷霧遮蔽，門後看不到）

function drawUnitBody(u, fill, ringColor, ringW) {

  ctx.fillStyle = fill; ctx.beginPath(); ctx.arc(u.pos.x, u.pos.y, u.radius, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = ringColor; ctx.lineWidth = ringW; ctx.beginPath(); ctx.arc(u.pos.x, u.pos.y, u.radius, 0, Math.PI * 2); ctx.stroke();
  if (u.muzzle > 0) { ctx.fillStyle = 'rgba(255,230,150,0.9)'; ctx.beginPath(); ctx.arc(u.pos.x + Math.cos(u.facing) * (u.radius + 4), u.pos.y + Math.sin(u.facing) * (u.radius + 4), 4, 0, Math.PI * 2); ctx.fill(); }
}
function drawPlayers() {
  for (const p of players) {
    if (p.state === 'DEAD' || p.state === 'EXTRACTED') continue;
    const controlled = (p.state === 'CONTROLLED');
    const low = p.hp / p.maxHp <= CONFIG.lowHpFrac;
    if (low) { const a = 0.35 + 0.35 * Math.sin(simTime * 16); ctx.strokeStyle = `rgba(255,60,60,${a})`; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(p.pos.x, p.pos.y, p.radius + 8, 0, Math.PI * 2); ctx.stroke(); }
    if (controlled) { ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(p.pos.x, p.pos.y, p.radius + 5, 0, Math.PI * 2); ctx.stroke(); }
    drawUnitBody(p, hsl(p.hue, 55, controlled ? 62 : 48), controlled ? '#ffffff' : hsl(p.hue, 60, 75), controlled ? 3 : 2);
  }
}
function drawEnemies() {
  for (const e of enemies) {
    if (e.dead) continue;

    const hue = e.isReinforce ? 18 : (e.type ? e.type.hue : 0);
    drawUnitBody(e, hsl(hue, 65, low ? 38 : 48), hsl(hue, 70, 65), 2);
    if (e.armor > 0) {   // 裝甲：外加一圈板甲標記（金屬色）
      ctx.strokeStyle = hsl(hue, 25, 82); ctx.lineWidth = 2;

}
function drawDebug() {

  for (const n of MAP.waypoints) {
    ctx.fillStyle = '#8aa'; ctx.fillText(`#${n.id} ${n.tags.join(',')}`, n.pos.x, n.pos.y - 8);
    if (reservations.has(n.id)) { ctx.strokeStyle = '#ffcf5a'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(n.pos.x, n.pos.y, 9, 0, Math.PI * 2); ctx.stroke(); ctx.fillStyle = '#ffcf5a'; ctx.fillText(`R:E${reservations.get(n.id)}`, n.pos.x, n.pos.y + 16); }
  }

/* ---- 戰爭迷霧：在全屏霧層上以 destination-out 挖出視錐+近身圈 ---- */
function visionPolygon(u) {
  const half = CONFIG.vision.coneHalfDeg * Math.PI / 180, rays = CONFIG.vision.fanRays;
  const poly = [{ x: u.pos.x, y: u.pos.y }];
  for (let i = 0; i <= rays; i++) { const ang = u.facing - half + (2 * half) * (i / rays); poly.push(rayHit(u.pos, ang, CONFIG.vision.coneMax)); }
  return poly;
}
function drawFog() {
  // 在離屏 canvas 上做「不透明霧 → destination-out 挖出可見孔洞」，再整層貼回主畫布。
  // 如此可見孔洞露出的是主畫布上的世界（牆/敵人/子彈/單位），重疊的視錐也不會互相補回霧。
  fctx.setTransform(1, 0, 0, 1, 0, 0);
  fctx.globalCompositeOperation = 'source-over'; fctx.globalAlpha = 1;
  fctx.fillStyle = CONFIG.fog.color; fctx.fillRect(0, 0, cv.width, cv.height);
  fctx.globalCompositeOperation = 'destination-out';
  if (cutscene && cutscene.lock && cutscene.reveal) {
    // 演出聚光：只挖出重點演出區（羽化圓），其餘全包在迷霧裡（主角走出此圈＝沒入迷霧）
    const rv = cutscene.reveal, c = w2s(rv), r = rv.r * cam.scale;
    const g = fctx.createRadialGradient(c.x, c.y, r * 0.62, c.x, c.y, r);
    g.addColorStop(0, '#000'); g.addColorStop(1, 'rgba(0,0,0,0)');
    fctx.fillStyle = g; fctx.beginPath(); fctx.arc(c.x, c.y, r, 0, Math.PI * 2); fctx.fill();
  } else {
    fctx.fillStyle = '#000';
    for (const p of activePlayers()) {
      const c = w2s(p.pos);
      fctx.beginPath(); fctx.arc(c.x, c.y, p.senseRadius * cam.scale, 0, Math.PI * 2); fctx.fill();   // 近身圈
      const poly = visionPolygon(p);                                                                  // 視錐
      fctx.beginPath(); const s0 = w2s(poly[0]); fctx.moveTo(s0.x, s0.y);
      for (let i = 1; i < poly.length; i++) { const s = w2s(poly[i]); fctx.lineTo(s.x, s.y); }
      fctx.closePath(); fctx.fill();
    }
  }
  fctx.globalCompositeOperation = 'source-over';
  ctx.drawImage(fogCanvas, 0, 0);
}
function drawSkeleton() {
  ctx.globalAlpha = CONFIG.fog.skeletonAlpha;
  ctx.strokeStyle = '#9fb3c8'; ctx.lineWidth = 4; ctx.lineCap = 'round';
  for (const w of MAP.walls) { ctx.beginPath(); ctx.moveTo(w.x1, w.y1); ctx.lineTo(w.x2, w.y2); ctx.stroke(); }
  ctx.strokeStyle = '#caa05a'; for (const d of MAP.doors) { if (d.open) continue; ctx.beginPath(); ctx.moveTo(d.x1, d.y1); ctx.lineTo(d.x2, d.y2); ctx.stroke(); }  // 關門也給空間參考
  ctx.strokeStyle = '#7d96b0'; ctx.lineWidth = 3; for (const lw of MAP.lowWalls) { ctx.beginPath(); ctx.moveTo(lw.x1, lw.y1); ctx.lineTo(lw.x2, lw.y2); ctx.stroke(); }
  ctx.globalAlpha = 1;
}

/* ---- 螢幕層覆蓋：血條 / 單位標記 / 區域標記（皆保持正立）---- */
function screenBar(s, frac, col, yoff) {
  const w = 30, h = 4, x = s.x - w / 2, y = s.y + yoff;
  ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(x - 1, y - 1, w + 2, h + 2);
  ctx.fillStyle = col; ctx.fillRect(x, y, w * clamp(frac, 0, 1), h);
}
function edgeMarker(worldPos, color, label, filled) {
  const m = 24; let s = w2s(worldPos);
  const onScreen = s.x >= m && s.x <= cv.width - m && s.y >= m && s.y <= cv.height - m;
  const x = clamp(s.x, m, cv.width - m), y = clamp(s.y, m, cv.height - m);
  ctx.fillStyle = color; ctx.strokeStyle = color; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(x, y, onScreen ? 5 : 8, 0, Math.PI * 2); filled ? ctx.fill() : ctx.stroke();
  if (label) { ctx.font = 'bold 11px Consolas'; ctx.textAlign = 'center'; ctx.fillText(label, x, y - 11); ctx.textAlign = 'left'; }
  return onScreen;
}
function drawScreenOverlays() {
  // 區域標記（永遠正立、離場時夾到邊緣）
  const reinforcing = simTime > curTimeBudget;
  edgeMarker(EXTRACT, '#5fd06b', 'EXTRACT', false);
  edgeMarker(ENTRY, reinforcing ? '#ff5d5d' : '#caa05a', reinforcing ? 'INBOUND' : 'ENTRY', false);

  // 我方單位：血條 + 編號（永遠可見）
  for (const p of activePlayers()) {
    const s = w2s(p.pos), low = p.hp / p.maxHp <= CONFIG.lowHpFrac;
    let col = p.hp / p.maxHp > 0.6 ? '#5fd06b' : low ? '#ff4d4d' : '#e0c24a';
    if (low && Math.sin(simTime * 18) > 0) col = '#ffffff';
    screenBar(s, p.hp / p.maxHp, col, -p.radius * cam.scale - 12);
    if (p.reloadT > 0) screenBar(s, 1 - p.reloadT / (p.reloadDur || p.weapon.reloadTime), '#7fa8ff', -p.radius * cam.scale - 6);
    ctx.font = 'bold 10px Consolas'; ctx.textAlign = 'center';
    ctx.fillStyle = (p.state === 'CONTROLLED') ? '#ffffff' : hsl(p.hue, 60, 72);
    let tag = `${p.id + 1}`; if (p.state === 'EXTRACTING') tag += '→EXT'; if (low) tag += ' LOW';
    ctx.fillText(tag, s.x, s.y + p.radius * cam.scale + 14);
    ctx.textAlign = 'left';
    // 離場(畫面外)的我方 → 邊緣箭頭
    edgeMarker(p.pos, hsl(p.hue, 60, 65), null, true);
  }
  // 被看到的敵人：血條
  for (const e of enemies) {
    if (e.dead) continue;
    if (!debugView && !isRevealed(e)) continue;
    const s = w2s(e.pos);
    screenBar(s, e.hp / e.maxHp, '#ff6b6b', -e.radius * cam.scale - 10);
  }
  // 砲塔準星（沿被附身單位 facing；另畫一條較淡的目標朝向線顯示轉向延遲）
  if (controlledId != null && players[controlledId].state === 'CONTROLLED') {
    const u = players[controlledId], s = w2s(u.pos);
    const r1 = u.radius * cam.scale + 6;
    const da = aimDir + cam.angle;     // 滑鼠目標朝向（螢幕角）
    ctx.strokeStyle = 'rgba(255,255,255,0.22)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(s.x + Math.cos(da) * r1, s.y + Math.sin(da) * r1); ctx.lineTo(s.x + Math.cos(da) * 120, s.y + Math.sin(da) * 120); ctx.stroke();
    const sa = u.facing + cam.angle;   // 砲塔現朝向（螢幕角）= 子彈方向
    ctx.strokeStyle = 'rgba(255,255,255,0.75)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(s.x + Math.cos(sa) * r1, s.y + Math.sin(sa) * r1); ctx.lineTo(s.x + Math.cos(sa) * 84, s.y + Math.sin(sa) * 84); ctx.stroke();
    ctx.beginPath(); ctx.arc(s.x + Math.cos(sa) * 96, s.y + Math.sin(sa) * 96, 4, 0, Math.PI * 2); ctx.stroke();
    if (u.sprinting) {
      ctx.fillStyle = 'rgba(127,227,255,0.9)'; ctx.font = 'bold 11px Consolas'; ctx.textAlign = 'center';
      ctx.fillText(`▸▸ SPRINT x${sprintMult(u).toFixed(2)}`, s.x, s.y - u.radius * cam.scale - 26);
      ctx.textAlign = 'left';
    }
    // 互動提示（在範圍內的門/按鈕/俘虜上方）
    const it = nearestInteractable(u);
    if (it) {
      const wpos = it.type === 'door' ? doorMid(it.door) : it.type === 'button' ? { x: it.button.x, y: it.button.y } : it.type === 'console' ? { x: introConsole.x, y: introConsole.y } : it.prisoner.pos;
      const ips = w2s(wpos);
      const label = it.type === 'button' ? 'E：啟動按鈕' : it.type === 'prisoner' ? 'E：釋放俘虜' : it.type === 'console' ? 'E：取得發射密碼' : (it.door.open ? 'E：關門' : 'E：開門');
      ctx.font = 'bold 12px Consolas'; ctx.textAlign = 'center';
      const tw = ctx.measureText(label).width + 12;
      ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(ips.x - tw / 2, ips.y - 30, tw, 18);
      ctx.fillStyle = '#ffe08a'; ctx.fillText(label, ips.x, ips.y - 17);
      ctx.textAlign = 'left';
    }
  }
}

/* ---- 底部單位卡片：名稱 / 生命 / 武器 / 彈夾·備彈 / 技能CD ---- */
function drawCards() {
  const n = players.length, cw = 196, ch = 84, gap = 10;
  const totalW = n * cw + (n - 1) * gap;
  const x0 = (cv.width - totalW) / 2, y0 = cv.height - ch - 6;
  for (let i = 0; i < n; i++) drawCard(players[i], x0 + i * (cw + gap), y0, cw, ch, i);
}
function drawCard(p, x, y, w, h, i) {
  const ctrl = (p.state === 'CONTROLLED');

  const pad = 9, bw = w - 2 * pad, bx = x + pad;
  // 面板

  ctx.lineWidth = ctrl ? 2.5 : 1;
  ctx.strokeStyle = inactive ? 'rgba(120,130,140,0.35)' : (ctrl ? '#ffffff' : hsl(p.hue, 50, 55, 0.85));

  // 名稱 + 編號 + 狀態
