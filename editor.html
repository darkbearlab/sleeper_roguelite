<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLEEPER — 地圖編輯器</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#06080d;color:#cdd6e0;font:12px Consolas,"Courier New",monospace;overflow:hidden}
  #app{display:grid;grid-template-rows:auto 1fr auto;height:100%}
  header{display:flex;gap:8px;align-items:center;padding:6px 10px;background:#0b0f15;border-bottom:1px solid #1f2733;flex-wrap:wrap}
  header .title{color:#7fe3ff;font-size:14px;font-weight:bold;margin-right:4px}
  .tabbtn{padding:4px 12px;border:1px solid #2a3442;border-radius:5px;background:#121823;color:#9fb3c8;cursor:pointer}
  .tabbtn.on{background:#1d3247;color:#bfe6ff;border-color:#3a6b8f}
  header input,header select,header button{background:#0f141c;border:1px solid #2a3442;color:#cdd6e0;border-radius:4px;padding:3px 6px;font:inherit}
  header button{cursor:pointer}
  header button:hover{background:#15202c}
  #btnbar{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto;align-items:center}
  .muted{color:#5a6470}
  #btnbar .grp{display:inline-flex;align-items:center;gap:5px;padding:3px 8px 3px 6px;border:1px solid #1c2430;border-radius:6px;background:#0c1119}
  #btnbar .gl{color:#6b7686;font-size:10px;letter-spacing:1px;margin-right:1px;align-self:center}
  main{display:grid;grid-template-columns:128px 1fr 248px;min-height:0}
  #tools{background:#0a0e14;border-right:1px solid #1f2733;padding:8px 6px;display:flex;flex-direction:column;gap:5px;overflow:auto}
  #tools .hd{color:#5a6470;margin:4px 2px 0;font-size:11px}
  .tool{padding:5px 7px;border:1px solid #2a3442;border-radius:4px;background:#121823;color:#9fb3c8;cursor:pointer;text-align:left;white-space:nowrap}
  .tool.on{background:#243a2a;color:#bfe6cf;border-color:#3a8f5a}
  #cvwrap{position:relative;min-width:0;background:#06080d}
  canvas{display:block;width:100%;height:100%;cursor:crosshair}
  #inspector{background:#0a0e14;border-left:1px solid #1f2733;padding:8px;overflow:auto}
  #inspector h3{margin:0 0 6px;color:#7fe3ff;font-size:13px}
  #inspector .muted{color:#5a6470}
  .row{display:flex;align-items:center;gap:6px;margin:3px 0}
  .row label{flex:0 0 74px;color:#9fb3c8}
  .row input,.row select{flex:1;background:#0f141c;border:1px solid #2a3442;color:#e0e8f0;border-radius:3px;padding:2px 4px;min-width:0;font:inherit}
  .row button{background:#15202c;border:1px solid #2a3442;color:#bfe6ff;border-radius:4px;cursor:pointer;padding:3px 6px}
  .tagbtn{display:inline-block;padding:2px 6px;margin:2px;border:1px solid #2a3442;border-radius:3px;background:#121823;color:#9fb3c8;cursor:pointer}
  .tagbtn.on{background:#3a3320;color:#ffd27a;border-color:#7a6a3a}
  footer{padding:5px 10px;background:#0b0f15;border-top:1px solid #1f2733;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ok{color:#5fd06b}.warn{color:#ff9b6b}
  #overlay{position:fixed;inset:0;background:rgba(0,0,0,0.66);display:none;align-items:center;justify-content:center;z-index:10}
  #overlay.on{display:flex}
  #overlay .box{width:680px;max-width:92%;background:#0d1219;border:1px solid #2a3442;border-radius:8px;padding:12px}
  #overlay h3{margin:0 0 8px;color:#7fe3ff}
  #overlay textarea{width:100%;height:340px;background:#0f141c;border:1px solid #2a3442;color:#cdd6e0;font:11px Consolas;border-radius:4px}
  #overlay .bar{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;align-items:center}
  #overlay button{background:#15202c;border:1px solid #2a3442;color:#bfe6ff;border-radius:4px;cursor:pointer;padding:5px 12px;font:inherit}
  #ovmsg{margin-right:auto;color:#9fb3c8}
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="title">地圖編輯器</span>
    <span class="tabbtn on" data-tab="objects">① 地圖物件</span>
    <span class="tabbtn" data-tab="waypoints">② Waypoint/連線</span>
    <span class="tabbtn" data-tab="enemies">③ 敵人配置</span>
    <span class="tabbtn" data-tab="underlay">④ 底圖</span>
    <span id="btnbar">
      <span class="grp"><span class="gl" title="一個 maps.json 檔可裝多張地圖">地圖庫</span>
        <select id="mapPick" title="切換要編輯的地圖（maps.json 內的一張）"></select>
        <button id="btnMapAdd" title="新增一張空白地圖到庫">＋</button>
        <button id="btnMapDel" title="從庫刪除目前地圖">🗑</button>
        <input id="mapKey" style="width:70px" placeholder="鍵名" title="此地圖在 maps.json 的鍵名（英數/底線）">
        <button id="btnLibLoad" title="讀入一個 maps.json（取代整個庫）">讀入</button>
        <button id="btnLibSave" title="下載整個庫成 maps.json">下載</button>
      </span>
      <span class="grp"><span class="gl" title="目前正在編輯的這一張地圖">本圖</span>
        <input id="mapLabel" style="width:92px" placeholder="名稱" title="此地圖的顯示名稱 label">
        <select id="tplSel" title="以範本/現有地圖開新的一張（會覆蓋目前這張的內容）"></select>
        <button id="btnNew" title="清成空白地圖（覆蓋目前這張）">空白</button>
        <span class="muted">尺寸</span><input id="mapW" type="number" style="width:50px" title="地圖寬 (px)"><span class="muted">×</span><input id="mapH" type="number" style="width:50px" title="地圖高 (px)">
        <button id="btnWall" title="依目前尺寸重建邊界外牆">外牆</button>
        <button id="btnMirH" title="水平鏡像成新的一張地圖（左右翻、保留原圖；做變體的起點）">⇄</button>
        <button id="btnMirV" title="垂直鏡像成新的一張地圖（上下翻、保留原圖）">⇅</button>
      </span>
      <span class="grp"><span class="gl">檢視</span>
        <button id="btnGrid" title="格線吸附開關">格線:開</button>
        <button id="btnFit" title="縮放置中、看到整張地圖">適配</button>
        <button id="btnUndo" title="復原 Ctrl+Z">↶</button>
        <button id="btnRedo" title="重做 Ctrl+Y">↷</button>
      </span>
      <span class="grp"><span class="gl" title="只針對目前這一張">單張</span>
        <button id="btnImport" title="貼上單張地圖 JSON 載入（覆蓋目前這張）">匯入</button>
        <button id="btnExport" title="匯出目前這張：純 JSON 或 MAPS 片段">匯出</button>
        <button id="btnPlaytest" title="把目前這張帶進遊戲的自由戰鬥試打（結束/離開回編輯器）">▶ 測試戰鬥</button>
      </span>
      <button id="btnHelp" title="使用說明" style="align-self:center">？</button>
    </span>
  </header>
  <main>
    <aside id="tools"></aside>
    <div id="cvwrap"><canvas id="cv"></canvas></div>
    <aside id="inspector"></aside>
  </main>
  <footer id="status">—</footer>
</div>
<input id="libFile" type="file" accept="application/json,.json" style="display:none">
<div id="overlay"><div class="box">
  <h3 id="ovtitle">匯入 / 匯出</h3>
  <textarea id="ovtext" spellcheck="false"></textarea>
  <div class="bar"><span id="ovmsg"></span><span id="ovbtns"></span><button id="ovclose">關閉</button></div>
</div></div>
<script>

  const x2 = r.x + r.w, y2 = r.y + r.h;
  if ((a.x >= r.x && a.x <= x2 && a.y >= r.y && a.y <= y2) || (b.x >= r.x && b.x <= x2 && b.y >= r.y && b.y <= y2)) return true;
  const c0 = { x: r.x, y: r.y }, c1 = { x: x2, y: r.y }, c2 = { x: x2, y: y2 }, c3 = { x: r.x, y: y2 };
  return segIntersect(a, b, c0, c1) || segIntersect(a, b, c1, c2) || segIntersect(a, b, c2, c3) || segIntersect(a, b, c3, c0);
}
let areaMat = 'solid';   // 區域工具目前材質
function matDesc(mat) {   // 材質三軸的人讀說明
  const m = MATERIALS[mat] || MATERIALS.solid;
  const mv = m.move === true ? '擋移動' : m.move === 'slow' ? '減速(敵繞行)' : '可穿越';
  const lo = m.los ? '擋視線' : '可看穿';
  const bu = m.bullet === 'block' ? '擋子彈' : m.bullet === 'prob' ? '機率擋彈' : '穿子彈';
  return mv + ' · ' + lo + ' · ' + bu;
}

    const blob = new Blob([libExportText()], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'maps.json'; a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  });

  // 畫布事件
  const sxsy = (e) => { const r = cv.getBoundingClientRect(); return { _sx: e.clientX - r.left, _sy: e.clientY - r.top, button: e.button, shift: e.shiftKey }; };
  cv.addEventListener('mousedown', e => { onDown(Object.assign(sxsy(e), {})); });
  window.addEventListener('mousemove', e => { onMove(sxsy(e)); });
  window.addEventListener('mouseup', e => onUp(sxsy(e)));
  cv.addEventListener('wheel', e => { e.preventDefault(); const o = sxsy(e); o.deltaY = e.deltaY; onWheel(o); }, { passive: false });
  cv.addEventListener('contextmenu', e => { e.preventDefault(); onContext(s2w({ x: e.clientX - cv.getBoundingClientRect().left, y: e.clientY - cv.getBoundingClientRect().top })); });
  window.addEventListener('keydown', e => {
    const t = e.target; if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.tagName === 'SELECT')) return;
    const k = e.key.toLowerCase();
    if (k === ' ') { spaceDown = true; e.preventDefault(); }
    else if ((e.ctrlKey || e.metaKey) && k === 'z') { undo(); e.preventDefault(); }
    else if ((e.ctrlKey || e.metaKey) && (k === 'y' || (k === 'z' && e.shiftKey))) { redo(); e.preventDefault(); }
    else if (k === 'delete' || k === 'backspace') { removeSelected(); rebuildInspector(); }
    else if (k === 'g') { snap = snap > 0 ? 0 : 20; gridBtn.textContent = '格線:' + (snap > 0 ? '開' : '關'); }
    else if (k === 'escape') { clearSel(); rebuildInspector(); }
  });
  window.addEventListener('keyup', e => { if (e.key === ' ') spaceDown = false; });
  window.addEventListener('resize', resize);

  // 底圖檔案輸入（隱藏）
  uFileInput = document.createElement('input'); uFileInput.type = 'file'; uFileInput.accept = 'image/*'; uFileInput.style.display = 'none';
  uFileInput.addEventListener('change', () => { if (uFileInput.files && uFileInput.files[0]) loadUnderlayFile(uFileInput.files[0]); uFileInput.value = ''; });
  document.body.appendChild(uFileInput);
  restoreUnderlay();

  resize();
  // 開場：有上次 session（含測試戰鬥往返）→ 還原工作區；否則庫先放一張 alpha 方便上手
  if (!restoreSession()) { mapLib = { alpha: cleanOf(TEMPLATES.alpha) }; curKey = 'alpha'; loadMap(mapLib.alpha); }
  fitView();
  rebuildUI();
  (function loop() { render(); requestAnimationFrame(loop); })();
}
if (typeof document !== 'undefined' && document.getElementById) init();
</script>
</body>
</html>
