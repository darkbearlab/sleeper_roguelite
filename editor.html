<!DOCTYPE html>
<html lang="zh-Hant">
<head>

  const abx = b.x - a.x, aby = b.y - a.y, len2 = abx * abx + aby * aby || 1;

  return { x: a.x + abx * t, y: a.y + aby * t };
}
const distToSeg = (p, a, b) => dist(p, closestOnSeg(p, a, b));
function segIntersect(a, b, c, d) {
  const rx = b.x - a.x, ry = b.y - a.y, sx = d.x - c.x, sy = d.y - c.y, rxs = rx * sy - ry * sx;

/* =====================================================================

   ===================================================================== */
function blankMap() {
  return { label: '新地圖', walls: [], doors: [], lowWalls: [], bushes: [], destructibles: [],
    buttons: [], waypoints: [], edges: [], entryPoints: [], extractionPoints: [], enemySpawns: [], prisoners: [] };
}
let map = blankMap();

function normalize(m) {                                   // 確保所有陣列存在 + id 連續 + 清掉壞邊/壞 spawn
  const A = ['walls', 'doors', 'lowWalls', 'bushes', 'destructibles', 'buttons', 'waypoints', 'edges', 'entryPoints', 'extractionPoints', 'enemySpawns', 'prisoners'];
  for (const k of A) if (!Array.isArray(m[k])) m[k] = [];
  if (typeof m.label !== 'string') m.label = '新地圖';
  m.waypoints.forEach((w, i) => { w.id = i; if (!w.pos) w.pos = { x: 0, y: 0 }; if (!Array.isArray(w.tags)) w.tags = []; });
  const N = m.waypoints.length;
  m.edges = m.edges.filter(e => Array.isArray(e) && e.length === 2 && e[0] !== e[1] && e[0] >= 0 && e[1] >= 0 && e[0] < N && e[1] < N)
    .map(e => (e[0] < e[1] ? [e[0], e[1]] : [e[1], e[0]]));
  // 去重邊
  const seen = new Set(); m.edges = m.edges.filter(e => { const k = e[0] + '-' + e[1]; if (seen.has(k)) return false; seen.add(k); return true; });
  m.enemySpawns = m.enemySpawns.filter(s => s && s.nodeId >= 0 && s.nodeId < N);
  return m;
}
function loadMap(obj, keepView) {
  map = normalize(JSON.parse(JSON.stringify(obj)));
  sel = null; linkFrom = null; undoStack = []; redoStack = [];
  if (!keepView && typeof fitView === 'function') fitView();
  if (typeof rebuildUI === 'function') rebuildUI();
}

/* ---- 撤銷/重做 ---- */
let undoStack = [], redoStack = [];
const snapshot = () => JSON.stringify(map);
function pushUndo() { undoStack.push(snapshot()); if (undoStack.length > 60) undoStack.shift(); redoStack.length = 0; }
function undo() { if (!undoStack.length) return; redoStack.push(snapshot()); map = normalize(JSON.parse(undoStack.pop())); sel = null; linkFrom = null; rebuildUI(); }
function redo() { if (!redoStack.length) return; undoStack.push(snapshot()); map = normalize(JSON.parse(redoStack.pop())); sel = null; linkFrom = null; rebuildUI(); }

/* ---- id 產生 ---- */
function nextId(arr, prefix) {
  let n = 1; const ids = new Set(arr.map(o => o.id));
  while (ids.has(prefix + n)) n++;
  return prefix + n;
}

    const psel = document.createElement('select'); PERSONALITIES.forEach(pp => { const o = document.createElement('option'); o.value = pp; o.textContent = pp; psel.appendChild(o); }); psel.value = s.personality || '(預設)';
    psel.addEventListener('change', () => setSpawn(sel.nodeId, { personality: psel.value }));
    inspectorEl.appendChild(field('個性', psel));
    const deg = document.createElement('input'); deg.type = 'number'; deg.value = Math.round((s.facing || 0) * 180 / Math.PI); deg.addEventListener('input', () => { if (deg.value !== '' && deg.value !== '-') setSpawn(sel.nodeId, { facing: (+deg.value) * Math.PI / 180 }); });
    inspectorEl.appendChild(field('朝向°', deg));
    const tip = document.createElement('div'); tip.className = 'muted'; tip.textContent = '畫面上拖白色把手調朝向'; inspectorEl.appendChild(tip);
    addDeleteBtn('移除此敵人');
  } else if (k === 'door') {
    const s = sel.ref; h.textContent = '門 ' + s.id; segFields(s); addDeleteBtn('刪除門');
  } else if (k === 'destruct') {
    const s = sel.ref; h.textContent = '破壞物'; segFields(s);
    const psel = document.createElement('select'); DESTRUCT_PRESETS.forEach((p, i) => { const o = document.createElement('option'); o.value = i; o.textContent = p.name; psel.appendChild(o); });
    const cur = DESTRUCT_PRESETS.findIndex(p => p.intact === s.intact && p.broken === s.broken); psel.value = cur < 0 ? 0 : cur;
    psel.addEventListener('change', () => { pushUndo(); const p = DESTRUCT_PRESETS[+psel.value]; s.intact = p.intact; s.broken = p.broken; s.hp = p.hp; rebuildInspector(); });
    inspectorEl.appendChild(field('預設', psel));
    inspectorEl.appendChild(field('HP', numInput(s.hp, v => { s.hp = v; })));
    addDeleteBtn('刪除破壞物');
  } else if (k === 'button') {
    const s = sel.ref; h.textContent = '按鈕 ' + s.id;
    inspectorEl.appendChild(field('x', numInput(s.x, v => { s.x = v; }))); inspectorEl.appendChild(field('y', numInput(s.y, v => { s.y = v; })));
    const dsel = document.createElement('select'); const none = document.createElement('option'); none.value = ''; none.textContent = '(無)'; dsel.appendChild(none);
    map.doors.forEach(d => { const o = document.createElement('option'); o.value = d.id; o.textContent = d.id; dsel.appendChild(o); }); dsel.value = s.doorId || '';
    dsel.addEventListener('change', () => { s.doorId = dsel.value || null; }); inspectorEl.appendChild(field('連動門', dsel));
    addDeleteBtn('刪除按鈕');
  } else if (k === 'wall' || k === 'lowwall') {
    h.textContent = (k === 'wall' ? '牆' : '低矮牆'); segFields(sel.ref); addDeleteBtn('刪除');
  } else if (k === 'bush') {
    const s = sel.ref; h.textContent = '草叢';
    inspectorEl.appendChild(field('x', numInput(s.x, v => { s.x = v; }))); inspectorEl.appendChild(field('y', numInput(s.y, v => { s.y = v; })));
    inspectorEl.appendChild(field('寬', numInput(s.w, v => { s.w = Math.max(4, v); }))); inspectorEl.appendChild(field('高', numInput(s.h, v => { s.h = Math.max(4, v); })));
    addDeleteBtn('刪除草叢');
  } else if (k === 'entry' || k === 'extract' || k === 'prisoner') {
    const s = sel.ref; h.textContent = k === 'entry' ? '進場點' : k === 'extract' ? '撤離點' : '俘虜';
    inspectorEl.appendChild(field('x', numInput(s.x, v => { s.x = v; }))); inspectorEl.appendChild(field('y', numInput(s.y, v => { s.y = v; })));
    addDeleteBtn('刪除');
  }
  function segFields(s) {
    inspectorEl.appendChild(field('x1', numInput(s.x1, v => { s.x1 = v; }))); inspectorEl.appendChild(field('y1', numInput(s.y1, v => { s.y1 = v; })));
    inspectorEl.appendChild(field('x2', numInput(s.x2, v => { s.x2 = v; }))); inspectorEl.appendChild(field('y2', numInput(s.y2, v => { s.y2 = v; })));
  }
  function addDeleteBtn(label) { const r = document.createElement('div'); r.className = 'row'; r.style.marginTop = '8px'; const b = document.createElement('button'); b.textContent = label; b.style.flex = '1'; b.addEventListener('click', () => { removeSelected(); rebuildInspector(); }); r.appendChild(b); inspectorEl.appendChild(r); }
}
function hintFor() {
  if (tab === 'objects') return '選工具後在畫布拖曳/點擊放置。選取工具可拖動物件或端點。右鍵刪除。';
  if (tab === 'waypoints') return '加點：點空白；連線：點兩個點建/斷邊，點線上刪邊；移動：拖點。';
  return '指派：點 waypoint 放敵人，選後改類型/個性/朝向；俘虜：點放置。';
}
function updateStatus() {
  if (!statusEl) return;
  const issues = validate();
  statusEl.className = issues.length ? 'warn' : 'ok';
  statusEl.textContent = (issues.length ? '⚠ ' + issues.join('；') : '✓ 結構正常')
    + '　|　牆' + map.walls.length + ' 門' + map.doors.length + ' 矮牆' + map.lowWalls.length + ' 破壞' + map.destructibles.length + ' 草叢' + map.bushes.length + ' 點' + map.waypoints.length + ' 邊' + map.edges.length + ' 敵' + map.enemySpawns.length + ' 俘' + map.prisoners.length;
}

/* ---- 匯入/匯出 overlay ---- */
function openOverlay(title, text, buttons) {
  ovTitle.textContent = title; ovText.value = text; ovMsg.textContent = ''; ovBtns.innerHTML = '';
  (buttons || []).forEach(b => { const el = document.createElement('button'); el.textContent = b.label; el.addEventListener('click', b.fn); ovBtns.appendChild(el); });
  overlayEl.classList.add('on');
}
function closeOverlay() { overlayEl.classList.remove('on'); }

/* =====================================================================
   渲染
   ===================================================================== */
function resize() { if (!cv) return; const W = cv.clientWidth || 1280, H = cv.clientHeight || 720; if (cv.width !== W) cv.width = W; if (cv.height !== H) cv.height = H; }
function line(a, b) { ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke(); }
function dot(p, r, fill) { ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2); ctx.fillStyle = fill; ctx.fill(); }
function render() {
  if (!ctx) return;
  resize();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.fillStyle = '#06080d'; ctx.fillRect(0, 0, cv.width, cv.height);
  ctx.setTransform(view.scale, 0, 0, view.scale, view.ox, view.oy);
  ctx.lineJoin = 'round';
  // 世界範圍 + 格線
  ctx.fillStyle = '#0a0e15'; ctx.fillRect(0, 0, WORLD.w, WORLD.h);
  if (snap > 0) { ctx.strokeStyle = 'rgba(80,100,120,0.12)'; ctx.lineWidth = 1 / view.scale; ctx.beginPath(); for (let x = 0; x <= WORLD.w; x += snap) { ctx.moveTo(x, 0); ctx.lineTo(x, WORLD.h); } for (let y = 0; y <= WORLD.h; y += snap) { ctx.moveTo(0, y); ctx.lineTo(WORLD.w, y); } ctx.stroke(); }
  ctx.strokeStyle = '#2a3442'; ctx.lineWidth = 2 / view.scale; ctx.strokeRect(0, 0, WORLD.w, WORLD.h);

  const dim = (layer) => tab === 'objects' ? 1 : 0.35;
  // 草叢
  ctx.globalAlpha = (tab === 'objects' ? 0.5 : 0.2); for (const b of map.bushes) { ctx.fillStyle = '#3fae5a'; ctx.fillRect(b.x, b.y, b.w, b.h); } ctx.globalAlpha = 1;
  // 破壞物
  for (const d of map.destructibles) drawDestruct(d, dim());
  // 低矮牆
  ctx.strokeStyle = `rgba(150,120,80,${dim()})`; ctx.lineWidth = 5 / view.scale; ctx.setLineDash([10 / view.scale, 6 / view.scale]); for (const s of map.lowWalls) line({ x: s.x1, y: s.y1 }, { x: s.x2, y: s.y2 }); ctx.setLineDash([]);
  // 門
  ctx.strokeStyle = `rgba(210,160,90,${dim()})`; ctx.lineWidth = 6 / view.scale; ctx.setLineDash([4 / view.scale, 4 / view.scale]); for (const s of map.doors) line({ x: s.x1, y: s.y1 }, { x: s.x2, y: s.y2 }); ctx.setLineDash([]);
  // 牆
  ctx.strokeStyle = `rgba(120,135,150,${dim()})`; ctx.lineWidth = 4 / view.scale; for (const s of map.walls) line({ x: s.x1, y: s.y1 }, { x: s.x2, y: s.y2 });
  // 按鈕 + 連動線
  for (const b of map.buttons) { ctx.globalAlpha = dim(); dot(b, 6 / view.scale, '#7fe3ff'); const d = map.doors.find(x => x.id === b.doorId); if (d) { ctx.strokeStyle = 'rgba(127,227,255,0.4)'; ctx.lineWidth = 1 / view.scale; line(b, { x: (d.x1 + d.x2) / 2, y: (d.y1 + d.y2) / 2 }); } ctx.globalAlpha = 1; }
  // 進/撤點
  for (const e of map.entryPoints) { dot(e, 9 / view.scale, 'rgba(95,208,107,0.85)'); }
  for (const e of map.extractionPoints) { dot(e, 9 / view.scale, 'rgba(90,169,255,0.9)'); }

  // 邊
  const bad = badEdgeSet();
  ctx.lineWidth = 1.6 / view.scale;
  for (const e of map.edges) { const A = map.waypoints[e[0]].pos, B = map.waypoints[e[1]].pos; const isBad = bad.has(e[0] + '-' + e[1]); ctx.strokeStyle = isBad ? 'rgba(255,90,90,0.9)' : (tab === 'waypoints' ? 'rgba(120,170,210,0.75)' : 'rgba(110,150,190,0.4)'); ctx.lineWidth = (isBad ? 2.6 : 1.6) / view.scale; line(A, B); }
  // 連線 rubber band
  if (tab === 'waypoints' && tool === 'link' && linkFrom != null) { ctx.strokeStyle = 'rgba(127,227,255,0.7)'; ctx.lineWidth = 1.5 / view.scale; ctx.setLineDash([6 / view.scale, 4 / view.scale]); line(map.waypoints[linkFrom].pos, mouseWorld); ctx.setLineDash([]); }

  // waypoints
  for (const w of map.waypoints) {
    const sp = w.tags.some(t => ['flank', 'vantage', 'choke'].includes(t));
    const r = (sp ? 7 : 5) / view.scale;
    dot(w.pos, r, sp ? 'rgba(200,175,95,0.9)' : (tab === 'waypoints' ? 'rgba(150,180,210,0.95)' : 'rgba(130,150,170,0.55)'));
    if (linkFrom === w.id) { ctx.strokeStyle = '#7fe3ff'; ctx.lineWidth = 2 / view.scale; ctx.beginPath(); ctx.arc(w.pos.x, w.pos.y, r + 4 / view.scale, 0, Math.PI * 2); ctx.stroke(); }
    if (view.scale > 0.5) { ctx.fillStyle = 'rgba(200,215,230,0.9)'; ctx.font = (11 / view.scale) + 'px Consolas'; ctx.textAlign = 'center'; ctx.fillText(w.id, w.pos.x, w.pos.y - r - 3 / view.scale); if (tab === 'waypoints' && w.tags.length) { ctx.fillStyle = 'rgba(255,210,122,0.85)'; ctx.fillText(w.tags.join(','), w.pos.x, w.pos.y + r + 11 / view.scale); } }
  }
  // 敵人 spawn（視野錐 + 朝向）
  for (const s of map.enemySpawns) { const node = map.waypoints[s.nodeId]; if (node) drawSpawn(s, node.pos); }
  // 俘虜
  for (const pr of map.prisoners) { ctx.strokeStyle = 'rgba(220,120,220,0.9)'; ctx.lineWidth = 2.5 / view.scale; const r = 7 / view.scale; ctx.beginPath(); ctx.moveTo(pr.x - r, pr.y - r); ctx.lineTo(pr.x + r, pr.y + r); ctx.moveTo(pr.x + r, pr.y - r); ctx.lineTo(pr.x - r, pr.y + r); ctx.stroke(); }

  // 選取高亮 + 新建預覽
  drawSelection();
  drawDragPreview();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
}
function drawDestruct(d, a) {
  const A = { x: d.x1, y: d.y1 }, B = { x: d.x2, y: d.y2 }, f = d.intact;
  ctx.lineWidth = 5 / view.scale;
  if (f === 'wall') { ctx.strokeStyle = `rgba(150,110,80,${a})`; ctx.setLineDash([]); line(A, B); }
  else if (f === 'glass') { ctx.strokeStyle = `rgba(120,190,225,${0.7 * a})`; ctx.setLineDash([]); line(A, B); }
  else if (f === 'lowwall') { ctx.strokeStyle = `rgba(150,110,80,${a})`; ctx.setLineDash([8 / view.scale, 5 / view.scale]); line(A, B); ctx.setLineDash([]); }
  else if (f === 'fence') { ctx.strokeStyle = `rgba(150,160,170,${a})`; ctx.setLineDash([3 / view.scale, 5 / view.scale]); ctx.lineWidth = 2.5 / view.scale; line(A, B); ctx.setLineDash([]); }
}
function drawSpawn(s, pos) {
  const t = s.type || 'grunt', meta = ENEMY_META[t], face = s.facing || 0, half = meta.cone * Math.PI / 180, range = meta.range;
  ctx.fillStyle = `hsla(${meta.hue},60%,55%,0.12)`;
  ctx.beginPath(); ctx.moveTo(pos.x, pos.y); ctx.arc(pos.x, pos.y, range, face - half, face + half); ctx.closePath(); ctx.fill();
  ctx.fillStyle = `hsl(${meta.hue},60%,58%)`; dot(pos, 7 / view.scale, `hsl(${meta.hue},60%,58%)`);
  ctx.strokeStyle = '#0a0e14'; ctx.lineWidth = 1.5 / view.scale; line(pos, { x: pos.x + Math.cos(face) * 16 / view.scale, y: pos.y + Math.sin(face) * 16 / view.scale });
  // 朝向把手（選取此 spawn 時）
  if (sel && sel.kind === 'spawn' && sel.nodeId === s.nodeId) { const hp = { x: pos.x + Math.cos(face) * 34 / view.scale, y: pos.y + Math.sin(face) * 34 / view.scale }; ctx.strokeStyle = 'rgba(127,227,255,0.6)'; ctx.lineWidth = 1 / view.scale; line(pos, hp); dot(hp, 5 / view.scale, '#fff'); }
}
function drawSelection() {
  if (!sel) return;
  ctx.strokeStyle = '#ffd27a'; ctx.lineWidth = 2 / view.scale; ctx.setLineDash([]);
  const k = sel.kind;
  if (k === 'waypoint') { const w = map.waypoints[sel.i]; if (w) circle(w.pos, 11 / view.scale); }
  else if (k === 'spawn') { const n = map.waypoints[sel.nodeId]; if (n) circle(n.pos, 12 / view.scale); }
  else if (sel.ref && sel.ref.x1 != null) { const s = sel.ref; line({ x: s.x1, y: s.y1 }, { x: s.x2, y: s.y2 }); handle(s.x1, s.y1); handle(s.x2, s.y2); }
  else if (sel.ref && sel.ref.w != null) { const s = sel.ref; ctx.strokeRect(s.x, s.y, s.w, s.h); }
  else if (sel.ref && sel.ref.x != null) circle(sel.ref, 11 / view.scale);
  function circle(p, r) { ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2); ctx.stroke(); }
  function handle(x, y) { ctx.strokeRect(x - 4 / view.scale, y - 4 / view.scale, 8 / view.scale, 8 / view.scale); }
}
function drawDragPreview() {
  if (!drag) return;
  ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 2 / view.scale; ctx.setLineDash([5 / view.scale, 4 / view.scale]);
  if (drag.kind === 'newseg') line(drag.start, drag.end);
  else if (drag.kind === 'newbush') { const a = drag.start, b = drag.end; ctx.strokeRect(Math.min(a.x, b.x), Math.min(a.y, b.y), Math.abs(b.x - a.x), Math.abs(b.y - a.y)); }
  ctx.setLineDash([]);
}

/* =====================================================================
   初始化（DOM 接線）
   ===================================================================== */
function init() {
  cv = document.getElementById('cv'); ctx = cv.getContext('2d');
  toolsEl = document.getElementById('tools'); inspectorEl = document.getElementById('inspector'); statusEl = document.getElementById('status');
  mapLabelEl = document.getElementById('mapLabel'); tplSelEl = document.getElementById('tplSel');
  overlayEl = document.getElementById('overlay'); ovTitle = document.getElementById('ovtitle'); ovText = document.getElementById('ovtext'); ovMsg = document.getElementById('ovmsg'); ovBtns = document.getElementById('ovbtns'); gridBtn = document.getElementById('btnGrid');
  domReady = true;

  // 分頁
  document.querySelectorAll('.tabbtn').forEach(b => b.addEventListener('click', () => { document.querySelectorAll('.tabbtn').forEach(x => x.classList.remove('on')); b.classList.add('on'); setTab(b.dataset.tab); }));
  // 範本下拉
  const optBlank = document.createElement('option'); optBlank.value = '__blank'; optBlank.textContent = '— 空白 —'; tplSelEl.appendChild(optBlank);
  Object.keys(TEMPLATES).forEach(k => { const o = document.createElement('option'); o.value = k; o.textContent = k + '（' + TEMPLATES[k].label + '）'; tplSelEl.appendChild(o); });
  tplSelEl.addEventListener('change', () => { loadTemplate(tplSelEl.value); });
  // 標題
  mapLabelEl.addEventListener('input', () => { map.label = mapLabelEl.value; });
  // 按鈕
  document.getElementById('btnNew').addEventListener('click', () => { loadMap(blankMap()); });
  document.getElementById('btnFit').addEventListener('click', () => fitView());
  gridBtn.addEventListener('click', () => { snap = snap > 0 ? 0 : 20; gridBtn.textContent = '格線:' + (snap > 0 ? '開' : '關'); });
  document.getElementById('btnUndo').addEventListener('click', undo);
  document.getElementById('btnRedo').addEventListener('click', redo);
  document.getElementById('btnImport').addEventListener('click', () => openOverlay('匯入地圖 JSON', '', [{ label: '匯入', fn: () => { try { importJSON(ovText.value); closeOverlay(); } catch (e) { ovMsg.textContent = '解析失敗：' + e.message; } } }]));
  document.getElementById('btnExport').addEventListener('click', () => openOverlay('匯出（複製下方文字）', exportJSON(), [
    { label: '純 JSON', fn: () => { ovText.value = exportJSON(); ovMsg.textContent = '可存檔/再匯入'; sel0(); } },
    { label: 'MAPS 片段', fn: () => { ovText.value = exportMAPS(map.label); ovMsg.textContent = '貼進 index.html 的 MAPS'; sel0(); } },
  ]));
  document.getElementById('ovclose').addEventListener('click', closeOverlay);
  function sel0() { if (ovText.select) ovText.select(); }

  // 畫布事件
  const sxsy = (e) => { const r = cv.getBoundingClientRect(); return { _sx: e.clientX - r.left, _sy: e.clientY - r.top, button: e.button }; };
  cv.addEventListener('mousedown', e => { onDown(Object.assign(sxsy(e), {})); });
  window.addEventListener('mousemove', e => { onMove(sxsy(e)); });
  window.addEventListener('mouseup', e => onUp(sxsy(e)));
  cv.addEventListener('wheel', e => { e.preventDefault(); onWheel(sxsy(e)); }, { passive: false });
  cv.addEventListener('contextmenu', e => { e.preventDefault(); onContext(s2w({ x: e.clientX - cv.getBoundingClientRect().left, y: e.clientY - cv.getBoundingClientRect().top })); });
  window.addEventListener('keydown', e => {
    const t = e.target; if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.tagName === 'SELECT')) return;
    const k = e.key.toLowerCase();
    if (k === ' ') { spaceDown = true; e.preventDefault(); }
    else if ((e.ctrlKey || e.metaKey) && k === 'z') { undo(); e.preventDefault(); }
    else if ((e.ctrlKey || e.metaKey) && (k === 'y' || (k === 'z' && e.shiftKey))) { redo(); e.preventDefault(); }
    else if (k === 'delete' || k === 'backspace') { removeSelected(); rebuildInspector(); }
    else if (k === 'g') { snap = snap > 0 ? 0 : 20; gridBtn.textContent = '格線:' + (snap > 0 ? '開' : '關'); }
    else if (k === 'escape') { sel = null; linkFrom = null; rebuildInspector(); }
  });
  window.addEventListener('keyup', e => { if (e.key === ' ') spaceDown = false; });
  window.addEventListener('resize', resize);

  resize(); fitView();
  loadTemplate('alpha');     // 開場載入 alpha 方便上手
  rebuildUI();
  (function loop() { render(); requestAnimationFrame(loop); })();
}
if (typeof document !== 'undefined' && document.getElementById) init();
</script>
